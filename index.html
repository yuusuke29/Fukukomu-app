*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg0: #111214;
  --card: rgba(255,255,255,0.045);
  --ln:  rgba(255,255,255,0.08);
  --ln2: rgba(255,255,255,0.05);
  --t1: #F7F4EE;
  --t2: #C9C3B8;
  --t3: #918A80;
  --t4: #6C6A66;
  --accent:  #D8B89C;
  --accent4: #9EB1C7;
  --male-bg:   rgba(158,177,199,0.15);
  --male-bd:   rgba(158,177,199,0.45);
  --male-tx:   #9EB1C7;
  --female-bg: rgba(201,143,143,0.15);
  --female-bd: rgba(201,143,143,0.45);
  --female-tx: #D4A0A0;
  --sh1: 0 8px 24px rgba(0,0,0,0.22);
  --sh2: 0 18px 50px rgba(0,0,0,0.28);
  --safe-top:    max(env(safe-area-inset-top), 10px);
  --safe-bottom: max(env(safe-area-inset-bottom), 0px);
  --header-h: 56px;
  --footer-h: 64px;
}

html {
  -webkit-text-size-adjust: 100%;
  -webkit-tap-highlight-color: transparent;
  background: #111214;
}

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: #111214;
  color: var(--t1);
  height: 100dvh;
  overflow: hidden;
  font-size: 15px;
  line-height: 1.5;
}

#app {
  position: relative;
  height: 100dvh;
  background:
    radial-gradient(circle at top, rgba(216,184,156,0.07), transparent 26%),
    linear-gradient(180deg, #131417 0%, #101113 100%);
  overflow: hidden;
}

/* ============================================================
   ヘッダー
============================================================ */
#header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100; /* ★ フッターより低く、モーダルより低い */
  padding-top: var(--safe-top);
  background: rgba(17,18,20,0.90);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--ln2);
}

.header-inner {
  height: var(--header-h);
  display: flex; align-items: center; padding: 0 16px; gap: 8px;
}

.logo {
  font-family: 'Oswald', sans-serif; font-weight: 700;
  font-size: 26px; color: var(--t1); letter-spacing: 1px;
  flex-shrink: 0; margin-right: 4px;
}

.header-nav {
  display: flex; gap: 4px; flex: 1; overflow-x: auto; min-width: 0;
}
.header-nav::-webkit-scrollbar { display: none; }

.hnav-btn {
  height: 34px; padding: 0 12px; border-radius: 999px;
  border: none; background: transparent; color: var(--accent4);
  font-size: 13px; font-weight: 700; cursor: pointer;
  white-space: nowrap; transition: all .18s;
  font-family: 'Noto Sans JP', sans-serif; flex-shrink: 0;
}
.hnav-btn.active { background: rgba(255,255,255,0.07); color: var(--t1); }

.game-badge {
  font-size: 12px; font-weight: 700; color: var(--t3);
  flex-shrink: 0; white-space: nowrap;
}

/* ============================================================
   メイン
============================================================ */
#main {
  position: fixed;
  top: calc(var(--safe-top) + var(--header-h));
  left: 0; right: 0;
  bottom: calc(var(--safe-bottom) + var(--footer-h));
  overflow: hidden;
}

.screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  overflow: hidden; opacity: 0; pointer-events: none;
  transition: opacity .22s;
}
.screen.active { opacity: 1; pointer-events: all; }

.scrollable {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
}
.scrollable::-webkit-scrollbar { width: 3px; }
.scrollable::-webkit-scrollbar-thumb { background: var(--ln); border-radius: 999px; }

/* ============================================================
   フッター
   ★ z-index を 200 に設定。通常時はヘッダーより前面。
      モーダル表示時は JS で hidden クラスを付与して隠す。
============================================================ */
#footer {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  z-index: 200;
  padding-bottom: var(--safe-bottom);
  background: rgba(17,18,20,0.92);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-top: 1px solid var(--ln2);
  transition: opacity .2s, visibility .2s;
}

/* ★ モーダル表示中にフッターを非表示にするクラス */
#footer.modal-open {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

.footer-inner { height: var(--footer-h); display: flex; align-items: center; }

.foot-btn {
  flex: 1; height: 100%; border: none; background: transparent;
  color: var(--t4); font-size: 10px; font-weight: 700; cursor: pointer;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 3px; transition: color .18s, background .18s;
  font-family: 'Noto Sans JP', sans-serif;
}
.foot-btn .icon { font-size: 18px; line-height: 1; }
.foot-btn.active { color: var(--accent4); background: rgba(255,255,255,0.04); }

/* ============================================================
   共通コンポーネント
============================================================ */
.btn-action {
  width: 100%; height: 50px; border: none; border-radius: 14px;
  font-family: 'Noto Sans JP', sans-serif; font-size: 15px; font-weight: 800;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  gap: 8px; transition: transform .1s, opacity .15s;
}
.btn-action:active { transform: scale(.985); opacity: .8; }
.btn-action.primary   { background: #F2EEE8; color: #191A1D; }
.btn-action.secondary { background: rgba(255,255,255,0.055); color: var(--t1); border: 1px solid var(--ln); }
.btn-action.green     { background: linear-gradient(180deg,#F3EFE9,#E7DED1); color: #1A1B1E; }
.btn-action.danger    { background: rgba(201,143,143,0.18); color: #F4CECE; border: 1px solid rgba(201,143,143,0.22); }

.stepper {
  display: flex; align-items: center; background: rgba(255,255,255,0.04);
  border-radius: 16px; overflow: hidden; border: 1px solid var(--ln);
  width: fit-content;
}
.step-btn {
  width: 52px; height: 52px; border: none; background: transparent;
  color: var(--accent4); font-size: 28px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.step-btn:active { background: rgba(255,255,255,0.05); }
.step-val {
  min-width: 72px; height: 52px;
  border-left: 1px solid var(--ln); border-right: 1px solid var(--ln);
  font-family: 'Oswald', sans-serif; font-size: 30px; font-weight: 500;
  color: var(--t1); text-align: center;
  display: flex; align-items: center; justify-content: center;
}

.inp-field {
  background: rgba(255,255,255,0.05); border: 1px solid var(--ln);
  color: var(--t1); font-family: 'Noto Sans JP', sans-serif;
  font-size: 15px; padding: 11px 13px; border-radius: 12px;
  outline: none; width: 100%; -webkit-appearance: none;
}
.inp-field:focus { border-color: rgba(216,184,156,0.45); }
.inp-field::placeholder { color: var(--t4); }

#toast {
  position: fixed;
  left: 50%;
  bottom: calc(var(--safe-bottom) + var(--footer-h) + 8px);
  transform: translateX(-50%) translateY(70px);
  background: rgba(36,38,43,0.93); color: var(--t1);
  padding: 11px 20px; border-radius: 999px; font-size: 13px; font-weight: 700;
  z-index: 9999; /* ★ 最前面 */
  transition: transform .28s, opacity .28s;
  box-shadow: var(--sh2); pointer-events: none;
  border: 1px solid var(--ln);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  opacity: 0; max-width: calc(100vw - 32px); text-align: center;
}
#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
#toast.ok   { background: rgba(151,184,167,0.94); color: #172019; border-color: transparent; }
#toast.err  { background: rgba(201,143,143,0.94); color: #fff;    border-color: transparent; }
#toast.warn { background: rgba(216,184,156,0.96); color: #1A1B1E; border-color: transparent; }

.nbadge {
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-family: 'Oswald', sans-serif; font-weight: 700; border: 2px solid; flex-shrink: 0;
}
.nbadge.lg { width: 58px; height: 58px; font-size: 22px; }
.nbadge.md { width: 42px; height: 42px; font-size: 15px; }
.nbadge.sm { width: 32px; height: 32px; font-size: 12px; }

.gender-chip {
  display: inline-flex; align-items: center;
  padding: 3px 9px; border-radius: 999px;
  font-size: 11px; font-weight: 800; border: 1px solid;
}
.gender-chip.male   { background: var(--male-bg);   border-color: var(--male-bd);   color: var(--male-tx); }
.gender-chip.female { background: var(--female-bg); border-color: var(--female-bd); color: var(--female-tx); }
.gender-chip.none   { background: rgba(255,255,255,0.04); border-color: var(--ln); color: var(--t4); }

.sec-lbl {
  font-size: 11px; font-weight: 800; color: var(--t3);
  letter-spacing: .8px; text-transform: uppercase; margin-bottom: 6px;
}

.status-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
.status-chip {
  display: inline-flex; align-items: center; padding: 5px 10px;
  border-radius: 999px; border: 1px solid var(--ln);
  background: rgba(255,255,255,0.04); font-size: 11px; font-weight: 700; color: var(--t2);
}

/* ============================================================
   ★ モーダル（ボトムシート）の全面修正
   
   【修正の核心】
   旧: .modal-sheet が単純な overflow-y:auto ボックス
       → コンテンツが長いとボタンが画面外に押し出される
       → z-index:800 でフッター(z-index:200)より前面だったが
         フッターの高さ分だけ実質的に使える画面が狭くなっていた
   
   新: .modal-sheet を flex コンテナにして
       ヘッダー部固定 + 本文スクロール + フッターボタン固定 の3層構造
       フッターは modal-open クラスで完全非表示にする
============================================================ */

/* オーバーレイ: 画面全体を覆う。z-index を高く設定 */
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 500; /* ★ ヘッダー(100)・フッター(200)より高い */
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: flex-end;
  justify-content: center;
  /* ★ overflow:hidden でオーバーレイ背後のスクロールを防ぐ */
  overflow: hidden;
}
.modal-overlay.open { display: flex; }

/*
  ★ モーダルシートの全面見直し
  
  構造:
    .modal-sheet (flex column, 最大高さ制限)
      .modal-sheet-header (固定: ドラッグハンドル + タイトル + タブ)
      .modal-sheet-body   (可変: overflow-y:auto でスクロール)
      .modal-sheet-footer (固定: ボタン行 + safe-area余白)
  
  max-height を dvh で制限し、safe-area-inset-bottom を考慮する。
  フッターは modal-open クラスで非表示にするので、
  フッター分の余白は不要（safe-area分だけ取る）。
*/
.modal-sheet {
  background: #1A1C1F;
  border-radius: 24px 24px 0 0;
  width: 100%;
  max-width: 540px;

  /* ★ 最大高さ: 画面の90%まで。dvh でノッチを考慮 */
  max-height: 90dvh;

  box-shadow: 0 -4px 32px rgba(0,0,0,0.5);
  border-top: 1px solid var(--ln);

  /* ★ flex column にして3層構造を実現 */
  display: flex;
  flex-direction: column;
  overflow: hidden; /* シート自体はhidden、スクロールは body層のみ */
}

/* ── シートヘッダー（固定・スクロールされない） ── */
.modal-sheet-header {
  flex-shrink: 0; /* ★ 縮まない */
  padding: 14px 20px 0;
}

.modal-drag {
  width: 36px; height: 4px; border-radius: 2px;
  background: var(--ln); margin: 0 auto 14px;
}

.modal-title {
  font-size: 18px; font-weight: 800; color: var(--t1); margin-bottom: 14px;
}

/* ── タブ（シートヘッダー内） ── */
.edit-tabs {
  display: flex; gap: 6px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--ln2);
}
.edit-tab {
  flex: 1; height: 40px; border-radius: 12px;
  border: 1px solid var(--ln); background: rgba(255,255,255,0.04);
  color: var(--t3); font-size: 13px; font-weight: 700;
  cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: all .15s;
}
.edit-tab.on {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.15); color: var(--t1);
}

/* ── シートボディ（スクロールする中間層） ── */
.modal-sheet-body {
  flex: 1;          /* ★ 残りスペースを全部使う */
  overflow-y: auto; /* ★ ここだけスクロール */
  -webkit-overflow-scrolling: touch;
  padding: 16px 20px;
}

/* タブコンテンツ */
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ── シートフッター（固定・常に最下部に見える） ── */
.modal-sheet-footer {
  flex-shrink: 0; /* ★ 縮まない */
  padding: 12px 20px;
  /* ★ safe-area-inset-bottom 分を余白として確保 */
  padding-bottom: calc(12px + var(--safe-bottom));
  border-top: 1px solid var(--ln2);
  background: #1A1C1F; /* シートと同じ背景 */
}

/* ボタン行 */
.modal-row {
  display: flex; gap: 10px;
}

.modal-cancel {
  flex: 1; height: 46px; border-radius: 12px;
  border: 1px solid var(--ln); background: rgba(255,255,255,0.05);
  color: var(--t2); font-family: 'Noto Sans JP', sans-serif;
  font-size: 15px; font-weight: 700; cursor: pointer;
}
.modal-submit {
  flex: 2; height: 46px; border-radius: 12px;
  border: none; background: #F2EEE8; color: #191A1D;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 15px; font-weight: 800; cursor: pointer;
}

/* 割り当て解除ボタン（ボディ内の末尾に配置） */
.btn-unassign {
  width: 100%; height: 40px; border-radius: 12px;
  border: 1px solid rgba(201,143,143,0.3);
  background: rgba(201,143,143,0.10); color: #E4B6B6;
  font-size: 13px; font-weight: 700; cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  margin-top: 10px;
}

/* 性別切り替えボタン */
.gender-toggle { display: flex; gap: 8px; margin-top: 8px; }
.gend-btn {
  flex: 1; height: 44px; border-radius: 12px;
  border: 1px solid var(--ln); background: rgba(255,255,255,0.04);
  font-size: 14px; font-weight: 700; cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif; color: var(--t3); transition: all .15s;
}
.gend-btn.active-male   { background: var(--male-bg);   border-color: var(--male-bd);   color: var(--male-tx); }
.gend-btn.active-female { background: var(--female-bg); border-color: var(--female-bd); color: var(--female-tx); }

/* 保存チェック */
.save-check-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 2px; cursor: pointer; margin-top: 4px;
}
.save-check-row input[type="checkbox"] {
  width: 20px; height: 20px; cursor: pointer; flex-shrink: 0;
  accent-color: var(--accent);
}
.save-check-label { font-size: 13px; font-weight: 600; color: var(--t2); }

/* 保存済みリスト（ボディ内でスクロール） */
.saved-list {
  display: flex; flex-direction: column; gap: 8px;
}
.saved-item {
  display: flex; align-items: center; gap: 10px;
  background: rgba(255,255,255,0.04); border: 1px solid var(--ln);
  border-radius: 14px; padding: 12px 14px; cursor: pointer; transition: all .15s;
}
.saved-item:active { background: rgba(255,255,255,0.08); }
.saved-item.selected {
  border-color: rgba(216,184,156,0.55); background: rgba(216,184,156,0.10);
}
.saved-item-name { flex: 1; font-size: 15px; font-weight: 700; color: var(--t1); }
.saved-item-check {
  font-size: 18px; color: var(--accent); opacity: 0; transition: opacity .15s;
}
.saved-item.selected .saved-item-check { opacity: 1; }

/* ============================================================
   ホーム画面
============================================================ */
#screen-setup .scrollable { padding: 0 0 24px; }

.setup-hero { padding: 20px 18px 16px; border-bottom: 1px solid var(--ln2); }
.setup-hero h1 {
  font-family: 'Oswald', sans-serif; font-weight: 700;
  font-size: 30px; color: var(--t1); letter-spacing: .5px; margin-bottom: 4px;
}
.setup-hero p { font-size: 13px; color: var(--t2); }

.setup-area { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }

.setup-card {
  background: var(--card); border-radius: 20px;
  border: 1px solid var(--ln); box-shadow: var(--sh1); overflow: hidden;
}
.setup-card-head {
  padding: 14px 16px 8px;
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.setup-card-title { font-size: 18px; font-weight: 800; color: var(--t1); }
.setup-card-summary { font-size: 13px; color: var(--t2); white-space: nowrap; }
.setup-card-body { padding: 0 16px 16px; }
.setup-help { font-size: 12px; color: var(--t3); margin-bottom: 12px; }

.count-row {
  display: flex; align-items: center; gap: 14px;
  flex-wrap: wrap; margin-bottom: 14px;
}

.court-config-list { display: flex; flex-direction: column; gap: 10px; }
.court-config-row {
  background: rgba(255,255,255,0.03); border-radius: 16px;
  border: 1px solid var(--ln); overflow: hidden;
}
.court-config-top {
  display: flex; align-items: center; gap: 10px; padding: 12px 12px 8px;
}
.court-config-name-inp {
  flex: 1; background: transparent; border: none;
  color: var(--t1); font-family: 'Noto Sans JP', sans-serif;
  font-size: 15px; font-weight: 800; outline: none; min-width: 60px;
}
.court-config-name-inp::placeholder { color: var(--t4); }
.court-config-seg { padding: 0 12px 12px; }

.seg2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.seg-btn {
  height: 40px; border-radius: 12px;
  border: 1px solid var(--ln); background: rgba(255,255,255,0.04);
  color: var(--accent4); font-size: 13px; font-weight: 800;
  cursor: pointer; transition: all .15s; font-family: 'Noto Sans JP', sans-serif;
}
.seg-btn.on { background: #F2EEE8; border-color: transparent; color: #191A1D; box-shadow: var(--sh1); }

.priority-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.pri-btn {
  padding: 10px 8px; border-radius: 14px; border: 1px solid var(--ln);
  background: rgba(255,255,255,0.04); color: var(--t2);
  font-size: 12px; font-weight: 700; cursor: pointer; transition: all .15s;
  font-family: 'Noto Sans JP', sans-serif; line-height: 1.4; text-align: center;
}
.pri-btn.on {
  background: rgba(216,184,156,0.18);
  border-color: rgba(216,184,156,0.5); color: var(--accent);
}

/* ============================================================
   参加者画面
============================================================ */
#screen-players .scrollable { padding: 14px 16px 24px; }

.players-header { margin-bottom: 14px; }
.players-header-title { font-size: 16px; font-weight: 800; color: var(--t1); margin-bottom: 4px; }
.players-header-sub { font-size: 12px; color: var(--t3); }

.pgrid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}

.pcard {
  background: var(--card); border: 1px solid var(--ln);
  border-radius: 20px; padding: 14px 12px 12px;
  display: flex; flex-direction: column; align-items: center;
  gap: 8px; position: relative; text-align: center;
  box-shadow: var(--sh1); cursor: pointer;
}
.pcard:active { opacity: .85; }
.pcard.empty-slot { border-style: dashed; opacity: .8; }
.pcard.inactive { opacity: .4; }

.pcard-name { font-size: 15px; font-weight: 800; color: var(--t1); word-break: break-all; }
.pcard-name.unset { color: var(--t4); font-style: italic; }
.pcard-wait { font-size: 12px; color: var(--t3); font-weight: 600; }
.pcard-edit-hint { font-size: 10px; color: var(--t4); font-weight: 600; }

.p-exit-btn {
  width: 100%; height: 36px; border-radius: 12px; border: none;
  font-size: 13px; font-weight: 800; cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
}
.p-exit-btn.exit   { background: rgba(201,143,143,0.14); color: #E4B6B6; border: 1px solid rgba(201,143,143,0.2); }
.p-exit-btn.rejoin { background: rgba(151,184,167,0.14); color: #C9E1D4; border: 1px solid rgba(151,184,167,0.2); }

/* ============================================================
   ゲーム画面
============================================================ */
#screen-game .scrollable { padding: 0 0 20px; }

.game-actions {
  display: flex; gap: 10px; padding: 12px 16px; flex-shrink: 0;
  background: rgba(17,18,20,0.7); border-bottom: 1px solid var(--ln2);
}

.court-game-card {
  background: var(--card); border-radius: 20px;
  border: 1px solid var(--ln); box-shadow: var(--sh1); overflow: hidden;
}
.court-game-header {
  padding: 12px 14px; border-bottom: 1px solid var(--ln2);

}
.court-game-name { font-size: 20px; font-weight: 800; color: var(--t1); }
.court-type-chip {
  font-size: 11px; font-weight: 800; padding: 4px 10px;
  border-radius: 999px; background: rgba(216,184,156,0.12);
  color: var(--accent); border: 1px solid rgba(216,184,156,0.18); white-space: nowrap;
}

.match-display { padding: 14px; }
.match-teams {
  display: grid; grid-template-columns: 1fr auto 1fr;
  gap: 10px; align-items: stretch;
}
.team-col {
  background: rgba(255,255,255,0.04); border: 1px solid var(--ln);
  border-radius: 16px; padding: 10px; display: flex;
  flex-direction: column; gap: 6px; min-height: 110px;
}
.team-label {
  font-size: 10px; font-weight: 800; letter-spacing: 1px;

.vs-label {
  font-family: 'Oswald', sans-serif; font-weight: 700;
  font-size: 24px; color: var(--t1);
}

.player-row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 5px; border-radius: 12px; background: rgba(255,255,255,0.03);
}
.player-info { flex: 1; min-width: 0; }
.player-name {
  font-size: 14px; font-weight: 800; color: var(--t1);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.player-sub { font-size: 10px; color: var(--t3); margin-top: 1px; }

.rest-section {
  margin: 0 16px 12px; background: var(--card);
  border-radius: 18px; border: 1px solid var(--ln); overflow: hidden;
}
.rest-header {
  padding: 10px 14px; border-bottom: 1px solid var(--ln2);
  font-size: 14px; font-weight: 800; color: var(--t1);
}
.rest-players { padding: 10px 14px 12px; display: flex; flex-wrap: wrap; gap: 8px; }
.rest-chip {
  display: flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.04); border: 1px solid var(--ln);
  border-radius: 12px; padding: 6px 10px;
}
.rest-chip-name { font-size: 13px; font-weight: 700; color: var(--t1); }
.rest-chip-sub  { font-size: 10px; color: var(--t3); }

.game-courts-wrap {
  padding: 0 16px; display: flex; flex-direction: column; gap: 12px;
}

<script>
// ============================================================
// ■ データ定義
// ============================================================

/*
 * savedParticipants（localStorage永続保存）
 * { id, nickName, gender }
 * ★ 氏名は扱わない。ニックネームのみ。
 */
var savedParticipants = [];

/*
 * todayParticipants（当日No.枠の固定長配列）
 * ★ push() で人数が増える設計ではない。
 *    人数確定時に生成し、各要素の中身を編集する方式。
 * {
 *   no, participantId, nickName, gender, active,
 *   waitingCount, lastWaited,
 *   lastPartnerNos, lastOpponentNos,
 *   recentPartnerNos, recentOpponentNos
 * }
 */
var todayParticipants = [];

var S = {
  courts: [
    { name: '手前コート', mode: 'doubles', teams: [[], []] },
    { name: '中央コート', mode: 'doubles', teams: [[], []] }
  ],
  rounds: [], futureRounds: [], currentRound: 0,
  courtGroupHist: [], pairHist: {}, oppHist: {},
  courtCount: 2, playerCount: 0, priorityMode: 'normal'
};

var tmpCourtConfig = [
  { name: '手前コート', mode: 'doubles' },
  { name: '中央コート', mode: 'doubles' }
];
var _courtCount  = 2;
var _playerCount = 0;
var _defaultCourtNames = ['手前コート','中央コート','奥コート','第4コート','第5コート','第6コート'];

// 編集モーダル状態
var _editTargetNo        = null;
var _editGender          = 'male';
var _editTab             = 'manual';
var _editSelectedSavedId = null;

// ============================================================
// ■ localStorage
// ============================================================

function saveSavedParticipants() {
  try { localStorage.setItem('pb_savedParticipants', JSON.stringify(savedParticipants)); }
  catch(e) { console.warn(e); }
}

function loadSavedParticipants() {
  try {
    var raw = localStorage.getItem('pb_savedParticipants');
    if (raw) savedParticipants = JSON.parse(raw);
  } catch(e) { console.warn(e); }
}

function saveSession() {
  try {
    localStorage.setItem('pb_session', JSON.stringify({
      S: S, todayParticipants: todayParticipants,
      tmpCourtConfig: tmpCourtConfig,
      _courtCount: _courtCount, _playerCount: _playerCount
    }));
  } catch(e) { console.warn(e); }
}

function loadSession() {
  try {
    var raw = localStorage.getItem('pb_session');
    if (!raw) return;
    var data = JSON.parse(raw);
    if (data.S)                  S                 = data.S;
    if (data.todayParticipants)  todayParticipants = data.todayParticipants;
    if (data.tmpCourtConfig)     tmpCourtConfig    = data.tmpCourtConfig;
    if (typeof data._courtCount  === 'number') _courtCount  = data._courtCount;
    if (typeof data._playerCount === 'number') _playerCount = data._playerCount;
  } catch(e) { console.warn(e); }
}

// ============================================================
// ■ 画面遷移
// ============================================================

var SCREENS     = ['setup','game','players','schedule','history'];
var HEADER_NAVS = ['setup','game','players'];
var FOOTER_NAVS = ['schedule','setup','history'];

function gotoScreen(name) {
  SCREENS.forEach(function(s) {
    var el = document.getElementById('screen-' + s);
    if (el) el.classList.toggle('active', s === name);
  });
  HEADER_NAVS.forEach(function(n) {
    var b = document.getElementById('hnav-' + n);
    if (b) b.classList.toggle('active', n === name);
  });
  FOOTER_NAVS.forEach(function(n) {
    var b = document.getElementById('fnav-' + n);
    if (b) b.classList.toggle('active', n === name);
  });
  if (name === 'setup')    renderSetup();
  if (name === 'players')  renderPlayers();
  if (name === 'game')     renderGame();
  if (name === 'schedule') renderSched();
  if (name === 'history')  renderHistory();
}

// ============================================================
// ■ バッジ・ラベル
// ============================================================

function pColor(no) {
  var hs = [355,20,45,80,140,180,210,250,290,320,10,60,160,235,300,35,160,200];
  var h  = hs[(no - 1) % hs.length];
  return { bg:'hsla('+h+',55%,65%,0.20)', bd:'hsla('+h+',55%,60%,0.72)', tx:'hsl('+h+',72%,72%)' };
}

function makeBadge(no, size) {
  var col = pColor(no);
  var d = document.createElement('div');
  d.className = 'nbadge ' + (size || 'md');
  d.style.background = col.bg; d.style.borderColor = col.bd; d.style.color = col.tx;
  d.textContent = no;
  return d;
}

function displayName(p) {
  if (!p) return '—';
  return p.nickName ? p.nickName : ('No.' + p.no);
}

function pLabel(p) {
  if (!p) return '—';
  var tp = (typeof p === 'object' && p.no !== undefined) ? p : findByNo(p);
  if (!tp) return 'No.' + p;
  return tp.nickName ? (tp.nickName + '（No.' + tp.no + '）') : ('No.' + tp.no);
}

function findByNo(no) {
  return todayParticipants.find(function(x) { return x.no === no; }) || null;
}

function genderChipHtml(gender) {
  if (gender === 'male')   return '<span class="gender-chip male">♂ 男</span>';
  if (gender === 'female') return '<span class="gender-chip female">♀ 女</span>';
  return '<span class="gender-chip none">未設定</span>';
}

// ============================================================
// ■ ホーム画面
// ============================================================

function renderSetup() {
  document.getElementById('player-count-disp').textContent = _playerCount;
  document.getElementById('setup-player-summary').textContent = todayParticipants.length + '名';
  document.getElementById('court-count-disp').textContent = _courtCount;
  document.getElementById('setup-court-summary').textContent = _courtCount + '面';

  var chipsEl = document.getElementById('setup-player-chips');
  if (chipsEl) {
    var total   = todayParticipants.length;
    var named   = todayParticipants.filter(function(p) { return !!p.nickName; }).length;
    var active  = todayParticipants.filter(function(p) { return p.active; }).length;
    var males   = todayParticipants.filter(function(p) { return p.gender === 'male'; }).length;
    var females = todayParticipants.filter(function(p) { return p.gender === 'female'; }).length;
    chipsEl.innerHTML =
      '<span class="status-chip">枠 ' + total + '個</span>' +
      '<span class="status-chip">名前設定済み ' + named + '名</span>' +
      '<span class="status-chip">参加中 ' + active + '名</span>' +
      '<span class="status-chip" style="color:var(--male-tx)">♂ ' + males + '</span>' +
      '<span class="status-chip" style="color:var(--female-tx)">♀ ' + females + '</span>';
  }

  var statusEl = document.getElementById('setup-status-chips');
  if (statusEl) {
    var usedCourts = S.courts.filter(function(c) { return c.mode !== 'unused'; }).length;
    statusEl.innerHTML =
      '<span class="status-chip">参加中 ' + todayParticipants.filter(function(p){return p.active;}).length + '名</span>' +
      '<span class="status-chip">使用コート ' + usedCourts + '面</span>' +

function adjPlayers(d) {

/*
 * ★ No.枠を作成 / 更新する
 * todayParticipants は固定長配列として扱う。
 * 増えた場合 → 末尾に追加
 * 減った場合 → 末尾を削除
 * 既存データは保持
 */
function applyPlayerCount() {
  var newCount = _playerCount;
  var oldCount = todayParticipants.length;

  if (newCount === oldCount) {
    showToast('No.枠の数は変わりません（' + newCount + '名）', 'warn');
    return;
  }

  if (newCount > oldCount) {
    for (var no = oldCount + 1; no <= newCount; no++) {
      todayParticipants.push(makeEmptySlot(no));
    }
    showToast('No.' + (oldCount + 1) + '〜No.' + newCount + ' の枠を追加しました', 'ok');
  } else {
    todayParticipants.splice(newCount);
    showToast('No.' + (newCount + 1) + '〜No.' + oldCount + ' の枠を削除しました', 'ok');
  }

  S.playerCount = newCount;
  saveSession();
  renderSetup();
  renderPlayers();
}

function makeEmptySlot(no) {
  return {
    no: no, participantId: null, nickName: '', gender: '',
    active: true, waitingCount: 0, lastWaited: false,
    lastPartnerNos: [], lastOpponentNos: [],
    recentPartnerNos: [], recentOpponentNos: []
  };
}

function openModal(id) {
  document.getElementById(id).classList.add('open');

  var footer = document.getElementById('footer');
  if (footer) footer.classList.add('modal-open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  // ★ フッターを再表示する
  var footer = document.getElementById('footer');
  if (footer) footer.classList.remove('modal-open');
}

function closeEditModal() { closeModal('modal-edit'); }

function handleOverlay(e, id) {

  var nickVal = (document.getElementById('edit-nick-inp').value || '').trim();
  if (!nickVal) { showToast('ニックネームを入力してください', 'err'); return; }

  var dup = todayParticipants.some(function(x) { return x.no !== _editTargetNo && x.nickName === nickVal; });

  renderSched();

}

// ============================================================
// ■ 自動配置ロジック
// ============================================================

function doAutoAssign() {
  var active = todayParticipants.filter(function(p) { return p.active; });
  if (active.length < 4) {
    showToast('参加中の人が4名以上必要です（現在 ' + active.length + '名）', 'err'); return;
  }
  var usedCourts = S.courts.filter(function(c) { return c.mode !== 'unused'; });
  if (usedCourts.length === 0) { showToast('使用コートを設定してください', 'err'); return; }
  var totalNeeded = usedCourts.length * 4;
  if (active.length < totalNeeded) {
    showToast('参加者が不足しています（必要 ' + totalNeeded + '名 / 参加中 ' + active.length + '名）', 'err'); return;
  }

  var sorted = sortByPriority(active);
  var result = assignCourts(sorted, usedCourts);

  var onCourtNos = {};
  result.forEach(function(ca) {
    ((ca[0]||[]).concat(ca[1]||[])).filter(Boolean).forEach(function(p) { onCourtNos[p.no] = true; });
  });
  todayParticipants.forEach(function(p) {
    if (!p.active) return;
    if (onCourtNos[p.no]) { p.lastWaited = false; }
    else { p.waitingCount++; p.lastWaited = true; }
  });

  var usedIdx = 0;
  S.courts.forEach(function(court) {
    if (court.mode === 'unused') { court.teams = [[], []]; return; }
    court.teams = result[usedIdx] || [[], []]; usedIdx++;
  });

  computeFuture();
  saveSession();
  renderGame();
  renderSched();
  gotoScreen('game');
  showToast('自動配置が完了しました', 'ok');
}

function sortByPriority(players) {
  return players.slice().sort(function(a, b) {
    if (b.waitingCount !== a.waitingCount) return b.waitingCount - a.waitingCount;
    if (a.lastWaited !== b.lastWaited) return (a.lastWaited ? 0 : 1) - (b.lastWaited ? 0 : 1);
    return a.no - b.no;
  });
}

function assignCourts(sorted, courts) {
  var rem = sorted.slice();
  var assignments = [];
  courts.forEach(function(court, ci) {
    if (rem.length < 4) { assignments.push([[], []]); return; }
    var group = null;
    if (ci === 0 && S.priorityMode !== 'normal') group = pickByPriorityMode(rem, S.priorityMode);
    if (!group || group.length < 4) group = rem.slice(0, 4);
    group.forEach(function(p) { var idx = rem.indexOf(p); if (idx !== -1) rem.splice(idx, 1); });
    assignments.push(bestPairing(group));
  });
  return assignments;
}

function pickByPriorityMode(pool, mode) {
  var males   = pool.filter(function(p) { return p.gender === 'male'; });
  var females = pool.filter(function(p) { return p.gender === 'female'; });
  if (mode === 'men_doubles_priority'   && males.length   >= 4) return males.slice(0, 4);
  if (mode === 'women_doubles_priority' && females.length >= 4) return females.slice(0, 4);
  if (mode === 'mixed_doubles_priority' && males.length   >= 2 && females.length >= 2) {
    return [males[0], males[1], females[0], females[1]];
  }
  return null;
}

function bestPairing(four) {
  while (four.length < 4) four.push(null);
  var a=four[0],b=four[1],c=four[2],d=four[3];
  var opts=[{teams:[[a,b],[c,d]]},{teams:[[a,c],[b,d]]},{teams:[[a,d],[b,c]]}];
  var best=opts[0], bestScore=-Infinity;
  opts.forEach(function(opt) {
    var s = calcPairingScore(opt.teams[0], opt.teams[1]);
    if (s > bestScore) { bestScore = s; best = opt; }
  });
  return best.teams;
}

function calcPairingScore(teamA, teamB) {
  var score = 0;
  score += evalPair(teamA[0], teamA[1]);
  score += evalPair(teamB[0], teamB[1]);
  (teamA||[]).forEach(function(pa) {
    (teamB||[]).forEach(function(pb) { score += evalOpponent(pa, pb); });
  });
  return score;
}

function evalPair(p1, p2) {
  if (!p1||!p2) return 0;
  var s = 0;
  if ((p1.lastPartnerNos  ||[]).indexOf(p2.no)!==-1) s -= 100;
  if ((p1.recentPartnerNos||[]).indexOf(p2.no)!==-1) s -= 30;
  return s;
}

function evalOpponent(p1, p2) {
  if (!p1||!p2) return 0;
  var s = 0;
  if ((p1.lastOpponentNos  ||[]).indexOf(p2.no)!==-1) s -= 80;
  if ((p1.recentOpponentNos||[]).indexOf(p2.no)!==-1) s -= 20;
  return s;
}

function updateMatchHistory(teamA, teamB) {
  var aF=(teamA||[]).filter(Boolean), bF=(teamB||[]).filter(Boolean);
  var update = function(p, partners, opponents) {
    var sp = findByNo(p.no); if (!sp) return;
    var pNos=partners.map(function(x){return x.no;});
    var oNos=opponents.map(function(x){return x.no;});
    sp.lastPartnerNos    = pNos; sp.lastOpponentNos   = oNos;
    sp.recentPartnerNos  = (sp.recentPartnerNos ||[]).concat(pNos).slice(-6);
    sp.recentOpponentNos = (sp.recentOpponentNos||[]).concat(oNos).slice(-6);
  };
  aF.forEach(function(p){update(p,aF.filter(function(x){return x.no!==p.no;}),bF);});
  bF.forEach(function(p){update(p,bF.filter(function(x){return x.no!==p.no;}),aF);});
}

// ============================================================
// ■ 将来ラウンド予測
// ============================================================

function computeFuture() {
  S.futureRounds = [];
  var active = todayParticipants.filter(function(p) { return p.active; });
  var usedCourts = S.courts.filter(function(c) { return c.mode !== 'unused'; });
  if (active.length < 4 || usedCourts.length === 0) return;

  var sim = active.map(function(p) { return Object.assign({}, p, {
    recentPartnerNos:  (p.recentPartnerNos ||[]).slice(),
    recentOpponentNos: (p.recentOpponentNos||[]).slice()
  }); });

  for (var r = 0; r < 3; r++) {
    var sorted = sim.slice().sort(function(a,b) {
      if (b.waitingCount!==a.waitingCount) return b.waitingCount-a.waitingCount;
      if (a.lastWaited!==b.lastWaited) return (a.lastWaited?0:1)-(b.lastWaited?0:1);
      return a.no-b.no;
    });
    var result = assignCourts(sorted, usedCourts);
    var onCourtNos = {};
    result.forEach(function(ca) {
      ((ca[0]||[]).concat(ca[1]||[])).filter(Boolean).forEach(function(p){onCourtNos[p.no]=true;});
    });
    sim.forEach(function(p) {
      if (onCourtNos[p.no]) p.lastWaited=false;
      else { p.waitingCount++; p.lastWaited=true; }
    });
    var waiters = sim.filter(function(p){return !onCourtNos[p.no];})
      .map(function(p){var tp=findByNo(p.no);return tp?pLabel(tp):'No.'+p.no;});
    var usedIdx = 0;
    var courts = S.courts.map(function(c) {
      if (c.mode==='unused') return {name:c.name,mode:'unused',teams:[[],[]]};
      var teams=result[usedIdx]||[[],[]]; usedIdx++;
      return {
        name:c.name, mode:c.mode,
        teams:[
          (teams[0]||[]).filter(Boolean).map(function(p){var tp=findByNo(p.no);return tp?pLabel(tp):'No.'+p.no;}),
          (teams[1]||[]).filter(Boolean).map(function(p){var tp=findByNo(p.no);return tp?pLabel(tp):'No.'+p.no;})
        ]
      };
    });
    S.futureRounds.push({round:S.currentRound+r+2,waiters:waiters,courts:courts});
  }
}

// ============================================================
// ■ 次のゲームへ
// ============================================================

function nextRound() {
  var onCourtNos = {};
  S.courts.forEach(function(c) {
    ((c.teams[0]||[]).concat(c.teams[1]||[])).filter(Boolean).forEach(function(p){onCourtNos[p.no]=true;});
  });
  var waiters = todayParticipants.filter(function(p){return p.active&&!onCourtNos[p.no];}).map(pLabel);
  S.rounds.push({
    round: S.currentRound+1, waiters: waiters,
    courts: S.courts.map(function(c) {
      return {name:c.name,mode:c.mode,
        teams:(c.teams||[]).map(function(t){return (t||[]).filter(Boolean).map(pLabel);})};
    })
  });
  S.courts.forEach(function(c) {
    if (c.mode==='unused') return;
    updateMatchHistory((c.teams[0]||[]).filter(Boolean),(c.teams[1]||[]).filter(Boolean));
  });
  S.currentRound++;
  document.getElementById('game-badge').textContent = '第'+(S.currentRound+1)+'ゲーム';
  doAutoAssign();
  renderPlayers();
  renderHistory();
  showToast('第'+S.currentRound+'ゲームを終了しました','ok');
}

// ============================================================
// ■ ゲーム画面
// ============================================================

function renderGame() {
  var gc = document.getElementById('game-courts');
  if (!gc) return;
  gc.innerHTML = '';

  S.courts.forEach(function(court) {
    var mode=court.mode, t1=court.teams[0]||[], t2=court.teams[1]||[];
    var card = document.createElement('div');
    card.className = 'court-game-card';

    var hdr = document.createElement('div');
    hdr.className = 'court-game-header';
    var nm = document.createElement('span');
    nm.className='court-game-name'; nm.textContent=court.name;
    hdr.appendChild(nm);
    if (mode!=='unused') {
      var chip=document.createElement('span');
      chip.className='court-type-chip';
      var activeCourts=S.courts.filter(function(c){return c.mode!=='unused';});
      chip.textContent=(S.priorityMode!=='normal'&&activeCourts[0]===court)?getPriorityLabel(S.priorityMode):'ダブルス';
      hdr.appendChild(chip);
    }
    card.appendChild(hdr);

    if (mode==='unused') {
      var ph=document.createElement('div');
      ph.style.cssText='padding:24px;text-align:center;color:var(--t4);font-size:14px';
      ph.textContent='このコートは未使用です';
      card.appendChild(ph);
    } else {
      var md=document.createElement('div'); md.className='match-display';
      var mt=document.createElement('div'); mt.className='match-teams';
      mt.appendChild(buildTeamCol('TEAM A',t1));
      var vc=document.createElement('div'); vc.className='vs-col';
      var vl=document.createElement('div'); vl.className='vs-label'; vl.textContent='VS';
      vc.appendChild(vl); mt.appendChild(vc);
      mt.appendChild(buildTeamCol('TEAM B',t2));
      md.appendChild(mt); card.appendChild(md);
    }
    gc.appendChild(card);
  });

  var onCourtNos={};
  S.courts.forEach(function(c){
    ((c.teams[0]||[]).concat(c.teams[1]||[])).filter(Boolean).forEach(function(p){onCourtNos[p.no]=true;});
  });
  var waiting=todayParticipants.filter(function(p){return p.active&&!onCourtNos[p.no];});
  if (waiting.length>0) {
    var rs=document.createElement('div'); rs.className='rest-section';
    var rh=document.createElement('div'); rh.className='rest-header';
    rh.textContent='待機中 '+waiting.length+'人'; rs.appendChild(rh);
    var rb=document.createElement('div'); rb.className='rest-players';
    waiting.forEach(function(p) {
      var chip=document.createElement('div'); chip.className='rest-chip';
      chip.appendChild(makeBadge(p.no,'sm'));
      var info=document.createElement('div');
      var pnm=document.createElement('div'); pnm.className='rest-chip-name'; pnm.textContent=displayName(p);
      info.appendChild(pnm);
      var sub=document.createElement('div'); sub.className='rest-chip-sub';
      sub.textContent='待機 '+p.waitingCount+'回'+(p.waitingCount>0?' / 次回優先':'');
      info.appendChild(sub); chip.appendChild(info); rb.appendChild(chip);
    });
    rs.appendChild(rb); gc.appendChild(rs);
  }
}

function buildTeamCol(label, players) {
  var col=document.createElement('div'); col.className='team-col';
  var lbl=document.createElement('div'); lbl.className='team-label'; lbl.textContent=label;
  col.appendChild(lbl);
  var ps=players.filter(Boolean);
  if (ps.length===0) ps=[null,null];
  ps.forEach(function(p){col.appendChild(makePlayerRowEl(p));});
  return col;
}

function makePlayerRowEl(p) {
  var row=document.createElement('div'); row.className='player-row';
  if (!p) {
    var ph=document.createElement('div');
    ph.style.cssText='width:32px;height:32px;border-radius:50%;border:1px dashed rgba(255,255,255,0.15);flex-shrink:0;';
    var pi=document.createElement('div'); pi.className='player-info';
    var pn=document.createElement('div'); pn.className='player-name'; pn.style.color='var(--t4)'; pn.textContent='未配置';
    pi.appendChild(pn); row.appendChild(ph); row.appendChild(pi); return row;
  }
  var sp=findByNo(p.no); row.appendChild(makeBadge(p.no,'sm'));
  var pi=document.createElement('div'); pi.className='player-info';
  var pn=document.createElement('div'); pn.className='player-name';
  pn.textContent=sp?displayName(sp):('No.'+p.no); pi.appendChild(pn);
  var sub=document.createElement('div'); sub.className='player-sub';
  var gLabel=sp&&sp.gender==='female'?'♀':(sp&&sp.gender==='male'?'♂':'');
  sub.textContent=(gLabel?gLabel+' ':'')+'待機 '+(sp?sp.waitingCount:0)+'回';
  pi.appendChild(sub); row.appendChild(pi); return row;
}

// ============================================================
// ■ 進行画面
// ============================================================

function renderSched() {
  var el=document.getElementById('sched-scroll');
  if (!el) return; el.innerHTML='';
  var head=document.createElement('div'); head.className='timeline-head';
  head.innerHTML='<div class="timeline-head-title">進行状況</div><div class="timeline-head-sub">現在のゲームと次の予定を確認できます</div>';
  el.appendChild(head);

  var onCourtNos={};
  S.courts.forEach(function(c){
    ((c.teams[0]||[]).concat(c.teams[1]||[])).filter(Boolean).forEach(function(p){onCourtNos[p.no]=true;});
  });
  var curWaiters=todayParticipants.filter(function(p){return p.active&&!onCourtNos[p.no];}).map(pLabel);

  el.appendChild(buildScCard({type:'current',data:{
    round:S.currentRound+1, waiters:curWaiters,
    courts:S.courts.map(function(c){return{name:c.name,mode:c.mode,
      teams:(c.teams||[]).map(function(t){return (t||[]).filter(Boolean).map(pLabel);})};})
  }}));
  S.futureRounds.slice(0,3).forEach(function(r,idx){
    el.appendChild(buildScCard({type:idx===0?'next':'future',data:r}));
  });
}

function buildScCard(item) {
  var cur=item.type==='current', next=item.type==='next';
  var card=document.createElement('div');
  card.className='sc-card'+(cur?' cur':next?' next':'');
  var head=document.createElement('div'); head.className='sc-head';
  var rn=document.createElement('span'); rn.className='sc-round'; rn.textContent='第'+item.data.round+'ゲーム';
  var badge=document.createElement('span'); badge.className='sc-badge';
  badge.textContent=cur?'進行中':next?'次':'予定';
  head.appendChild(rn); head.appendChild(badge); card.appendChild(head);

  var body=document.createElement('div'); body.className='sc-body';
  (item.data.courts||[]).filter(function(c){return c.mode!=='unused';}).forEach(function(c){
    var blk=document.createElement('div'); blk.className='sc-court-block';
    var cnm=document.createElement('div'); cnm.className='sc-court-nm'; cnm.textContent=c.name;
    blk.appendChild(cnm);
    var vsg=document.createElement('div'); vsg.className='sc-vs-grid';
    var mkTeam=function(names){
      var t=document.createElement('div'); t.className='sc-team';
      if (names&&names.length) {
        names.forEach(function(n){var p=document.createElement('div');p.className='sc-player';p.textContent=n;t.appendChild(p);});
      } else {
        var ep=document.createElement('div');ep.className='sc-player emp';ep.textContent='—';t.appendChild(ep);
      }
      return t;
    };
    var vs=document.createElement('div'); vs.className='sc-vs-txt'; vs.textContent='VS';
    vsg.appendChild(mkTeam(c.teams[0])); vsg.appendChild(vs); vsg.appendChild(mkTeam(c.teams[1]));
    blk.appendChild(vsg); body.appendChild(blk);
  });
  if (item.data.waiters&&item.data.waiters.length>0) {
    var rb=document.createElement('div'); rb.className='sc-rest';
    var rl=document.createElement('div'); rl.className='sc-rest-lbl'; rl.textContent='待機'; rb.appendChild(rl);
    var rn2=document.createElement('div'); rn2.className='sc-rest-names'; rn2.textContent=item.data.waiters.join(' / ');
    rb.appendChild(rn2); body.appendChild(rb);
  }
  card.appendChild(body); return card;
}

// ============================================================
// ■ 履歴画面
// ============================================================

function renderHistory() {
  var el=document.getElementById('hist-scroll');
  if (!el) return; el.innerHTML='';
  var intro=document.createElement('div'); intro.className='timeline-head';
  intro.innerHTML='<div class="timeline-head-title">履歴</div><div class="timeline-head-sub">終了したゲームの対戦記録です（スコアなし）</div>';
  el.appendChild(intro);
  if (!S.rounds.length) {
    var empty=document.createElement('div'); empty.className='timeline-head';
    empty.innerHTML='<div class="timeline-head-title">履歴はまだありません</div><div class="timeline-head-sub">ゲームが終了するとここに記録されます</div>';
    el.appendChild(empty); return;
  }
  S.rounds.slice().reverse().forEach(function(r) {
    var card=document.createElement('div'); card.className='hcard';
    var head=document.createElement('div'); head.className='hhead'; head.textContent='第'+r.round+'ゲーム';
    card.appendChild(head);
    var body=document.createElement('div'); body.className='hbody';
    (r.courts||[]).filter(function(c){return c.mode!=='unused';}).forEach(function(c){
      var row=document.createElement('div'); row.className='hrow';
      var ct=document.createElement('div'); ct.className='hct'; ct.textContent=c.name;
      var pl=document.createElement('div'); pl.className='hpl';
      pl.textContent=(c.teams[0]||[]).join(' / ')+' vs '+(c.teams[1]||[]).join(' / ');
      row.appendChild(ct); row.appendChild(pl); body.appendChild(row);
    });
    if (r.waiters&&r.waiters.length) {
      var wRow=document.createElement('div'); wRow.className='hrow';
      var wCt=document.createElement('div'); wCt.className='hct'; wCt.textContent='待機';
      var wPl=document.createElement('div'); wPl.className='hpl'; wPl.textContent=r.waiters.join(' / ');
      wRow.appendChild(wCt); wRow.appendChild(wPl); body.appendChild(wRow);
    }
    card.appendChild(body); el.appendChild(card);
  });
}

// ============================================================
// ■ トースト・ユーティリティ
// ============================================================

var _toastTimer;
function showToast(msg, type) {
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.className='show'+(type?' '+type:'');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(function(){t.className='';},2400);
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================================================
// ■ 初期化
// ============================================================

function init() {
  loadSavedParticipants();
  loadSession();
  _playerCount = S.playerCount || todayParticipants.length || 0;
  _courtCount  = S.courtCount  || 2;
  document.getElementById('player-count-disp').textContent = _playerCount;
  document.getElementById('court-count-disp').textContent  = _courtCount;
  document.getElementById('game-badge').textContent = '第'+(S.currentRound+1)+'ゲーム';
  renderSetup();
  renderPlayers();
  renderGame();
  renderSched();
  renderHistory();
  gotoScreen('setup');
}

init();
</script>
