 <!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-fukukomu-pb.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PB Manager">
  <meta name="theme-color" content="#111214">
  <title>Pickleball Manager</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Oswald:wght@500;700&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg0: #111214;
      --bg1: #1A1C1F;
      --bg2: #23262B;
      --bg3: #2D3138;
      --bg-soft: #17191C;

      --card: rgba(255, 255, 255, 0.045);
      --card-strong: rgba(255, 255, 255, 0.07);

      --accent: #D8B89C;
      --accent2: #97B8A7;
      --accent3: #C98F8F;
      --accent4: #9EB1C7;

      --t1: #F7F4EE;
      --t2: #C9C3B8;
      --t3: #918A80;
      --t4: #6C6A66;

      --ln: rgba(255,255,255,0.08);
      --ln2: rgba(255,255,255,0.05);

      --shadow1: 0 8px 24px rgba(0,0,0,0.22);
      --shadow2: 0 18px 50px rgba(0,0,0,0.28);

      --r1: 14px;
      --r2: 18px;
      --r3: 24px;

      --safe-top: max(env(safe-area-inset-top), 10px);
      --safe-bottom: max(env(safe-area-inset-bottom), 10px);
      --header-h: 62px;
      --footer-h: 68px;
    }

    html {
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
      background: #111214;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #111214;
      color: #F5F2EA;
      height: 100dvh;
      overflow: hidden;
      font-size: 15px;
      line-height: 1.5;
    }

    #app {
      position: relative;
      height: 100dvh;
      background:
        radial-gradient(circle at top, rgba(216,184,156,0.08), transparent 28%),
        linear-gradient(180deg, #131417 0%, #101113 100%);
      overflow: hidden;
    }

    #header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      padding-top: var(--safe-top);
      background: rgba(17,18,20,0.88);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--ln2);
    }

    .header-inner {
      height: var(--header-h);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 10px;
    }

    .logo {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 28px;
      color: var(--t1);
      letter-spacing: 1px;
      margin-right: 6px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .header-nav {
      display: flex;
      gap: 6px;
      flex: 1;
      overflow-x: auto;
      min-width: 0;
    }

    .header-nav::-webkit-scrollbar {
      display: none;
    }

    .hnav-btn {
      height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      border: none;
      background: transparent;
      color: var(--accent4);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: all .18s;
      font-family: 'Noto Sans JP', sans-serif;
      flex-shrink: 0;
    }

    .hnav-btn.active {
      background: rgba(255,255,255,0.06);
      color: var(--t1);
    }

    .timer-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      margin-left: 4px;
    }

    #h-timer {
      font-family: 'Oswald', sans-serif;
      font-weight: 500;
      font-size: 22px;
      color: var(--t1);
      letter-spacing: 2px;
      font-variant-numeric: tabular-nums;
      min-width: 72px;
      text-align: right;
      cursor: pointer;
    }

    #h-timer.warn { color: #E4B57A; }
    #h-timer.done { color: #E18C8C; animation: tblink .45s infinite; }

    @keyframes tblink {
      0%,100% { opacity: 1; }
      50% { opacity: .35; }
    }

    #main {
      position: absolute;
      inset: 0;
      padding-top: calc(var(--safe-top) + var(--header-h));
      padding-bottom: calc(var(--safe-bottom) + var(--footer-h));
      overflow: hidden;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }

    .screen.active {
      opacity: 1;
      pointer-events: all;
    }

    .scrollable {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 18px;
    }

    .scrollable::-webkit-scrollbar {
      width: 4px;
    }

    .scrollable::-webkit-scrollbar-thumb {
      background: var(--ln);
      border-radius: 999px;
    }

    #footer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 1000;
      padding-bottom: var(--safe-bottom);
      background: rgba(17,18,20,0.92);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-top: 1px solid var(--ln2);
    }

    .footer-inner {
      height: var(--footer-h);
      display: flex;
      align-items: center;
    }

    .foot-btn {
      flex: 1;
      height: 100%;
      border: none;
      background: transparent;
      color: var(--t4);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      transition: color .18s, background .18s;
      font-family: 'Noto Sans JP', sans-serif;
    }

    .foot-btn .icon {
      font-size: 19px;
      line-height: 1;
    }

    .foot-btn.active {
      color: var(--accent4);
      background: rgba(255,255,255,0.04);
    }

    .card {
      background: var(--card);
      border-radius: 20px;
      border: 1px solid var(--ln);
      box-shadow: var(--shadow1);
      overflow: hidden;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .btn-action {
      width: 100%;
      height: 52px;
      border: none;
      border-radius: 16px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform .12s ease, opacity .18s ease, background .18s ease;
    }

    .btn-action:active {
      transform: scale(.985);
    }

    .btn-action.primary {
      background: #F2EEE8;
      color: #191A1D;
    }

    .btn-action.secondary {
      background: rgba(255,255,255,0.055);
      color: var(--t1);
      border: 1px solid var(--ln);
    }

    .btn-action.green {
      background: linear-gradient(180deg, #F3EFE9 0%, #E7DED1 100%);
      color: #1A1B1E;
    }

    .btn-action.danger {
      background: rgba(201,143,143,0.18);
      color: #F4CECE;
      border: 1px solid rgba(201,143,143,0.22);
    }

    .stepper {
      display: flex;
      align-items: center;
      gap: 0;
      background: rgba(255,255,255,0.04);
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid var(--ln);
      width: fit-content;
    }

    .step-btn {
      width: 58px;
      height: 56px;
      border: none;
      background: transparent;
      color: var(--accent4);
      font-size: 34px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .step-btn:active {
      background: rgba(255,255,255,0.05);
    }

    .step-val {
      min-width: 84px;
      height: 56px;
      border-left: 1px solid var(--ln);
      border-right: 1px solid var(--ln);
      background: transparent;
      font-family: 'Oswald', sans-serif;
      font-weight: 500;
      font-size: 34px;
      color: var(--t1);
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      font-variant-numeric: tabular-nums;
    }

    .seg {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .seg-btn {
      height: 44px;
      border-radius: 14px;
      border: 1px solid var(--ln);
      background: rgba(255,255,255,0.04);
      color: var(--accent4);
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: all .18s;
      font-family: 'Noto Sans JP', sans-serif;
    }

    .seg-btn.on {
      background: #F2EEE8;
      border-color: transparent;
      color: #191A1D;
      box-shadow: var(--shadow1);
    }

    .nbadge {
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      border: 2px solid;
      flex-shrink: 0;
    }

    .nbadge.lg { width: 62px; height: 62px; font-size: 24px; }
    .nbadge.md { width: 44px; height: 44px; font-size: 16px; }
    .nbadge.sm { width: 34px; height: 34px; font-size: 12px; }

    .inp-field {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--ln);
      color: var(--t1);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 15px;
      padding: 12px 14px;
      border-radius: 14px;
      outline: none;
      width: 100%;
      -webkit-appearance: none;
    }

    .inp-field:focus {
      border-color: rgba(216,184,156,0.45);
    }

    .inp-field::placeholder {
      color: var(--t4);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
    }

    .tag.wait {
      background: rgba(216,184,156,0.12);
      color: var(--accent);
      border: 1px solid rgba(216,184,156,0.22);
    }

    .tag.win {
      background: rgba(151,184,167,0.12);
      color: #B7D3C6;
      border: 1px solid rgba(151,184,167,0.22);
    }

    .tag.lose {
      background: rgba(201,143,143,0.12);
      color: #E4B6B6;
      border: 1px solid rgba(201,143,143,0.22);
    }

    #toast {
      position: fixed;
      left: 50%;
      bottom: calc(var(--safe-bottom) + var(--footer-h) + 10px);
      transform: translateX(-50%) translateY(80px);
      background: rgba(36,38,43,0.92);
      color: var(--t1);
      padding: 13px 22px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 800;
      z-index: 9999;
      transition: transform .3s, opacity .3s;
      box-shadow: var(--shadow2);
      white-space: nowrap;
      pointer-events: none;
      border: 1px solid var(--ln);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      opacity: 0;
      max-width: calc(100vw - 32px);
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.ok   { background: rgba(151,184,167,0.94); color: #172019; border-color: transparent; }
    #toast.err  { background: rgba(201,143,143,0.94); color: #fff; border-color: transparent; }
    #toast.warn { background: rgba(216,184,156,0.96); color: #1A1B1E; border-color: transparent; }

    #screen-setup .scrollable {
      padding: 0 0 28px;
    }

    .setup-hero {
      padding: 28px 18px 18px;
      border-bottom: 1px solid var(--ln2);
    }

    .setup-hero h1 {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 34px;
      color: var(--t1);
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .setup-hero p {
      font-size: 15px;
      color: var(--t2);
    }

    .setup-area {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .setup-card {
      background: var(--card);
      border-radius: 22px;
      border: 1px solid var(--ln);
      box-shadow: var(--shadow1);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      overflow: hidden;
    }

    .setup-card-head {
      padding: 16px 16px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .setup-card-title {
      font-size: 20px;
      font-weight: 800;
      color: var(--t1);
    }

    .setup-card-summary {
      font-size: 14px;
      color: var(--t2);
      white-space: nowrap;
    }

    .setup-card-body {
      padding: 0 16px 16px;
    }

    .setup-help {
      font-size: 13px;
      color: var(--t3);
      margin-bottom: 14px;
    }

    .count-row,
    .timer-setup-row {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .court-config-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .court-config-row {
      background: rgba(255,255,255,0.03);
      border-radius: 18px;
      border: 1px solid var(--ln);
      overflow: hidden;
    }

    .court-config-top {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 14px 10px;
    }

    .court-config-name-inp {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--t1);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 16px;
      font-weight: 800;
      outline: none;
      min-width: 80px;
    }

    .court-config-name-inp::placeholder {
      color: var(--t4);
    }

    .court-config-seg {
      padding: 0 14px 14px;
    }

    .bal-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 15px 16px;
      background: var(--card);
      border-radius: 18px;
      border: 1px solid var(--ln);
      box-shadow: var(--shadow1);
    }

    .bal-lbl {
      flex: 1;
      font-size: 18px;
      font-weight: 800;
      color: var(--t1);
    }

    .bal-sub {
      font-size: 13px;
      color: var(--t2);
      margin-top: 2px;
    }

    .sw {
      position: relative;
      width: 50px;
      height: 30px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .sw input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .sw-tr {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.12);
      border: 1px solid var(--ln);
      border-radius: 999px;
      transition: .25s;
    }

    .sw-tr::after {
      content: '';
      position: absolute;
      left: 4px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      background: #E9E1D7;
      border-radius: 50%;
      transition: .25s;
    }

    .sw input:checked + .sw-tr {
      background: rgba(216,184,156,0.6);
      border-color: rgba(216,184,156,0.65);
    }

    .sw input:checked + .sw-tr::after {
      transform: translateX(20px) translateY(-50%);
      background: #fff;
    }

    .status-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--ln);
      background: rgba(255,255,255,0.04);
      font-size: 12px;
      font-weight: 700;
      color: var(--t2);
    }

    #screen-game .scrollable {
      padding: 0 0 24px;
    }

    .timer-bar-wrap {
      padding: 16px 16px 12px;
      background: rgba(17,18,20,0.8);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--ln2);
      flex-shrink: 0;
    }

    .timer-top-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
      margin-bottom: 12px;
    }

    .timer-left {
      min-width: 0;
    }

    #game-timer-disp {
      display: block;
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 56px;
      line-height: 0.95;
      color: var(--t1);
      letter-spacing: 2px;
      font-variant-numeric: tabular-nums;
      min-width: 4.8ch;
      white-space: nowrap;
      cursor: pointer;
    }

    #game-timer-disp.warn { color: #E4B57A; animation: tblink .5s infinite; }
    #game-timer-disp.done { color: #E18C8C; animation: tblink .3s infinite; }

    .timer-round-label {
      margin-top: 10px;
      font-size: 15px;
      color: var(--t2);
      font-weight: 700;
    }

    .timer-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-shrink: 0;
    }

    .btn-start {
      height: 54px;
      padding: 0 20px;
      border-radius: 16px;
      border: 1px solid var(--ln);
      background: rgba(255,255,255,0.06);
      color: var(--t1);
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      font-family: 'Noto Sans JP', sans-serif;
    }

    .btn-start.running {
      background: #F2EEE8;
      color: #17181B;
      border-color: transparent;
    }

    .btn-timer-reset {
      width: 54px;
      height: 54px;
      border-radius: 16px;
      border: 1px solid var(--ln);
      background: rgba(255,255,255,0.05);
      color: var(--t2);
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .progress-track {
      height: 8px;
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #D8B89C 0%, #EBD8C7 100%);
      border-radius: 999px;
      transition: width .5s linear, background .3s;
    }

    .progress-fill.warn { background: linear-gradient(90deg, #E6C189 0%, #EFD7B7 100%); }
    .progress-fill.done { background: linear-gradient(90deg, #D59A9A 0%, #E4B6B6 100%); }

    .game-actions {
      display: flex;
      gap: 10px;
      padding: 14px 16px;
      flex-shrink: 0;
    }

    .game-courts {
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .court-game-card {
      background: var(--card);
      border-radius: 22px;
      border: 1px solid var(--ln);
      box-shadow: var(--shadow1);
      overflow: hidden;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .court-game-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--ln2);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .court-game-name {
      font-size: 22px;
      font-weight: 800;
      color: var(--t1);
      letter-spacing: -0.2px;
    }

    .court-game-mode {
      font-size: 12px;
      font-weight: 800;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(216,184,156,0.14);
      color: var(--accent);
      border: 1px solid rgba(216,184,156,0.18);
    }

    .match-display {
      padding: 16px;
    }

    .match-teams {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 12px;
      align-items: stretch;
    }

    .team-col {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--ln);
      border-radius: 18px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 128px;
    }

    .team-label {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--t3);
      margin-bottom: 2px;
    }

    .vs-col {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
    }

    .vs-label {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 28px;
      color: var(--t1);
      letter-spacing: 1px;
      opacity: .92;
    }

    .player-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 6px;
      border-radius: 14px;
      background: rgba(255,255,255,0.03);
    }

    .player-info {
      flex: 1;
      min-width: 0;
    }

    .player-name {
      font-size: 15px;
      font-weight: 800;
      color: var(--t1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-sub {
      font-size: 11px;
      color: var(--t3);
      margin-top: 2px;
    }

  <script>
    var S = {
      players: [],
      courts: [
        {name:'手前コート', mode:'doubles', teams:[[],[]]},
        {name:'中央コート', mode:'doubles', teams:[[],[]]},
        {name:'奥コート', mode:'doubles', teams:[[],[]]}
      ],
      scores: [],
      rounds: [],
      futureRounds: [],
      currentRound: 0,
      courtGroupHist: [],
      pairHist: {},
      oppHist: {},
      timerMin: 7,
      playerCount: 12,
      courtCount: 3
    };

    var tmpCourtConfig = [
      {name:'手前コート', mode:'doubles'},
      {name:'中央コート', mode:'doubles'},
      {name:'奥コート', mode:'doubles'}
    ];

    var _playerCount = 12;
    var _courtCount = 3;
    var _timerMin = 7;
    var _defaultNames = ['手前コート','中央コート','奥コート','第4コート','第5コート','第6コート'];

    function initCourtHist() {
      S.courtGroupHist = S.courts.map(function(){ return {}; });
      S.scores = S.courts.map(function(){ return {team1:'', team2:''}; });
    }
    initCourtHist();

    var SCREENS = ['setup','game','players','courts','schedule','history'];
    var HEADER_NAVS = ['setup','game','players'];
    var FOOTER_NAVS = ['schedule','setup','history'];

    function gotoScreen(name) {
      SCREENS.forEach(function(s){
        var el = document.getElementById('screen-' + s);
        if (el) el.classList.toggle('active', s === name);
      });

      HEADER_NAVS.forEach(function(n){
        var b = document.getElementById('hnav-' + n);
        if (b) b.classList.toggle('active', n === name);
      });

      FOOTER_NAVS.forEach(function(n){
        var b = document.getElementById('fnav-' + n);
        if (b) b.classList.toggle('active', n === name);
      });

      if (name === 'players') renderPlayers();
      if (name === 'courts') renderCourtConfig2();
      if (name === 'schedule') renderSched();
      if (name === 'history') renderHistory();
      if (name === 'game') renderGame();
    }

    function pColor(no) {
      var hs = [355,20,45,80,140,180,210,250,290,320,10,60,160,235,300,35,160,200];
      var h = hs[(no - 1) % hs.length];
      return {
        bg:'hsla(' + h + ',55%,65%,0.20)',
        bd:'hsla(' + h + ',55%,60%,0.72)',
        tx:'hsl(' + h + ',72%,72%)'
      };
    }

    function pLabel(p) {
      if (!p) return '—';
      var sp = S.players.find(function(x){ return x.no === p.no; });
      if (!sp) return 'No.' + p.no;
      return sp.nick ? (sp.nick + '（No.' + sp.no + '）') : ('No.' + sp.no);
    }

    function makeBadge(no, size) {
      var col = pColor(no);
      var d = document.createElement('div');
      d.className = 'nbadge ' + (size || 'md');

    function playBeep() {
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        [660,880,1100,880,660,880].forEach(function(f, i){
          var o = ctx.createOscillator(), g = ctx.createGain();
          o.connect(g);
          g.connect(ctx.destination);
          o.frequency.value = f;
          o.type = 'sine';
          var t = ctx.currentTime + i * .18;
          g.gain.setValueAtTime(.4, t);
          g.gain.exponentialRampToValueAtTime(.001, t + .15);
          o.start(t);
          o.stop(t + .15);
        });
      } catch(e){}

    function getSlots() {
      return S.courts.map(function(c){
        return c.mode === 'doubles' ? 4 : c.mode === 'singles' ? 2 : 0;
      });
    }

    function waitPri(p) {
      return -(p.waitCount * 10 + (p.lastWaited ? 8 : 0));
    }

    function groupKey(arr) {
      return arr.filter(Boolean).map(function(p){ return p.no; }).sort(function(a,b){ return a - b; }).join('-');
    }

    function groupAvoid(arr, ci, pH, oH, cgH) {
      var active = arr.filter(Boolean);
      if (active.length < 2) return 0;
      var score = (cgH[ci] ? (cgH[ci][groupKey(active)] || 0) : 0) * 100;
      for (var i = 0; i < active.length; i++) {
        for (var j = i + 1; j < active.length; j++) {
          var k = [active[i].no, active[j].no].sort().join('-');
          score += (pH[k] || 0) * 3 + (oH[k] || 0);
        }
      }
      return score;
    }

    function bestPairing(four, pH) {
      while (four.length < 4) four.push(null);
      var a = four[0], b = four[1], c = four[2], d = four[3];
      var opts = [[[a,b],[c,d]], [[a,c],[b,d]], [[a,d],[b,c]]];
      var best = opts[0], bs = Infinity;

      opts.forEach(function(opt){
        var pc = function(x, y){
          if (!x || !y) return 0;
          return pH[[x.no, y.no].sort().join('-')] || 0;
        };
        var s = pc(opt[0][0], opt[0][1]) + pc(opt[1][0], opt[1][1]);
        if (s < bs) {
          bs = s;
          best = opt;
        }
      });

      return best;
    }

    function getCombos(arr, k) {
      if (k === 0) return [[]];
      if (!arr.length) return [];
      if (arr.length > 12) arr = arr.slice(0, 12);

      var f = arr[0], r = arr.slice(1);
      return getCombos(r, k - 1).map(function(c){ return [f].concat(c); }).concat(getCombos(r, k));
    }

    function shuffleArr(arr) {
      for (var i = arr.length - 1; i > 0; i--) {
        var r = Math.floor(Math.random() * (i + 1));
        var t = arr[i];
        arr[i] = arr[r];
        arr[r] = t;
      }
    }

    function doAssignCalc(pool, bal, pH, oH, cgH) {
      var slots = getSlots();
      var total = slots.reduce(function(a, b){ return a + b; }, 0);

      var sorted = pool.slice().sort(function(a, b){
        return waitPri(a) - waitPri(b);
      });

      if (bal) {
        sorted.sort(function(a, b){
          var wd = waitPri(a) - waitPri(b);
          if (Math.abs(wd) > 5) return wd;
          var ra = (a.wins + a.losses) ? a.wins / (a.wins + a.losses) : .5;
          var rb = (b.wins + b.losses) ? b.wins / (b.wins + b.losses) : .5;
          return rb - ra;
        });
      }

      var i = 0;
      while (i < sorted.length) {
        var pri = waitPri(sorted[i]), j = i;
        while (j < sorted.length && waitPri(sorted[j]) === pri) j++;
        var grp = sorted.slice(i, j);
        shuffleArr(grp);
        for (var k = i; k < j; k++) sorted[k] = grp[k - i];
        i = j;
      }

      var toPlay = sorted.slice(0, Math.min(total, sorted.length));
      var waiters = sorted.slice(toPlay.length);
      var rem = toPlay.slice();
      var courtAssignments = [];

      S.courts.forEach(function(court, ci){
        var s = slots[ci];
        if (s === 0) {
          courtAssignments.push([[],[]]);
          return;
        }

        if (rem.length <= s) {
          var g = rem.splice(0, s);
          courtAssignments.push(court.mode === 'doubles' ? bestPairing(g, pH) : [[g[0] || null],[g[1] || null]]);
          return;
        }

        var mustN = Math.max(1, Math.floor(s / 2));
        var must = rem.slice(0, mustN), cands = rem.slice(mustN), need = s - mustN, chosen;

        if (cands.length <= need) {
          chosen = must.concat(cands);
        } else {
          var combos = getCombos(cands, need), bst = combos[0], bss = Infinity;
          combos.forEach(function(combo){
            var g2 = must.concat(combo), sc = groupAvoid(g2, ci, pH, oH, cgH);
            if (sc < bss) {
              bss = sc;
              bst = combo;
            }
          });
          chosen = must.concat(bst);
        }

        chosen.forEach(function(p){
          var idx = rem.indexOf(p);
          if (idx !== -1) rem.splice(idx, 1);
        });

        courtAssignments.push(court.mode === 'doubles' ? bestPairing(chosen, pH) : [[chosen[0] || null],[chosen[1] || null]]);
      });

      return {courtAssignments:courtAssignments, waiters:waiters};
    }

        function doAutoAssign() {
      var active = S.players.filter(function(p){ return p.active; });
      if (active.length < 2) {
        showToast('参加者が足りません（最低2名）', 'err');
        return;
      }

      var slots = getSlots();
      var total = slots.reduce(function(a, b){ return a + b; }, 0);
      if (total === 0) {
        showToast('使用コートを設定してください', 'err');
        return;
      }

      if (active.length < total) {
        showToast('参加者が不足しています（必要 ' + total + '名 / 現在 ' + active.length + '名）', 'err');
        return;
      }

      var bal = document.getElementById('bal-tog').checked;
      var res = doAssignCalc(active, bal, S.pairHist, S.oppHist, S.courtGroupHist);

      S.players.forEach(function(p){
        if (p.active) p.lastWaited = false;
      });

      res.waiters.forEach(function(w){
        var sp = S.players.find(function(x){ return x.no === w.no; });
        if (sp) {
          sp.waitCount++;
          sp.lastWaited = true;
        }
      });

      S.courts.forEach(function(c, ci){
        c.teams = res.courtAssignments[ci];
      });

      S.scores = S.courts.map(function(){
        return {team1:'', team2:''};
      });

      computeFuture();
      renderGame();
      renderSched();
      gotoScreen('game');
      showToast('自動配置が完了しました', 'ok');
    }

    function computeFuture() {
      S.futureRounds = [];
      var active = S.players.filter(function(p){ return p.active; });
      var total = getSlots().reduce(function(a, b){ return a + b; }, 0);
      if (total === 0 || active.length < 2) return;

      var bal = document.getElementById('bal-tog').checked;
      var sp = active.map(function(p){ return Object.assign({}, p); });
      var sPH = Object.assign({}, S.pairHist), sOH = Object.assign({}, S.oppHist);
      var sCGH = S.courtGroupHist.map(function(h){ return Object.assign({}, h); });

      for (var r = 0; r < 3; r++) {
        var res = doAssignCalc(sp, bal, sPH, sOH, sCGH);

        sp.forEach(function(p){ p.lastWaited = false; });

        res.waiters.forEach(function(w){
          var x = sp.find(function(p){ return p.no === w.no; });
          if (x) {
            x.waitCount++;
            x.lastWaited = true;
          }
        });

        S.courts.forEach(function(court, ci){
          if (court.mode === 'unused') return;
          var t1 = (res.courtAssignments[ci][0] || []).filter(Boolean);
          var t2 = (res.courtAssignments[ci][1] || []).filter(Boolean);
          var gk = groupKey(t1.concat(t2));
          sCGH[ci][gk] = (sCGH[ci][gk] || 0) + 1;

          [t1, t2].forEach(function(team){
            for (var i = 0; i < team.length; i++) {
              for (var j = i + 1; j < team.length; j++) {
                var k = [team[i].no, team[j].no].sort().join('-');
                sPH[k] = (sPH[k] || 0) + 1;
              }
            }
          });

          t1.forEach(function(a){
            t2.forEach(function(b){
              var k2 = [a.no, b.no].sort().join('-');
              sOH[k2] = (sOH[k2] || 0) + 1;
            });
          });
        });

        var futOnCourt = {};
        S.courts.forEach(function(court, ci){
          (res.courtAssignments[ci] || [[],[]]).forEach(function(team){
            (team || []).filter(Boolean).forEach(function(p){
              futOnCourt[p.no] = true;
            });
          });
        });

        var futW = sp
          .filter(function(p){ return !futOnCourt[p.no]; })
          .map(function(p){
            var o = S.players.find(function(x){ return x.no === p.no; });
            return o ? pLabel(o) : ('No.' + p.no);
          });

        S.futureRounds.push({
          round: S.currentRound + 1 + r + 1,
          waiters: futW,
          courts: S.courts.map(function(court, ci){
            return {
              name: court.name,
              mode: court.mode,
              teams: [
                (res.courtAssignments[ci][0] || []).filter(Boolean).map(pLabel),
                (res.courtAssignments[ci][1] || []).filter(Boolean).map(pLabel)
              ]
            };
          })
        });
      }
    }

    function nextRound() {
      var onCourt = {};
      S.courts.forEach(function(c){
        c.teams.forEach(function(t){
          (t || []).filter(Boolean).forEach(function(p){
            onCourt[p.no] = true;
          });
        });
      });

      var waiters = S.players.filter(function(p){
        return p.active && !onCourt[p.no];
      }).map(pLabel);

      S.rounds.push({
        round: S.currentRound + 1,
        waiters: waiters,
        courts: S.courts.map(function(c, ci){
          return {
            name: c.name,
            mode: c.mode,
            teams: c.teams.map(function(t){ return (t || []).filter(Boolean).map(pLabel); }),
            score: Object.assign({}, S.scores[ci])
          };
        })
      });

      S.courts.forEach(function(court, ci){
        if (court.mode === 'unused') return;

        var t1 = (court.teams[0] || []).filter(Boolean);
        var t2 = (court.teams[1] || []).filter(Boolean);
        var gk = groupKey(t1.concat(t2));
        S.courtGroupHist[ci][gk] = (S.courtGroupHist[ci][gk] || 0) + 1;

        [t1, t2].forEach(function(team){
          for (var i = 0; i < team.length; i++) {
            for (var j = i + 1; j < team.length; j++) {
              var k = [team[i].no, team[j].no].sort().join('-');
              S.pairHist[k] = (S.pairHist[k] || 0) + 1;
            }
          }
        });

        t1.forEach(function(a){
          t2.forEach(function(b){
            var k2 = [a.no, b.no].sort().join('-');
            S.oppHist[k2] = (S.oppHist[k2] || 0) + 1;
          });
        });
      });

      S.courts.forEach(function(court, ci){
        if (court.mode === 'unused') return;
        var s1 = parseInt(S.scores[ci].team1, 10);
        var s2 = parseInt(S.scores[ci].team2, 10);
        if (isNaN(s1) || isNaN(s2)) return;

        var t1 = (court.teams[0] || []).filter(Boolean);
        var t2 = (court.teams[1] || []).filter(Boolean);
        var w1 = s1 > s2;
        var w2 = s2 > s1;

        t1.forEach(function(p){
          var sp = S.players.find(function(x){ return x.no === p.no; });
          if (sp) {
            if (w1) sp.wins++;
            else if (w2) sp.losses++;
          }
        });

        t2.forEach(function(p){
          var sp = S.players.find(function(x){ return x.no === p.no; });
          if (sp) {
            if (w2) sp.wins++;
            else if (w1) sp.losses++;
          }
        });
      });

      S.currentRound++;
      document.getElementById('rnd-badge').textContent = '第' + (S.currentRound + 1) + 'ゲーム';

      resetGameTimer();
      doAutoAssign();
      renderPlayers();
      renderHistory();
      showToast('第' + S.currentRound + 'ゲームを終了しました', 'ok');
    }

    function recordScore(ci) {
      var v1 = document.getElementById('sa-' + ci).value;
      var v2 = document.getElementById('sb-' + ci).value;

      if (v1 === '' || v2 === '') {
        showToast('両チームのスコアを入力してください', 'err');
        return;
      }

      var already = S.scores[ci].team1 !== '' && S.scores[ci].team2 !== '';
      S.scores[ci] = {team1:v1, team2:v2};

      var sa = document.getElementById('score-section-' + ci);
      if (sa) sa.innerHTML = buildScoreHTML(ci);

      showToast(already ? 'スコアを上書きしました' : 'スコアを記録しました', 'ok');
    }

    function buildScoreHTML(ci) {
      var sc = S.scores[ci] || {};
      var v1 = sc.team1 || '';
      var v2 = sc.team2 || '';
      var recorded = v1 !== '' && v2 !== '';

      var h = ''
        + '<span class="score-label">スコア</span>'
        + '<div class="score-inputs">'
        + '<input class="score-inp" type="number" min="0" max="99" id="sa-' + ci + '" value="' + v1 + '" placeholder="A">'
        + '<span class="score-sep">-</span>'
        + '<input class="score-inp" type="number" min="0" max="99" id="sb-' + ci + '" value="' + v2 + '" placeholder="B">'
        + '</div>';

      if (recorded) {
        h += '<span class="score-recorded">記録済み</span>';
        h += '<button class="btn-score overwrite" onclick="recordScore(' + ci + ')">上書き</button>';
      } else {
        h += '<button class="btn-score record" onclick="recordScore(' + ci + ')">記録</button>';
      }

      return h;
    }

    function makePlayerRowEl(p) {
      var row = document.createElement('div');

      if (!p) {
        row.className = 'player-row player-empty';

        var ph = document.createElement('div');
        ph.style.cssText = 'width:36px;height:36px;border-radius:50%;border:1px dashed rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;color:var(--t4);font-size:16px;flex-shrink:0';
        ph.textContent = '–';

        var pinfo = document.createElement('div');
        pinfo.className = 'player-info';

        var pnm = document.createElement('div');
        pnm.className = 'player-name';
        pnm.textContent = '未配置';

        pinfo.appendChild(pnm);
        row.appendChild(ph);
        row.appendChild(pinfo);
        return row;
      }

      row.className = 'player-row';

      var sp = S.players.find(function(x){ return x.no === p.no; });
      var badge = makeBadge(p.no, 'sm');
      row.appendChild(badge);

      var pinfo = document.createElement('div');
      pinfo.className = 'player-info';

      var pnm = document.createElement('div');
      pnm.className = 'player-name';
      pnm.textContent = sp && sp.nick ? (sp.nick + '（No.' + p.no + '）') : ('No.' + p.no);
      pinfo.appendChild(pnm);

      var sub = document.createElement('div');
      sub.className = 'player-sub';
      sub.textContent = '待機 ' + (sp ? sp.waitCount : 0) + '回';
      pinfo.appendChild(sub);

      row.appendChild(pinfo);
      return row;
    }

    function renderGame() {
      var gc = document.getElementById('game-courts');
      if (!gc) return;
      gc.innerHTML = '';

      S.courts.forEach(function(court, ci){
        var mode = court.mode;
        var t1 = court.teams[0] || [];
        var t2 = court.teams[1] || [];

        var card = document.createElement('div');
        card.className = 'court-game-card';

        var hdr = document.createElement('div');
        hdr.className = 'court-game-header';

        var nm = document.createElement('span');
        nm.className = 'court-game-name';
        nm.textContent = court.name;
        hdr.appendChild(nm);

        var modeChip = document.createElement('span');
        modeChip.className = 'court-game-mode';
        modeChip.textContent = mode === 'doubles' ? 'ダブルス' : mode === 'singles' ? 'シングル' : '未使用';
        hdr.appendChild(modeChip);

        card.appendChild(hdr);

        if (mode === 'unused') {
          var ph = document.createElement('div');
          ph.style.cssText = 'padding:28px;text-align:center;color:var(--t4);font-size:15px';
          ph.textContent = 'このコートは未使用です';
          card.appendChild(ph);
        } else {
          var isD = mode === 'doubles';

          var md = document.createElement('div');
          md.className = 'match-display';

          var mt = document.createElement('div');
          mt.className = 'match-teams';

          var colA = document.createElement('div');
          colA.className = 'team-col';

          var lblA = document.createElement('div');
          lblA.className = 'team-label';
          lblA.textContent = isD ? 'TEAM A' : 'PLAYER 1';
          colA.appendChild(lblA);

          var psA = isD ? t1 : [t1[0] || null];
          if (psA.length === 0) psA = isD ? [null, null] : [null];
          psA.forEach(function(p){
            colA.appendChild(makePlayerRowEl(p));
          });

          var vsCol = document.createElement('div');
          vsCol.className = 'vs-col';
          var vsLbl = document.createElement('div');
          vsLbl.className = 'vs-label';
          vsLbl.textContent = 'VS';
          vsCol.appendChild(vsLbl);

          var colB = document.createElement('div');
          colB.className = 'team-col';

          var lblB = document.createElement('div');
          lblB.className = 'team-label';
          lblB.textContent = isD ? 'TEAM B' : 'PLAYER 2';
          colB.appendChild(lblB);

          var psB = isD ? t2 : [t2[0] || null];
          if (psB.length === 0) psB = isD ? [null, null] : [null];
          psB.forEach(function(p){
            colB.appendChild(makePlayerRowEl(p));
          });

          mt.appendChild(colA);
          mt.appendChild(vsCol);
          mt.appendChild(colB);

          md.appendChild(mt);
          card.appendChild(md);

          var ss = document.createElement('div');
          ss.className = 'score-section';
          ss.id = 'score-section-' + ci;
          ss.innerHTML = buildScoreHTML(ci);
          card.appendChild(ss);
        }

        gc.appendChild(card);
      });

      var onCourt = {};
      S.courts.forEach(function(c){
        c.teams.forEach(function(t){
          (t || []).filter(Boolean).forEach(function(p){
            onCourt[p.no] = true;
          });
        });
      });

      var waiting = S.players.filter(function(p){
        return p.active && !onCourt[p.no];
      });

      if (waiting.length > 0) {
        var rs = document.createElement('div');
        rs.className = 'rest-section';

        var rh = document.createElement('div');
        rh.className = 'rest-header';
        rh.textContent = '待機中 ' + waiting.length + '人';
        rs.appendChild(rh);

        var rb = document.createElement('div');
        rb.className = 'rest-players';

        waiting.forEach(function(p){
          var chip = document.createElement('div');
          chip.className = 'rest-player';

          chip.appendChild(makeBadge(p.no, 'sm'));

          var info = document.createElement('div');
          info.className = 'rest-player-info';

          var pnm = document.createElement('div');
          pnm.className = 'rest-player-name';
          pnm.textContent = p.nick ? (p.nick + '（No.' + p.no + '）') : ('No.' + p.no);
          info.appendChild(pnm);

          var wt = document.createElement('div');
          wt.className = 'rest-player-sub';
          wt.textContent = p.waitCount > 0 ? ('待機 ' + p.waitCount + '回 / 次回優先') : '今回休憩';
          info.appendChild(wt);

          chip.appendChild(info);
          rb.appendChild(chip);
        });

        rs.appendChild(rb);
        gc.appendChild(rs);
      }
    }

    function renderSched() {
      var el = document.getElementById('sched-scroll');
      if (!el) return;
      el.innerHTML = '';

      var head = document.createElement('div');
      head.className = 'timeline-head';
      head.innerHTML = '<div class="timeline-head-title">進行状況</div><div class="timeline-head-sub">現在のゲームと、次に入る組み合わせを確認できます</div>';
      el.appendChild(head);

      var curOnCourt = {};
      S.courts.forEach(function(c){
        c.teams.forEach(function(t){
          (t || []).filter(Boolean).forEach(function(p){
            curOnCourt[p.no] = true;
          });
        });
      });

      var curW = S.players.filter(function(p){
        return p.active && !curOnCourt[p.no];
      }).map(pLabel);

      var currentItem = {
        type:'current',
        data:{
          round:S.currentRound + 1,
          waiters:curW,
          courts:S.courts.map(function(c, ci){
            return {
              name:c.name,
              mode:c.mode,
              teams:c.teams.map(function(t){ return (t || []).filter(Boolean).map(pLabel); }),
              score:S.scores[ci] || {}
            };
          })
        }
      };

      el.appendChild(buildScCard(currentItem));

      S.futureRounds.slice(0, 3).forEach(function(r, idx){
        el.appendChild(buildScCard({
          type: idx === 0 ? 'next' : 'future',
          data: r
        }));
      });
    }


  function buildScCard(item) {
  var cur = item.type === 'current';
  var next = item.type === 'next';

  var card = document.createElement('div');
  card.className = 'sc-card' + (cur ? ' cur' : next ? ' next' : ' future');

  var head = document.createElement('div');
  head.className = 'sc-head';

  var rn = document.createElement('span');
  rn.className = 'sc-round';
  rn.textContent = '第' + item.data.round + 'ゲーム';

  var badge = document.createElement('span');
  badge.className = 'sc-badge';
  badge.textContent = cur ? '進行中' : next ? '次' : '予定';

  head.appendChild(rn);
  head.appendChild(badge);
  card.appendChild(head);

  var body = document.createElement('div');
  body.className = 'sc-body';

  (item.data.courts || []).filter(function(c){ return c.mode !== 'unused'; }).forEach(function(c){
    var blk = document.createElement('div');
    blk.className = 'sc-court-block';

    var cnm = document.createElement('div');
    cnm.className = 'sc-court-nm';
    cnm.innerHTML = '<span>' + c.name + '</span><span class="sc-court-mode">' + (c.mode === 'doubles' ? 'ダブルス' : 'シングル') + '</span>';
    blk.appendChild(cnm);

    var vsg = document.createElement('div');
    vsg.className = 'sc-vs-grid';

    var ta = document.createElement('div');
    ta.className = 'sc-team';

    (c.teams[0] || []).forEach(function(n){
      var p = document.createElement('div');
      p.className = 'sc-player';
      p.textContent = n;
      ta.appendChild(p);
    });

    if (!(c.teams[0] || []).length) {
      var ep = document.createElement('div');
      ep.className = 'sc-player emp';
      ep.textContent = '—';
      ta.appendChild(ep);
    }

    var vs = document.createElement('div');
    vs.className = 'sc-vs-txt';
    vs.textContent = 'VS';

    var tb = document.createElement('div');
    tb.className = 'sc-team';

    (c.teams[1] || []).forEach(function(n){
      var p2 = document.createElement('div');
      p2.className = 'sc-player';
      p2.textContent = n;
      tb.appendChild(p2);
    });

    if (!(c.teams[1] || []).length) {
      var ep2 = document.createElement('div');
      ep2.className = 'sc-player emp';
      ep2.textContent = '—';
      tb.appendChild(ep2);
    }

    vsg.appendChild(ta);
    vsg.appendChild(vs);
    vsg.appendChild(tb);
    blk.appendChild(vsg);

    if (c.score && c.score.team1 !== '' && c.score.team2 !== '') {
      var sc = document.createElement('div');
      sc.className = 'sc-score-row';
      sc.textContent = c.score.team1 + ' - ' + c.score.team2;
      blk.appendChild(sc);
    }

    body.appendChild(blk);
  });

  if (item.data.waiters && item.data.waiters.length > 0) {
    var rb = document.createElement('div');
    rb.className = 'sc-rest';

    var rl = document.createElement('div');
    rl.className = 'sc-rest-lbl';
    rl.textContent = '待機';
    rb.appendChild(rl);

    var rn2 = document.createElement('div');
    rn2.className = 'sc-rest-names';
    rn2.textContent = item.data.waiters.join(' / ');
    rb.appendChild(rn2);

    body.appendChild(rb);
  }

  card.appendChild(body);
  return card;
}

    function renderHistory() {
  var el = document.getElementById('hist-scroll');
  if (!el) return;
  el.innerHTML = '';

  var intro = document.createElement('div');
  intro.className = 'timeline-head';
  intro.innerHTML = '<div class="timeline-head-title">履歴</div><div class="timeline-head-sub">終了したゲーム結果を確認できます</div>';
  el.appendChild(intro);

  if (!S.rounds.length) {
    var empty = document.createElement('div');
    empty.className = 'timeline-head';
    empty.innerHTML = '<div class="timeline-head-title">履歴はまだありません</div><div class="timeline-head-sub">ゲームが終了すると、ここに対戦結果が保存されます</div>';
    el.appendChild(empty);
    return;
  }

  S.rounds.slice().reverse().forEach(function(r){
    var card = document.createElement('div');
    card.className = 'hcard';

    var head = document.createElement('div');
    head.className = 'hhead';
    head.textContent = '第' + r.round + 'ゲーム';
    card.appendChild(head);

    var body = document.createElement('div');
    body.className = 'hbody';

    r.courts.filter(function(c){ return c.mode !== 'unused'; }).forEach(function(c){
      var row = document.createElement('div');
      row.className = 'hrow';

      var ct = document.createElement('div');
      ct.className = 'hct';
      ct.textContent = c.name + ' / ' + (c.mode === 'doubles' ? 'ダブルス' : 'シングル');

      var pl = document.createElement('div');
      pl.className = 'hpl';
      pl.textContent = (c.teams[0] || []).join(' / ') + ' vs ' + (c.teams[1] || []).join(' / ');

      var sc = document.createElement('div');
      sc.className = 'hsc';
      sc.textContent = (c.score && c.score.team1 !== '' && c.score.team2 !== '') ? ('スコア ' + c.score.team1 + ' - ' + c.score.team2) : 'スコア未記録';

      row.appendChild(ct);
      row.appendChild(pl);
      row.appendChild(sc);
      body.appendChild(row);
    });

    if (r.waiters && r.waiters.length) {
      var waitRow = document.createElement('div');
      waitRow.className = 'hrow';

      var waitCt = document.createElement('div');
      waitCt.className = 'hct';
      waitCt.textContent = '待機';

      var waitPl = document.createElement('div');
      waitPl.className = 'hpl';
      waitPl.textContent = r.waiters.join(' / ');

      waitRow.appendChild(waitCt);
      waitRow.appendChild(waitPl);
      body.appendChild(waitRow);
    }

    card.appendChild(body);
    el.appendChild(card);
  });
}

   
    var toastT;
    function showToast(msg, type) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'show' + (type ? ' ' + type : '');
      clearTimeout(toastT);
      toastT = setTimeout(function(){
        t.className = '';
      }, 2200);
    }

    function initialSetup() {
      renderCourtConfig1();
      renderCourtConfig2();
      registerPlayers(false);
      saveCourts(false);
      applyTimerSetting(_timerMin, true);
      updateSetupSummary();
      renderPlayers();
      renderGame();
      renderSched();
      renderHistory();
      gotoScreen('setup');
    }

    initialSetup();
  </script>
</body>
</html>
