<!DOCTYPE html>

<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PB Manager">
  <meta name="theme-color" content="#111214">

  <link rel="icon" type="image/png" href="icon-fukukomu-pb.png">
　<link rel="apple-touch-icon" href="icon-fukukomu-pb.png">
　<link rel="manifest" href="manifest.json">
  
  <title>PB Manager</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Oswald:wght@500;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --card: rgba(255,255,255,0.045);
  --ln:  rgba(255,255,255,0.08);
  --ln2: rgba(255,255,255,0.05);
  --t1: #F7F4EE; --t2: #C9C3B8; --t3: #918A80; --t4: #6C6A66;
  --accent: #D8B89C; --accent4: #9EB1C7;
  --male-bg: rgba(158,177,199,0.15); --male-bd: rgba(158,177,199,0.45); --male-tx: #9EB1C7;
  --female-bg: rgba(201,143,143,0.15); --female-bd: rgba(201,143,143,0.45); --female-tx: #D4A0A0;
  --sh1: 0 8px 24px rgba(0,0,0,0.22); --sh2: 0 18px 50px rgba(0,0,0,0.28);
  --safe-top: max(env(safe-area-inset-top), 10px);
  --safe-bottom: max(env(safe-area-inset-bottom), 0px);
  --header-h: 56px; --footer-h: 64px;
}

html { -webkit-text-size-adjust: 100%; -webkit-tap-highlight-color: transparent; background: #111214; }
body {
  font-family: 'Noto Sans JP', sans-serif; background: #111214; color: var(--t1);
  height: 100dvh; overflow: hidden; font-size: 15px; line-height: 1.5;
}

#app {
  position: relative; height: 100dvh;
  background: radial-gradient(circle at top, rgba(216,184,156,0.07), transparent 26%),
              linear-gradient(180deg, #131417 0%, #101113 100%);
  overflow: hidden;
}

/* ── ヘッダー ── */
#header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding-top: var(--safe-top);
  background: rgba(17,18,20,0.90);
  backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--ln2);
}
.header-inner { height: var(--header-h); display: flex; align-items: center; padding: 0 16px; gap: 8px; }
.logo { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 26px; color: var(--t1); letter-spacing: 1px; flex-shrink: 0; margin-right: 4px; }
.header-nav { display: flex; gap: 4px; flex: 1; overflow-x: auto; min-width: 0; }
.header-nav::-webkit-scrollbar { display: none; }
.hnav-btn { height: 34px; padding: 0 12px; border-radius: 999px; border: none; background: transparent; color: var(--accent4); font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; transition: all .18s; font-family: 'Noto Sans JP', sans-serif; flex-shrink: 0; }
.hnav-btn.active { background: rgba(255,255,255,0.07); color: var(--t1); }
.game-badge { font-size: 12px; font-weight: 700; color: var(--t3); flex-shrink: 0; white-space: nowrap; }

/* ── メイン ── */
#main { position: fixed; top: calc(var(--safe-top) + var(--header-h)); left: 0; right: 0; bottom: calc(var(--safe-bottom) + var(--footer-h)); overflow: hidden; }
.screen { position: absolute; inset: 0; display: flex; flex-direction: column; overflow: hidden; opacity: 0; pointer-events: none; transition: opacity .22s; }
.screen.active { opacity: 1; pointer-events: all; }
.scrollable { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.scrollable::-webkit-scrollbar { width: 3px; }
.scrollable::-webkit-scrollbar-thumb { background: var(--ln); border-radius: 999px; }

/* ── フッター ── */
#footer { position: fixed; left: 0; right: 0; bottom: 0; z-index: 200; padding-bottom: var(--safe-bottom); background: rgba(17,18,20,0.92); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); border-top: 1px solid var(--ln2); transition: opacity .2s, visibility .2s; }
#footer.modal-open { opacity: 0; visibility: hidden; pointer-events: none; }
.footer-inner { height: var(--footer-h); display: flex; align-items: center; }
.foot-btn { flex: 1; height: 100%; border: none; background: transparent; color: var(--t4); font-size: 10px; font-weight: 700; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; transition: color .18s, background .18s; font-family: 'Noto Sans JP', sans-serif; }
.foot-btn .icon { font-size: 18px; line-height: 1; }
.foot-btn.active { color: var(--accent4); background: rgba(255,255,255,0.04); }

/* ── 共通 ── */
.btn-action { width: 100%; height: 50px; border: none; border-radius: 14px; font-family: 'Noto Sans JP', sans-serif; font-size: 15px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: transform .1s, opacity .15s; }
.btn-action:active { transform: scale(.985); opacity: .8; }
.btn-action.primary   { background: #F2EEE8; color: #191A1D; }
.btn-action.secondary { background: rgba(255,255,255,0.055); color: var(--t1); border: 1px solid var(--ln); }
.btn-action.green     { background: linear-gradient(180deg,#F3EFE9,#E7DED1); color: #1A1B1E; }
.btn-action.danger    { background: rgba(201,143,143,0.18); color: #F4CECE; border: 1px solid rgba(201,143,143,0.22); }
.btn-action.warn      { background: rgba(216,184,156,0.18); color: var(--accent); border: 1px solid rgba(216,184,156,0.3); }

.stepper { display: flex; align-items: center; background: rgba(255,255,255,0.04); border-radius: 16px; overflow: hidden; border: 1px solid var(--ln); width: fit-content; }
.step-btn { width: 52px; height: 52px; border: none; background: transparent; color: var(--accent4); font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.step-btn:active { background: rgba(255,255,255,0.05); }
.step-val { min-width: 72px; height: 52px; border-left: 1px solid var(--ln); border-right: 1px solid var(--ln); font-family: 'Oswald', sans-serif; font-size: 30px; font-weight: 500; color: var(--t1); text-align: center; display: flex; align-items: center; justify-content: center; }

.inp-field { background: rgba(255,255,255,0.05); border: 1px solid var(--ln); color: var(--t1); font-family: 'Noto Sans JP', sans-serif; font-size: 15px; padding: 11px 13px; border-radius: 12px; outline: none; width: 100%; -webkit-appearance: none; }
.inp-field:focus { border-color: rgba(216,184,156,0.45); }
.inp-field::placeholder { color: var(--t4); }

#toast { position: fixed; left: 50%; bottom: calc(var(--safe-bottom) + var(--footer-h) + 8px); transform: translateX(-50%) translateY(70px); background: rgba(36,38,43,0.93); color: var(--t1); padding: 11px 20px; border-radius: 999px; font-size: 13px; font-weight: 700; z-index: 9999; transition: transform .28s, opacity .28s; box-shadow: var(--sh2); pointer-events: none; border: 1px solid var(--ln); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); opacity: 0; max-width: calc(100vw - 32px); text-align: center; }
#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
#toast.ok   { background: rgba(151,184,167,0.94); color: #172019; border-color: transparent; }
#toast.err  { background: rgba(201,143,143,0.94); color: #fff;    border-color: transparent; }
#toast.warn { background: rgba(216,184,156,0.96); color: #1A1B1E; border-color: transparent; }

.nbadge { border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Oswald', sans-serif; font-weight: 700; border: 2px solid; flex-shrink: 0; }
.nbadge.lg { width: 58px; height: 58px; font-size: 22px; }
.nbadge.md { width: 42px; height: 42px; font-size: 15px; }
.nbadge.sm { width: 32px; height: 32px; font-size: 12px; }

.gender-chip { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 800; border: 1px solid; }
.gender-chip.male   { background: var(--male-bg);   border-color: var(--male-bd);   color: var(--male-tx); }
.gender-chip.female { background: var(--female-bg); border-color: var(--female-bd); color: var(--female-tx); }
.gender-chip.none   { background: rgba(255,255,255,0.04); border-color: var(--ln); color: var(--t4); }

.sec-lbl { font-size: 11px; font-weight: 800; color: var(--t3); letter-spacing: .8px; text-transform: uppercase; margin-bottom: 6px; }
.status-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
.status-chip { display: inline-flex; align-items: center; padding: 5px 10px; border-radius: 999px; border: 1px solid var(--ln); background: rgba(255,255,255,0.04); font-size: 11px; font-weight: 700; color: var(--t2); }

/* ── モーダル（修正済み3層構造） ── */
.modal-overlay { position: fixed; inset: 0; z-index: 500; background: rgba(0,0,0,0.6); display: none; align-items: flex-end; justify-content: center; overflow: hidden; }
.modal-overlay.open { display: flex; }
.modal-sheet { background: #1A1C1F; border-radius: 24px 24px 0 0; width: 100%; max-width: 540px; max-height: 90dvh; box-shadow: 0 -4px 32px rgba(0,0,0,0.5); border-top: 1px solid var(--ln); display: flex; flex-direction: column; overflow: hidden; }
.modal-sheet-header { flex-shrink: 0; padding: 14px 20px 0; }
.modal-drag { width: 36px; height: 4px; border-radius: 2px; background: var(--ln); margin: 0 auto 14px; }
.modal-title { font-size: 18px; font-weight: 800; color: var(--t1); margin-bottom: 14px; }
.edit-tabs { display: flex; gap: 6px; padding-bottom: 12px; border-bottom: 1px solid var(--ln2); }
.edit-tab { flex: 1; height: 40px; border-radius: 12px; border: 1px solid var(--ln); background: rgba(255,255,255,0.04); color: var(--t3); font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: all .15s; }
.edit-tab.on { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); color: var(--t1); }
.modal-sheet-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px 20px; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.modal-sheet-footer { flex-shrink: 0; padding: 12px 20px; padding-bottom: calc(12px + var(--safe-bottom)); border-top: 1px solid var(--ln2); background: #1A1C1F; }
.modal-row { display: flex; gap: 10px; }
.modal-cancel { flex: 1; height: 46px; border-radius: 12px; border: 1px solid var(--ln); background: rgba(255,255,255,0.05); color: var(--t2); font-family: 'Noto Sans JP', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; }
.modal-submit { flex: 2; height: 46px; border-radius: 12px; border: none; background: #F2EEE8; color: #191A1D; font-family: 'Noto Sans JP', sans-serif; font-size: 15px; font-weight: 800; cursor: pointer; }
.btn-unassign { width: 100%; height: 40px; border-radius: 12px; border: 1px solid rgba(201,143,143,0.3); background: rgba(201,143,143,0.10); color: #E4B6B6; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; margin-top: 10px; }
.gender-toggle { display: flex; gap: 8px; margin-top: 8px; }
.gend-btn { flex: 1; height: 44px; border-radius: 12px; border: 1px solid var(--ln); background: rgba(255,255,255,0.04); font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; color: var(--t3); transition: all .15s; }
.gend-btn.active-male   { background: var(--male-bg);   border-color: var(--male-bd);   color: var(--male-tx); }
.gend-btn.active-female { background: var(--female-bg); border-color: var(--female-bd); color: var(--female-tx); }
.save-check-row { display: flex; align-items: center; gap: 10px; padding: 10px 2px; cursor: pointer; margin-top: 4px; }
.save-check-row input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; flex-shrink: 0; accent-color: var(--accent); }
.save-check-label { font-size: 13px; font-weight: 600; color: var(--t2); }
.saved-list { display: flex; flex-direction: column; gap: 8px; }
.saved-item { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.04); border: 1px solid var(--ln); border-radius: 14px; padding: 12px 14px; cursor: pointer; transition: all .15s; }
.saved-item:active { background: rgba(255,255,255,0.08); }
.saved-item.selected { border-color: rgba(216,184,156,0.55); background: rgba(216,184,156,0.10); }
.saved-item-name { flex: 1; font-size: 15px; font-weight: 700; color: var(--t1); }
.saved-item-check { font-size: 18px; color: var(--accent); opacity: 0; transition: opacity .15s; }
.saved-item.selected .saved-item-check { opacity: 1; }

/* ── ホーム ── */
#screen-setup .scrollable { padding: 0 0 24px; }
.setup-hero { padding: 20px 18px 16px; border-bottom: 1px solid var(--ln2); }
.setup-hero h1 { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 30px; color: var(--t1); letter-spacing: .5px; margin-bottom: 4px; }
.setup-hero p { font-size: 13px; color: var(--t2); }
.setup-area { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }
.setup-card { background: var(--card); border-radius: 20px; border: 1px solid var(--ln); box-shadow: var(--sh1); overflow: hidden; }
.setup-card-head { padding: 14px 16px 8px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.setup-card-title { font-size: 18px; font-weight: 800; color: var(--t1); }
.setup-card-summary { font-size: 13px; color: var(--t2); white-space: nowrap; }
.setup-card-body { padding: 0 16px 16px; }
.setup-help { font-size: 12px; color: var(--t3); margin-bottom: 12px; }
.count-row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 14px; }

/* ── コート設定カード ── */
.court-config-list { display: flex; flex-direction: column; gap: 12px; }
.court-config-row { background: rgba(255,255,255,0.03); border-radius: 18px; border: 1px solid var(--ln); overflow: hidden; }
.court-config-top { display: flex; align-items: center; gap: 10px; padding: 12px 12px 8px; }
.court-config-name-inp { flex: 1; background: transparent; border: none; color: var(--t1); font-family: 'Noto Sans JP', sans-serif; font-size: 15px; font-weight: 800; outline: none; min-width: 60px; }
.court-config-name-inp::placeholder { color: var(--t4); }
.court-config-seg { padding: 0 12px 8px; }

/* セグメント2列（使用/未使用） */
.seg2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

/* コートpolicy用4列 */
.seg4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }

.seg-btn { height: 38px; border-radius: 12px; border: 1px solid var(--ln); background: rgba(255,255,255,0.04); color: var(--accent4); font-size: 12px; font-weight: 800; cursor: pointer; transition: all .15s; font-family: 'Noto Sans JP', sans-serif; }
.seg-btn.on { background: #F2EEE8; border-color: transparent; color: #191A1D; box-shadow: var(--sh1); }

/* policyラベル行 */
.court-policy-lbl { font-size: 10px; font-weight: 800; color: var(--t3); letter-spacing: .5px; text-transform: uppercase; padding: 0 12px 6px; }

/* セッション管理ボタン行 */
.session-btns { display: flex; flex-direction: column; gap: 8px; }

/* ── 参加者 ── */
#screen-players .scrollable { padding: 14px 16px 24px; }
.players-header { margin-bottom: 14px; }
.players-header-title { font-size: 16px; font-weight: 800; color: var(--t1); margin-bottom: 4px; }
.players-header-sub { font-size: 12px; color: var(--t3); }
.pgrid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
.pcard { background: var(--card); border: 1px solid var(--ln); border-radius: 20px; padding: 14px 12px 12px; display: flex; flex-direction: column; align-items: center; gap: 8px; position: relative; text-align: center; box-shadow: var(--sh1); cursor: pointer; }
.pcard:active { opacity: .85; }
.pcard.empty-slot { border-style: dashed; opacity: .8; }
.pcard.inactive { opacity: .4; }
.pcard-name { font-size: 15px; font-weight: 800; color: var(--t1); word-break: break-all; }
.pcard-name.unset { color: var(--t4); font-style: italic; }
.pcard-wait { font-size: 12px; color: var(--t3); font-weight: 600; }
.pcard-edit-hint { font-size: 10px; color: var(--t4); font-weight: 600; }
.p-exit-btn { width: 100%; height: 36px; border-radius: 12px; border: none; font-size: 13px; font-weight: 800; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; }
.p-exit-btn.exit   { background: rgba(201,143,143,0.14); color: #E4B6B6; border: 1px solid rgba(201,143,143,0.2); }
.p-exit-btn.rejoin { background: rgba(151,184,167,0.14); color: #C9E1D4; border: 1px solid rgba(151,184,167,0.2); }

/* ── ゲーム ── */
#screen-game .scrollable { padding: 0 0 20px; }
.game-actions { display: flex; gap: 10px; padding: 12px 16px; flex-shrink: 0; background: rgba(17,18,20,0.7); border-bottom: 1px solid var(--ln2); }
.court-game-card { background: var(--card); border-radius: 20px; border: 1px solid var(--ln); box-shadow: var(--sh1); overflow: hidden; }
.court-game-header { padding: 12px 14px; border-bottom: 1px solid var(--ln2); display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.court-game-name { font-size: 20px; font-weight: 800; color: var(--t1); }
.court-type-chip { font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 999px; background: rgba(216,184,156,0.12); color: var(--accent); border: 1px solid rgba(216,184,156,0.18); white-space: nowrap; }
.match-display { padding: 14px; }
.match-teams { display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; align-items: stretch; }
.team-col { background: rgba(255,255,255,0.04); border: 1px solid var(--ln); border-radius: 16px; padding: 10px; display: flex; flex-direction: column; gap: 6px; min-height: 110px; }
.team-label { font-size: 10px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--t3); margin-bottom: 2px; }
.vs-col { display: flex; align-items: center; justify-content: center; }
.vs-label { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 24px; color: var(--t1); }
.player-row { display: flex; align-items: center; gap: 8px; padding: 6px 5px; border-radius: 12px; background: rgba(255,255,255,0.03); }
.player-info { flex: 1; min-width: 0; }
.player-name { font-size: 14px; font-weight: 800; color: var(--t1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.player-sub { font-size: 10px; color: var(--t3); margin-top: 1px; }
.rest-section { margin: 0 16px 12px; background: var(--card); border-radius: 18px; border: 1px solid var(--ln); overflow: hidden; }
.rest-header { padding: 10px 14px; border-bottom: 1px solid var(--ln2); font-size: 14px; font-weight: 800; color: var(--t1); }
.rest-players { padding: 10px 14px 12px; display: flex; flex-wrap: wrap; gap: 8px; }
.rest-chip { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.04); border: 1px solid var(--ln); border-radius: 12px; padding: 6px 10px; }
.rest-chip-name { font-size: 13px; font-weight: 700; color: var(--t1); }
.rest-chip-sub  { font-size: 10px; color: var(--t3); }
.game-courts-wrap { padding: 0 16px; display: flex; flex-direction: column; gap: 12px; }

/* ── 進行/履歴 ── */
#screen-schedule .scrollable, #screen-history .scrollable { padding: 12px 16px 24px; }
.sched-inner, .hist-inner { display: flex; flex-direction: column; gap: 10px; }
.timeline-head { background: var(--card); border-radius: 18px; border: 1px solid var(--ln); box-shadow: var(--sh1); padding: 12px 16px; }
.timeline-head-title { font-size: 17px; font-weight: 800; color: var(--t1); margin-bottom: 3px; }
.timeline-head-sub   { font-size: 12px; color: var(--t2); }
.sc-card { background: var(--card); border-radius: 20px; border: 1px solid var(--ln); overflow: hidden; box-shadow: var(--sh1); }
.sc-card.cur  { border-color: rgba(216,184,156,0.28); box-shadow: 0 0 0 1px rgba(216,184,156,0.18),var(--sh1); }
.sc-card.next { border-color: rgba(158,177,199,0.28); box-shadow: 0 0 0 1px rgba(158,177,199,0.16),var(--sh1); }
.sc-head { padding: 11px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--ln2); }
.sc-round { font-size: 16px; font-weight: 800; color: var(--t1); }
.sc-badge { font-size: 10px; font-weight: 800; padding: 3px 9px; border-radius: 999px; background: rgba(255,255,255,0.06); color: var(--t2); }
.sc-card.cur  .sc-badge { background: rgba(216,184,156,0.16); color: var(--accent); }
.sc-card.next .sc-badge { background: rgba(158,177,199,0.14); color: #C7D2DE; }
.sc-body { padding: 10px 14px; display: flex; flex-direction: column; gap: 8px; }
.sc-court-block { background: rgba(255,255,255,0.03); border-radius: 14px; overflow: hidden; border: 1px solid var(--ln2); }
.sc-court-nm { padding: 7px 10px; font-size: 11px; font-weight: 800; color: var(--t3); border-bottom: 1px solid var(--ln2); display: flex; align-items: center; justify-content: space-between; }
.sc-vs-grid { padding: 10px; display: flex; flex-direction: column; gap: 6px; }
.sc-team { display: flex; flex-direction: column; gap: 3px; }
.sc-player { font-size: 14px; font-weight: 700; color: var(--t1); line-height: 1.5; word-break: break-word; }
.sc-player.emp { color: var(--t4); font-style: italic; }
.sc-vs-txt { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 20px; color: var(--t2); text-align: center; padding: 2px 0; }
.sc-rest { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 8px 10px; border: 1px solid var(--ln2); }
.sc-rest-lbl   { font-size: 10px; font-weight: 800; color: var(--t3); margin-bottom: 3px; }
.sc-rest-names { font-size: 12px; font-weight: 700; color: var(--t2); }
.hcard { background: var(--card); border-radius: 20px; border: 1px solid var(--ln); overflow: hidden; box-shadow: var(--sh1); }
.hhead { padding: 11px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--ln2); font-size: 15px; font-weight: 800; color: var(--t1); }
.hbody { padding: 10px 14px 14px; display: flex; flex-direction: column; gap: 8px; }
.hrow { padding: 10px; border: 1px solid var(--ln2); border-radius: 12px; background: rgba(255,255,255,0.025); font-size: 12px; display: flex; flex-direction: column; gap: 4px; }
.hct { font-size: 11px; font-weight: 800; color: var(--t3); }
.hpl { color: var(--t2); line-height: 1.5; font-size: 13px; font-weight: 600; }

@media (max-width: 380px) {
  .setup-hero h1 { font-size: 26px; }
  .logo { font-size: 22px; }
  .hnav-btn { padding: 0 10px; font-size: 12px; }
  .seg4 { grid-template-columns: repeat(2, 1fr); }
}

  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="header-inner">
      <div class="logo">PB</div>
      <div class="header-nav">
        <button class="hnav-btn active" onclick="gotoScreen('setup')"   id="hnav-setup">ホーム</button>
        <button class="hnav-btn"        onclick="gotoScreen('game')"    id="hnav-game">ゲーム</button>
        <button class="hnav-btn"        onclick="gotoScreen('players')" id="hnav-players">参加者</button>
      </div>
      <div class="game-badge" id="game-badge">第1ゲーム</div>
    </div>
  </div>

  <div id="main">

<!-- ── ホーム ── -->
<div id="screen-setup" class="screen active">
  <div class="scrollable">
    <div class="setup-hero">
      <h1>Pickleball Manager</h1>
      <p>まず参加人数を決めて、No.枠を作成してください</p>
    </div>
    <div class="setup-area">

      <!-- 参加人数 -->
      <div class="setup-card">
        <div class="setup-card-head">
          <div class="setup-card-title">参加人数</div>
          <div class="setup-card-summary" id="setup-player-summary">0名</div>
        </div>
        <div class="setup-card-body">
          <div class="setup-help">当日の参加人数を決めてNo.枠を作成します（0〜30名）</div>
          <div class="count-row">
            <div class="stepper">
              <button class="step-btn" onclick="adjPlayers(-1)">−</button>
              <div class="step-val" id="player-count-disp">0</div>
              <button class="step-btn" onclick="adjPlayers(1)">＋</button>
            </div>
            <span style="font-size:13px;color:var(--t2)">名</span>
          </div>
          <button class="btn-action primary" onclick="applyPlayerCount()">
            📋 当日のNo.枠を作成 / 更新する
          </button>
          <div class="status-chips" id="setup-player-chips"></div>
        </div>
      </div>

      <!-- コート設定 -->
      <div class="setup-card">
        <div class="setup-card-head">
          <div class="setup-card-title">コート設定</div>
          <div class="setup-card-summary" id="setup-court-summary">2面</div>
        </div>
        <div class="setup-card-body">
          <div class="setup-help">コート数・名前・優先属性を設定します</div>
          <div class="count-row">
            <div class="stepper">
              <button class="step-btn" onclick="adjCourts(-1)">−</button>
              <div class="step-val" id="court-count-disp">2</div>
              <button class="step-btn" onclick="adjCourts(1)">＋</button>
            </div>
            <span style="font-size:13px;color:var(--t2)">面（1〜6）</span>
          </div>
          <div class="court-config-list" id="court-config-list"></div>
          <div style="margin-top:12px">
            <button class="btn-action primary" onclick="saveCourts()">コートを保存する</button>
          </div>
        </div>
      </div>

      <!-- ゲーム開始 -->
      <div class="setup-card">
        <div class="setup-card-head">
          <div class="setup-card-title">開始準備</div>
          <div class="setup-card-summary">自動配置</div>
        </div>
        <div class="setup-card-body">
          <div class="setup-help">No.枠の設定が完了したら自動配置でゲームを開始します</div>
          <button class="btn-action green" onclick="doAutoAssign()" style="height:54px;font-size:17px;">
            🔀 自動配置してゲーム開始
          </button>
          <div class="status-chips" id="setup-status-chips"></div>
        </div>
      </div>

      <!-- セッション管理（新規追加） -->
      <div class="setup-card">
        <div class="setup-card-head">
          <div class="setup-card-title">セッション管理</div>
          <div class="setup-card-summary" id="session-round-label">第1ゲーム</div>
        </div>
        <div class="setup-card-body">
          <div class="setup-help">午前・夜など別開催はセッションをリセットしてください</div>
          <div class="session-btns">
            <!-- A. 新しい会を開始（完全リセット） -->
            <button class="btn-action danger" onclick="confirmStartNewSession()">
              🆕 新しい会を開始（完全リセット）
            </button>
            <!-- B. 試合履歴だけリセット（参加者は残す） -->
            <button class="btn-action warn" onclick="confirmResetMatchHistory()">
              🔄 今回の履歴だけリセット
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- ── ゲーム ── -->
<div id="screen-game" class="screen">
  <div class="game-actions">
    <button class="btn-action secondary" style="flex:1" onclick="doAutoAssign()">🔀 再配置</button>
    <button class="btn-action primary"   style="flex:1" onclick="nextRound()">次のゲーム ▶</button>
  </div>
  <div class="scrollable">
    <div class="game-courts-wrap" id="game-courts" style="padding-top:14px;"></div>
  </div>
</div>

<!-- ── 参加者 ── -->
<div id="screen-players" class="screen">
  <div class="scrollable">
    <div class="players-header">
      <div class="players-header-title">当日参加者 No.枠一覧</div>
      <div class="players-header-sub">各カードをタップしてニックネーム・性別・保存済み参加者の割り当てを設定できます</div>
    </div>
    <div class="pgrid" id="pgrid"></div>
  </div>
</div>

<!-- ── 進行 ── -->
<div id="screen-schedule" class="screen">
  <div class="scrollable">
    <div class="sched-inner" id="sched-scroll"></div>
  </div>
</div>

<!-- ── 履歴 ── -->
<div id="screen-history" class="screen">
  <div class="scrollable">
    <div class="hist-inner" id="hist-scroll"></div>
  </div>
</div>

  </div>

  <div id="footer">
    <div class="footer-inner">
      <button class="foot-btn"        onclick="gotoScreen('schedule')" id="fnav-schedule"><span class="icon">📅</span>進行</button>
      <button class="foot-btn active" onclick="gotoScreen('setup')"    id="fnav-setup">   <span class="icon">🏠</span>ホーム</button>
      <button class="foot-btn"        onclick="gotoScreen('history')"  id="fnav-history"> <span class="icon">📋</span>履歴</button>
    </div>
  </div>

  <!-- No.枠編集モーダル -->

  <div class="modal-overlay" id="modal-edit" onclick="handleOverlay(event,'modal-edit')">
    <div class="modal-sheet">
      <div class="modal-sheet-header">
        <div class="modal-drag"></div>
        <div class="modal-title" id="edit-modal-title">No.1 を編集</div>
        <div class="edit-tabs">
          <button class="edit-tab on" id="tab-manual-btn" onclick="switchTab('manual')">✏️ 直接入力</button>
          <button class="edit-tab"    id="tab-saved-btn"  onclick="switchTab('saved')">📂 保存済みから選ぶ</button>
        </div>
      </div>
      <div class="modal-sheet-body">
        <div class="tab-content active" id="tab-manual">
          <div style="margin-bottom:14px;">
            <div class="sec-lbl">ニックネーム</div>
            <input class="inp-field" id="edit-nick-inp" type="text" placeholder="ニックネームを入力" maxlength="20" onkeydown="if(event.key==='Enter')saveManualEdit()">
          </div>
          <div style="margin-bottom:4px;">
            <div class="sec-lbl">性別</div>
            <div class="gender-toggle">
              <button class="gend-btn" id="edit-gender-male"   onclick="setEditGender('male')">♂ 男性</button>
              <button class="gend-btn" id="edit-gender-female" onclick="setEditGender('female')">♀ 女性</button>
            </div>
          </div>
          <label class="save-check-row">
            <input type="checkbox" id="edit-save-chk" checked>
            <span class="save-check-label">保存して次回も使えるようにする</span>
          </label>
        </div>
        <div class="tab-content" id="tab-saved">
          <div class="saved-list" id="edit-saved-list"></div>
          <button class="btn-unassign" id="btn-unassign" onclick="unassignSlot()" style="display:none;">🗑 割り当てを解除する</button>
        </div>
      </div>
      <div class="modal-sheet-footer">
        <div class="modal-row">
          <button class="modal-cancel" onclick="closeEditModal()">キャンセル</button>
          <button class="modal-submit" id="modal-submit-btn" onclick="handleModalSubmit()">この内容で設定する</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast"></div>
</div>

<script>
// ============================================================
// ■ データ定義
// ============================================================

// savedParticipants: 永続保存（セッションをまたいで維持）
// { id, nickName, gender }
var savedParticipants = [];

// todayParticipants: 当日No.枠の固定長配列
// push()で人数が増える設計ではない
var todayParticipants = [];

// S: セッション状態（開催単位でリセット可能な部分を含む）
var S = {
  courts: [
    { name: '手前コート', mode: 'doubles', policy: 'normal', teams: [[], []] },
    { name: '中央コート', mode: 'doubles', policy: 'normal', teams: [[], []] }
  ],
  rounds: [], futureRounds: [], currentRound: 0,
  // 【改善】開催内の累積履歴（キー: "no1-no2" 形式）
  courtGroupHist: [],  // コートごとのグループ出現回数
  pairHist: {},        // ペア出現回数
  oppHist:  {},        // 対戦出現回数
  courtCount: 2, playerCount: 0
};

// コート設定の作業用バッファ（保存前の一時データ）
var tmpCourtConfig = [
  { name: '手前コート', mode: 'doubles', policy: 'normal' },
  { name: '中央コート', mode: 'doubles', policy: 'normal' }
];
var _courtCount  = 2;
var _playerCount = 0;
var _defaultCourtNames = ['手前コート','中央コート','奥コート','第4コート','第5コート','第6コート'];

// 編集モーダル状態
var _editTargetNo = null, _editGender = 'male', _editTab = 'manual', _editSelectedSavedId = null;

// ============================================================
// ■ localStorage
// ============================================================

// 永続保存（セッションをまたぐ）
function saveSavedParticipants() {
  try { localStorage.setItem('pb_saved', JSON.stringify(savedParticipants)); } catch(e){}
}
function loadSavedParticipants() {
  try { var r=localStorage.getItem('pb_saved'); if(r) savedParticipants=JSON.parse(r); } catch(e){}
}

// コート設定は永続保存（セッションをまたぐ）
function saveCourtConfig() {
  try { localStorage.setItem('pb_courts', JSON.stringify({ tmpCourtConfig:tmpCourtConfig, _courtCount:_courtCount })); } catch(e){}
}
function loadCourtConfig() {
  try {
    var r=localStorage.getItem('pb_courts');
    if (!r) return;
    var d=JSON.parse(r);
    if (d.tmpCourtConfig) tmpCourtConfig=d.tmpCourtConfig;
    if (typeof d._courtCount==='number') _courtCount=d._courtCount;
  } catch(e){}
}

// セッションデータ（開催単位）
function saveSession() {
  try {
    localStorage.setItem('pb_session', JSON.stringify({
      S:S, todayParticipants:todayParticipants, _playerCount:_playerCount
    }));
  } catch(e){}
}
function loadSession() {
  try {
    var r=localStorage.getItem('pb_session');
    if (!r) return;
    var d=JSON.parse(r);
    if (d.S)                  S                 = d.S;
    if (d.todayParticipants)  todayParticipants = d.todayParticipants;
    if (typeof d._playerCount==='number') _playerCount=d._playerCount;
  } catch(e){}
}

// ============================================================
// ■ セッション管理（新規追加）
// ============================================================

/**
 * A. 新しい会を開始（完全リセット）
 * - todayParticipants をクリア
 * - 全履歴をリセット
 * - savedParticipants / コート設定は維持
 */
function startNewSession() {
  todayParticipants = [];
  _playerCount = 0;
  S.rounds         = [];
  S.futureRounds   = [];
  S.currentRound   = 0;
  S.pairHist       = {};
  S.oppHist        = {};
  S.courtGroupHist = S.courts.map(function(){ return {}; });
  S.courts.forEach(function(c){ c.teams = [[], []]; });
  saveSession();
  renderAll();
  showToast('新しい会を開始しました', 'ok');
}

/**
 * B. 今回の履歴だけリセット
 * - todayParticipants のNo.枠・nickName・gender・activeは維持
 * - 試合履歴・待機カウントのみリセット
 */
function resetMatchHistory() {
  S.rounds         = [];
  S.futureRounds   = [];
  S.currentRound   = 0;
  S.pairHist       = {};
  S.oppHist        = {};
  S.courtGroupHist = S.courts.map(function(){ return {}; });
  S.courts.forEach(function(c){ c.teams = [[], []]; });
  todayParticipants.forEach(function(p) {
    p.waitingCount        = 0;
    p.lastWaited          = false;
    // 【追加】連続休みカウントもリセット
    p.consecutiveWaitCount = 0;
    p.lastPartnerNos      = [];
    p.lastOpponentNos     = [];
    p.recentPartnerNos    = [];
    p.recentOpponentNos   = [];
  });
  saveSession();
  renderAll();
  showToast('履歴をリセットしました', 'ok');
}

/** 確認ダイアログ付きセッション開始 */
function confirmStartNewSession() {
  if (confirm('新しい会を開始します。\n参加者・試合履歴をすべてリセットします。\nコート設定と保存済み参加者は残ります。\n\nよろしいですか？')) {
    startNewSession();
  }
}

/** 確認ダイアログ付き履歴リセット */
function confirmResetMatchHistory() {
  if (confirm('今回の試合履歴をリセットします。\n参加者枠・ニックネーム・性別・退場状態は残ります。\n\nよろしいですか？')) {
    resetMatchHistory();
  }
}

/** 全画面を一括再描画（セッション操作後などに使用） */
function renderAll() {
  document.getElementById('game-badge').textContent = '第'+(S.currentRound+1)+'ゲーム';
  renderSetup();
  renderPlayers();
  renderGame();
  renderSched();
  renderHistory();
}

// ============================================================
// ■ 画面遷移
// ============================================================

var SCREENS=['setup','game','players','schedule','history'];
var HNAV=['setup','game','players'], FNAV=['schedule','setup','history'];

function gotoScreen(name) {
  SCREENS.forEach(function(s){
    var el=document.getElementById('screen-'+s); if(el) el.classList.toggle('active',s===name);
  });
  HNAV.forEach(function(n){ var b=document.getElementById('hnav-'+n); if(b) b.classList.toggle('active',n===name); });
  FNAV.forEach(function(n){ var b=document.getElementById('fnav-'+n); if(b) b.classList.toggle('active',n===name); });
  if(name==='setup')    renderSetup();
  if(name==='players')  renderPlayers();
  if(name==='game')     renderGame();
  if(name==='schedule') renderSched();
  if(name==='history')  renderHistory();
}

// ============================================================
// ■ バッジ・ラベルユーティリティ
// ============================================================

function pColor(no) {
  var hs=[355,20,45,80,140,180,210,250,290,320,10,60,160,235,300,35,160,200];
  var h=hs[(no-1)%hs.length];
  return{bg:'hsla('+h+',55%,65%,0.20)',bd:'hsla('+h+',55%,60%,0.72)',tx:'hsl('+h+',72%,72%)'};
}
function makeBadge(no,size){
  var col=pColor(no),d=document.createElement('div');
  d.className='nbadge '+(size||'md');
  d.style.background=col.bg; d.style.borderColor=col.bd; d.style.color=col.tx; d.textContent=no;
  return d;
}
function displayName(p){ return (!p)?'—':(p.nickName?p.nickName:'No.'+p.no); }
function pLabel(p){
  if(!p) return '—';
  var tp=(typeof p==='object'&&p.no!==undefined)?p:findByNo(p);
  if(!tp) return 'No.'+p;
  return tp.nickName?(tp.nickName+'（No.'+tp.no+'）'):('No.'+tp.no);
}
function findByNo(no){ return todayParticipants.find(function(x){return x.no===no;})||null; }
function genderChipHtml(g){
  if(g==='male')   return '<span class="gender-chip male">♂ 男</span>';
  if(g==='female') return '<span class="gender-chip female">♀ 女</span>';
  return '<span class="gender-chip none">未設定</span>';
}

/**
 * コートpolicyのラベルを返す
 */
function policyLabel(policy) {
  return {normal:'通常',men_priority:'男子優先',women_priority:'女子優先',mixed_priority:'ミックス優先'}[policy]||'通常';
}

// ============================================================
// ■ ホーム画面
// ============================================================

function renderSetup() {
  document.getElementById('player-count-disp').textContent=_playerCount;
  document.getElementById('setup-player-summary').textContent=todayParticipants.length+'名';
  document.getElementById('court-count-disp').textContent=_courtCount;
  document.getElementById('setup-court-summary').textContent=_courtCount+'面';
  document.getElementById('session-round-label').textContent='第'+(S.currentRound+1)+'ゲーム';

  var chipsEl=document.getElementById('setup-player-chips');
  if(chipsEl){
    var total=todayParticipants.length,
        named=todayParticipants.filter(function(p){return !!p.nickName;}).length,
        active=todayParticipants.filter(function(p){return p.active;}).length,
        males=todayParticipants.filter(function(p){return p.gender==='male';}).length,
        females=todayParticipants.filter(function(p){return p.gender==='female';}).length;
    chipsEl.innerHTML=
      '<span class="status-chip">枠 '+total+'個</span>'+
      '<span class="status-chip">名前設定 '+named+'名</span>'+
      '<span class="status-chip">参加中 '+active+'名</span>'+
      '<span class="status-chip" style="color:var(--male-tx)">♂ '+males+'</span>'+
      '<span class="status-chip" style="color:var(--female-tx)">♀ '+females+'</span>';
  }
  var statusEl=document.getElementById('setup-status-chips');
  if(statusEl){
    var usedCourts=S.courts.filter(function(c){return c.mode!=='unused';}).length;
    statusEl.innerHTML=
      '<span class="status-chip">参加中 '+todayParticipants.filter(function(p){return p.active;}).length+'名</span>'+
      '<span class="status-chip">使用コート '+usedCourts+'面</span>'+
      '<span class="status-chip">ゲーム '+S.currentRound+'回完了</span>';
  }
  renderCourtConfig1();
}

function adjPlayers(d){
  _playerCount=Math.max(0,Math.min(30,_playerCount+d));
  document.getElementById('player-count-disp').textContent=_playerCount;
}

function applyPlayerCount(){
  var newN=_playerCount, oldN=todayParticipants.length;
  if(newN===oldN){showToast('No.枠の数は変わりません（'+newN+'名）','warn');return;}
  if(newN>oldN){
    for(var no=oldN+1;no<=newN;no++) todayParticipants.push(makeEmptySlot(no));
    showToast('No.'+(oldN+1)+'〜No.'+newN+' の枠を追加しました','ok');
  } else {
    todayParticipants.splice(newN);
    showToast('No.'+(newN+1)+'〜No.'+oldN+' の枠を削除しました','ok');
  }
  S.playerCount=newN;
  saveSession();
  renderSetup();
  renderPlayers();
}

function makeEmptySlot(no){
  // 【追加】consecutiveWaitCount: 連続休み回数（出場したら0にリセット）
  return{no:no,participantId:null,nickName:'',gender:'',active:true,
    waitingCount:0,lastWaited:false,consecutiveWaitCount:0,
    lastPartnerNos:[],lastOpponentNos:[],recentPartnerNos:[],recentOpponentNos:[]};
}

// ============================================================
// ■ コート設定（per-court policy 対応）
// ============================================================

function adjCourts(d){
  _courtCount=Math.max(1,Math.min(6,_courtCount+d));
  document.getElementById('court-count-disp').textContent=_courtCount;
  while(tmpCourtConfig.length<_courtCount){
    var idx=tmpCourtConfig.length;
    tmpCourtConfig.push({name:_defaultCourtNames[idx]||('第'+(idx+1)+'コート'),mode:'doubles',policy:'normal'});
  }
  renderCourtConfig1();
}

function renderCourtConfig1(){
  var list=document.getElementById('court-config-list');
  if(!list) return;
  list.innerHTML='';
  for(var i=0;i<_courtCount;i++) list.appendChild(buildCourtConfigCard(i));
}

/**
 * コート設定カードを生成する
 * 【変更】policy選択UIを追加（4択セグメント）
 */
function buildCourtConfigCard(idx){
  var cfg=tmpCourtConfig[idx];
  var row=document.createElement('div'); row.className='court-config-row';

  // コート名入力
  var top=document.createElement('div'); top.className='court-config-top';
  var inp=document.createElement('input');
  inp.className='court-config-name-inp'; inp.type='text'; inp.value=cfg.name; inp.placeholder='コート名';
  inp.oninput=(function(i){return function(){tmpCourtConfig[i].name=this.value;};})(idx);
  top.appendChild(inp);
  row.appendChild(top);

  // 使用/未使用セグメント
  var seg=document.createElement('div'); seg.className='court-config-seg';
  var segBtns=document.createElement('div'); segBtns.className='seg2';
  [{k:'doubles',l:'ダブルス'},{k:'unused',l:'未使用'}].forEach(function(m){
    var btn=document.createElement('button');
    btn.className='seg-btn'+(cfg.mode===m.k?' on':''); btn.textContent=m.l;
    btn.onclick=(function(i,mk){return function(){
      tmpCourtConfig[i].mode=mk; renderCourtConfig1();
    };})(idx,m.k);
    segBtns.appendChild(btn);
  });
  seg.appendChild(segBtns);
  row.appendChild(seg);

  // 【新規】優先属性セグメント（4択）
  if(cfg.mode!=='unused'){
    var policyLblEl=document.createElement('div'); policyLblEl.className='court-policy-lbl';
    policyLblEl.textContent='優先属性';
    row.appendChild(policyLblEl);

    var polySeg=document.createElement('div'); polySeg.className='court-config-seg';
    var polyBtns=document.createElement('div'); polyBtns.className='seg4';
    [
      {k:'normal',        l:'通常'},
      {k:'men_priority',  l:'♂男子'},
      {k:'women_priority',l:'♀女子'},
      {k:'mixed_priority',l:'⚥MIX'}
    ].forEach(function(m){
      var btn=document.createElement('button');
      btn.className='seg-btn'+(cfg.policy===m.k?' on':''); btn.textContent=m.l;
      btn.onclick=(function(i,pk){return function(){
        tmpCourtConfig[i].policy=pk; renderCourtConfig1();
      };})(idx,m.k);
      polyBtns.appendChild(btn);
    });
    polySeg.appendChild(polyBtns);
    row.appendChild(polySeg);
  }

  return row;
}

}

// ============================================================
// ■ 自動配置ロジック
// ============================================================

/** pairHistのキーを生成（no小-no大で統一） */
function pairKey(a, b) { return Math.min(a,b)+'-'+Math.max(a,b); }

/** 4人グループのキーを生成 */
function groupKey(players) {
  return players.filter(Boolean).map(function(p){return p.no;}).sort(function(a,b){return a-b;}).join('-');
}

/**
 * sortByPriority: 出場優先順でソート
 *
 * 【追加】優先順位:
 *   1. consecutiveWaitCount 降順（連続休み中の人を最優先）
 *   2. waitingCount 降順（累計待機回数）
 *   3. lastWaited 優先（前回待機）
 *   4. no 昇順（タイブレーク）
 */
function sortByPriority(players) {
  return players.slice().sort(function(a,b){
    // 1. 連続休み回数の多い人を最優先
    var ca=a.consecutiveWaitCount||0, cb=b.consecutiveWaitCount||0;
    if(cb!==ca) return cb-ca;
    // 2. 累計待機回数
    if(b.waitingCount!==a.waitingCount) return b.waitingCount-a.waitingCount;
    // 3. 前回待機フラグ
    if(a.lastWaited!==b.lastWaited) return (a.lastWaited?0:1)-(b.lastWaited?0:1);
    // 4. No.順
    return a.no-b.no;
  });
}

/**
 * doAutoAssign: 自動配置メインエントリ
 *
 * 【追加】consecutiveWaitCount を更新する
 * 【追加】consecutiveWaitCount>=2 の人を安全装置で優先出場させる
 */
function doAutoAssign() {
  var active=todayParticipants.filter(function(p){return p.active;});
  if(active.length<4){showToast('参加中の人が4名以上必要です（現在 '+active.length+'名）','err');return;}
  var usedCourts=S.courts.filter(function(c){return c.mode!=='unused';});
  if(!usedCourts.length){showToast('使用コートを設定してください','err');return;}
  var totalNeeded=usedCourts.length*4;
  if(active.length<totalNeeded){showToast('参加者が不足しています（必要 '+totalNeeded+'名 / 参加中 '+active.length+'名）','err');return;}

  var sorted=sortByPriority(active);
  var result=assignCourts(sorted, usedCourts, S.pairHist, S.oppHist, S.courtGroupHist);

  // 出場者NoのMap
  var onCourtNos={};
  result.forEach(function(ca){
    ((ca[0]||[]).concat(ca[1]||[])).filter(Boolean).forEach(function(p){onCourtNos[p.no]=true;});
  });

  // 【追加】consecutiveWaitCount の更新（出場→0 / 休み→+1）
  todayParticipants.forEach(function(p){
    if(!p.active) return;
    if(onCourtNos[p.no]){
      p.lastWaited=false;
      p.consecutiveWaitCount=0; // 出場したらリセット
    } else {
      p.waitingCount++;
      p.lastWaited=true;
      p.consecutiveWaitCount=(p.consecutiveWaitCount||0)+1; // 連続休みカウントUP
    }
  });

  var usedIdx=0;
  S.courts.forEach(function(court){
    if(court.mode==='unused'){court.teams=[[],[]];return;}
    court.teams=result[usedIdx]||[[],[]]; usedIdx++;
  });

  computeFuture();
  saveSession();
  renderGame(); renderSched();
  gotoScreen('game');
  showToast('自動配置が完了しました','ok');
}

/**
 * assignCourts: コートごとに4人を割り当てる
 *
 * 処理順: mixed_priority → men/women_priority → normal
 * （制約が厳しいコートを先に処理して満たしやすくする）
 */
function assignCourts(sorted, courts, pH, oH, cgH) {
  // 【バグ修正】mixed_priority の値が 0 (falsy) のため、|| 2 で誤って 2 に置き換わっていた。
  // undefined チェックに変更し、0 が正しく 0 として扱われるようにする。
  var policyOrder={mixed_priority:0,men_priority:1,women_priority:1,normal:2};
  var courtOrder=courts.map(function(c,i){return{court:c,origIdx:i};})
    .sort(function(a,b){
      var pa=policyOrder[a.court.policy||'normal']; if(pa===undefined) pa=2;
      var pb=policyOrder[b.court.policy||'normal']; if(pb===undefined) pb=2;
      return pa-pb;
    });

  var rem=sorted.slice();
  var assignments=new Array(courts.length);

  courtOrder.forEach(function(item){
    if(rem.length<4){assignments[item.origIdx]=[[],[]];return;}
    var court=item.court;
    var courtIdx=S.courts.indexOf(court);
    var group=selectBestGroup(rem, court, courtIdx, pH, oH, cgH);
    group.forEach(function(p){var idx=rem.indexOf(p);if(idx!==-1)rem.splice(idx,1);});
    assignments[item.origIdx]=bestPairing(group, court.policy, pH, oH);
  });

  return assignments;
}

/**
 * selectBestGroup: コートに入れる最良の4人を選ぶ
 *
 * 【mixed_priority 厳密化】
 *   - 男2女2の全組み合わせを生成して評価（男女比を保証）
 *   - 成立しない場合のみ通常フォールバック
 *
 * 【連続休み安全装置】
 *   - consecutiveWaitCount>=2 の人が候補プールに入るよう優先確保
 */
function selectBestGroup(rem, court, courtIdx, pH, oH, cgH) {
  var policy=court.policy||'normal';

  // ── mixed_priority: 必ず男2女2の組み合わせで評価 ──
  if(policy==='mixed_priority'){
    var males  =rem.filter(function(p){return p.gender==='male';});
    var females=rem.filter(function(p){return p.gender==='female';});

    if(males.length>=2&&females.length>=2){
      // 男2+女2 の全組み合わせを生成してスコア評価
      var mCombos=getCombinations(males.slice(0,6),2);   // 男6人上位まで
      var fCombos=getCombinations(females.slice(0,6),2); // 女6人上位まで

      var bestGroup=null, bestScore=-Infinity;
      mCombos.forEach(function(mc){
        fCombos.forEach(function(fc){
          var group=mc.concat(fc);
          var score=calcGroupScore(group, courtIdx, pH, oH, cgH);
          // 【加点】連続休みの人が含まれるほど加点
          group.forEach(function(p){
            score+=(p.consecutiveWaitCount||0)*150;
          });
          if(score>bestScore){bestScore=score;bestGroup=group;}
        });
      });
      if(bestGroup) return bestGroup;
      // フォールバック: 男2+女2の先頭をそのまま使う
      return [males[0],males[1],females[0],females[1]];
    }
    // 男女が足りなければ通常ロジックへフォールバック
  }

  // ── men_priority / women_priority ──
  if(policy==='men_priority'){
    var males2=rem.filter(function(p){return p.gender==='male';});
    if(males2.length>=4) return selectFromPool(males2, courtIdx, pH, oH, cgH);
    // 足りなければ通常へフォールバック
  }
  if(policy==='women_priority'){
    var females2=rem.filter(function(p){return p.gender==='female';});
    if(females2.length>=4) return selectFromPool(females2, courtIdx, pH, oH, cgH);
    // 足りなければ通常へフォールバック
  }

  // ── 通常（normal + フォールバック共通処理） ──
  return selectFromPool(rem, courtIdx, pH, oH, cgH);
}

/**
 * selectFromPool: プールから最良の4人を選ぶ共通関数
 *
 * 【連続休み安全装置】
 *   consecutiveWaitCount>=2 の人を必ずプールの先頭に置き、
 *   組み合わせ評価でもスコア加点する
 */
function selectFromPool(pool, courtIdx, pH, oH, cgH) {
  if(pool.length<=4) return pool.slice(0,4);

  // consecutiveWaitCount>=2 の人を「必須候補」として先頭に確保
  var must=pool.filter(function(p){return (p.consecutiveWaitCount||0)>=2;});
  var rest=pool.filter(function(p){return (p.consecutiveWaitCount||0)<2;});

  var evalPool;
  if(must.length>=4){
    // 必須候補が4人以上いる場合: 必須候補の中で評価
    evalPool=must.slice(0,8);
  } else if(must.length>0){
    // 必須候補が1〜3人: 必須候補は固定して残りから補完
    var need=4-must.length;
    var poolSize=Math.min(Math.max(6,rest.length), rest.length);
    var restPool=rest.slice(0,poolSize);
    var restCombos=getCombinations(restPool, need);

    var bestGroup=null, bestScore=-Infinity;
    restCombos.forEach(function(rc){
      var group=must.concat(rc);
      var score=calcGroupScore(group, courtIdx, pH, oH, cgH);
      group.forEach(function(p){ score+=(p.consecutiveWaitCount||0)*150; });
      if(score>bestScore){bestScore=score;bestGroup=group;}
    });
    return bestGroup||must.concat(rest.slice(0,need));
  } else {
    // 通常: 上位8人の中から組み合わせ評価
    evalPool=pool.slice(0,8);
  }

  var combos=getCombinations(evalPool,4);
  var bestG=combos[0]||pool.slice(0,4), bestS=-Infinity;
  combos.forEach(function(group){
    var score=calcGroupScore(group, courtIdx, pH, oH, cgH);
    group.forEach(function(p){ score+=(p.consecutiveWaitCount||0)*150; });
    if(score>bestS){bestS=score;bestG=group;}
  });
  return bestG;
}

/**
 * calcGroupScore: 4人グループの総合スコアを計算する
 *
 * 加点:
 *   未ペア相手との組み合わせ     → +80
 *   未対戦相手との組み合わせ     → +60
 *   waitingCount 合計            → ×20
 *   consecutiveWaitCount 合計    → ×150（連続休み者を強く優遇）
 * 減点:
 *   同グループ再出現             → ×300
 *   同じペア繰り返し             → ×100/回
 *   同じ対戦相手繰り返し         → ×80/回
 */
function calcGroupScore(group, courtIdx, pH, oH, cgH) {
  var score=0;
  var valid=group.filter(Boolean);
  if(valid.length<4) return -9999;

  valid.forEach(function(p){
    score+=p.waitingCount*20;
    // consecutiveWaitCount は calcGroupScore 外（selectFromPool/selectBestGroup）で加点するため
    // ここでは基本waitingCountのみ
  });

  // 同グループ再出現ペナルティ
  var cgHist=cgH[courtIdx]||{};
  score-=(cgHist[groupKey(valid)]||0)*300;

  // ペア・対戦の評価（6組み合わせ）
  for(var i=0;i<valid.length;i++){
    for(var j=i+1;j<valid.length;j++){
      var pk=pairKey(valid[i].no,valid[j].no);
      var pCnt=pH[pk]||0, oCnt=oH[pk]||0;
      if(pCnt===0) score+=80; else score-=pCnt*100;
      if(oCnt===0) score+=60; else score-=oCnt*80;
    }
  }
  return score;
}

/** getCombinations: arr から k個の全組み合わせ（pool は最大8人に制限推奨） */
function getCombinations(arr, k) {
  if(k===0) return [[]];
  if(!arr.length) return [];
  var f=arr[0], rest=arr.slice(1);
  return getCombinations(rest,k-1).map(function(c){return [f].concat(c);})
    .concat(getCombinations(rest,k));
}

/**
 * bestPairing: 4人を2チームに分ける最良の組み合わせ
 *
 * 【mixed_priority 厳密化】
 *   4人が男2女2なら「必ず」男女ペアを組む（男男/女女ペアを禁止）
 *   評価は2通り（男A+女A vs 男B+女B）か（男A+女B vs 男B+女A）
 */
function bestPairing(four, policy, pH, oH) {
  while(four.length<4) four.push(null);

  if(policy==='mixed_priority'){
    var mP=four.filter(function(p){return p&&p.gender==='male';});
    var fP=four.filter(function(p){return p&&p.gender==='female';});

    if(mP.length>=2&&fP.length>=2){
      // 【厳密化】男女ペアの2パターンのみ評価（男男/女女ペアは作らない）
      var mixOpts=[
        {teams:[[mP[0],fP[0]],[mP[1],fP[1]]]},
        {teams:[[mP[0],fP[1]],[mP[1],fP[0]]]}
      ];
      var bestM=mixOpts[0], bestMS=-Infinity;
      mixOpts.forEach(function(opt){
        var s=calcPairingScore(opt.teams[0],opt.teams[1],pH,oH);
        if(s>bestMS){bestMS=s;bestM=opt;}
      });
      return bestM.teams;
    }
    // 男女比が崩れた場合（フォールバック: 通常3パターン評価）
  }

  // 通常: 3パターン評価
  var a=four[0],b=four[1],c=four[2],d=four[3];
  var opts=[{teams:[[a,b],[c,d]]},{teams:[[a,c],[b,d]]},{teams:[[a,d],[b,c]]}];
  var best=opts[0], bestS=-Infinity;
  opts.forEach(function(opt){
    var s=calcPairingScore(opt.teams[0],opt.teams[1],pH,oH);
    if(s>bestS){bestS=s;best=opt;}
  });
  return best.teams;
}

/** calcPairingScore: チーム分けスコア計算 */
function calcPairingScore(teamA, teamB, pH, oH) {
  var score=0;
  score+=evalPair(teamA[0],teamA[1],pH);
  score+=evalPair(teamB[0],teamB[1],pH);
  (teamA||[]).forEach(function(pa){
    (teamB||[]).forEach(function(pb){score+=evalOpponent(pa,pb,oH);});
  });
  return score;
}

/** evalPair: 未ペア→+80加点 / 繰り返し→強く減点 */
function evalPair(p1, p2, pH) {
  if(!p1||!p2) return 0;
  var cnt=pH[pairKey(p1.no,p2.no)]||0;
  return cnt===0 ? 80 : -(cnt*100);
}

/** evalOpponent: 未対戦→+60加点 / 繰り返し→強く減点 */
function evalOpponent(p1, p2, oH) {
  if(!p1||!p2) return 0;
  var cnt=oH[pairKey(p1.no,p2.no)]||0;
  return cnt===0 ? 60 : -(cnt*80);
}

// ============================================================
// ■ nextRound: 履歴更新（改善）
// ============================================================

function nextRound() {
  var onCourtNos={};
  S.courts.forEach(function(c){
    ((c.teams[0]||[]).concat(c.teams[1]||[])).filter(Boolean).forEach(function(p){onCourtNos[p.no]=true;});
  });
  var waiters=todayParticipants.filter(function(p){return p.active&&!onCourtNos[p.no];}).map(pLabel);

  S.rounds.push({
    round:S.currentRound+1, waiters:waiters,
    courts:S.courts.map(function(c){
      return{name:c.name,mode:c.mode,policy:c.policy,
        teams:(c.teams||[]).map(function(t){return(t||[]).filter(Boolean).map(pLabel);})};
    })
  });

  // 【改善】pairHist / oppHist / courtGroupHist を確実に更新
  S.courts.forEach(function(c, ci){
    if(c.mode==='unused') return;
    var t1=(c.teams[0]||[]).filter(Boolean);
    var t2=(c.teams[1]||[]).filter(Boolean);

    // コートグループ履歴
    var gk=groupKey(t1.concat(t2));
    if(!S.courtGroupHist[ci]) S.courtGroupHist[ci]={};
    S.courtGroupHist[ci][gk]=(S.courtGroupHist[ci][gk]||0)+1;

    // ペア履歴（各チーム内）
    [t1,t2].forEach(function(team){
      for(var i=0;i<team.length;i++){
        for(var j=i+1;j<team.length;j++){
          var pk=pairKey(team[i].no,team[j].no);
          S.pairHist[pk]=(S.pairHist[pk]||0)+1;
        }
      }
    });

    // 対戦履歴（t1 vs t2）
    t1.forEach(function(pa){
      t2.forEach(function(pb){
        var ok=pairKey(pa.no,pb.no);
        S.oppHist[ok]=(S.oppHist[ok]||0)+1;
      });
    });

    // 個人の直近履歴も更新（UI表示用）
    updateIndividualHistory(t1, t2);
  });

  S.currentRound++;
  document.getElementById('game-badge').textContent='第'+(S.currentRound+1)+'ゲーム';
  doAutoAssign();
  renderPlayers();
  renderHistory();
  showToast('第'+S.currentRound+'ゲームを終了しました','ok');
}

/** 個人の直近ペア・対戦履歴を更新する（参加者カードの表示用） */
function updateIndividualHistory(t1, t2) {
  var update=function(p,partners,opponents){
    var sp=findByNo(p.no); if(!sp) return;
    var pNos=partners.map(function(x){return x.no;});
    var oNos=opponents.map(function(x){return x.no;});
    sp.lastPartnerNos=pNos; sp.lastOpponentNos=oNos;
    sp.recentPartnerNos=(sp.recentPartnerNos||[]).concat(pNos).slice(-6);
    sp.recentOpponentNos=(sp.recentOpponentNos||[]).concat(oNos).slice(-6);
  };
  t1.forEach(function(p){update(p,t1.filter(function(x){return x.no!==p.no;}),t2);});
  t2.forEach(function(p){update(p,t2.filter(function(x){return x.no!==p.no;}),t1);});
}

// ============================================================
// ■ computeFuture: 将来ラウンド予測（改善）
// ============================================================

/**
 * computeFuture: 将来ラウンド予測
 *
 * 【追加】仮シミュレーションで consecutiveWaitCount も更新し、
 *         連続休み防止ロジックを将来予測にも反映する
 */
function computeFuture() {
  S.futureRounds=[];
  var active=todayParticipants.filter(function(p){return p.active;});
  var usedCourts=S.courts.filter(function(c){return c.mode!=='unused';});
  if(active.length<4||!usedCourts.length) return;

  // シミュレーション用コピー（consecutiveWaitCount も含む）
  var sim=active.map(function(p){return Object.assign({},p,{
    recentPartnerNos:(p.recentPartnerNos||[]).slice(),
    recentOpponentNos:(p.recentOpponentNos||[]).slice(),
    consecutiveWaitCount:p.consecutiveWaitCount||0  // 【追加】
  });});

  var simPH=Object.assign({},S.pairHist);
  var simOH=Object.assign({},S.oppHist);
  var simCGH=S.courtGroupHist.map(function(h){return Object.assign({},h);});

  for(var r=0;r<3;r++){
    var sorted=sim.slice().sort(function(a,b){
      // 【追加】consecutiveWaitCount を先に比較
      var ca=a.consecutiveWaitCount||0, cb=b.consecutiveWaitCount||0;
      if(cb!==ca) return cb-ca;
      if(b.waitingCount!==a.waitingCount) return b.waitingCount-a.waitingCount;
      if(a.lastWaited!==b.lastWaited) return (a.lastWaited?0:1)-(b.lastWaited?0:1);
      return a.no-b.no;
    });

    var result=assignCourts(sorted, usedCourts, simPH, simOH, simCGH);

    var onCourtNos={};
    result.forEach(function(ca){
      ((ca[0]||[]).concat(ca[1]||[])).filter(Boolean).forEach(function(p){onCourtNos[p.no]=true;});
    });

    // 【追加】仮 consecutiveWaitCount を更新
    sim.forEach(function(p){
      if(onCourtNos[p.no]){
        p.lastWaited=false;
        p.consecutiveWaitCount=0; // 出場でリセット
      } else {
        p.waitingCount++;
        p.lastWaited=true;
        p.consecutiveWaitCount=(p.consecutiveWaitCount||0)+1;
      }
    });

    // 仮履歴更新
    usedCourts.forEach(function(court,ci){
      var actualCi=S.courts.indexOf(court);
      var teams=result[ci]||[[],[]];
      var t1=(teams[0]||[]).filter(Boolean);
      var t2=(teams[1]||[]).filter(Boolean);
      var gk=groupKey(t1.concat(t2));
      if(!simCGH[actualCi]) simCGH[actualCi]={};
      simCGH[actualCi][gk]=(simCGH[actualCi][gk]||0)+1;
      [t1,t2].forEach(function(team){
        for(var i=0;i<team.length;i++){
          for(var j=i+1;j<team.length;j++){
            var pk=pairKey(team[i].no,team[j].no);
            simPH[pk]=(simPH[pk]||0)+1;
          }
        }
      });
      t1.forEach(function(pa){
        t2.forEach(function(pb){
          var ok=pairKey(pa.no,pb.no); simOH[ok]=(simOH[ok]||0)+1;
        });
      });
    });

    var waiters=sim.filter(function(p){return !onCourtNos[p.no];})
      .map(function(p){var tp=findByNo(p.no);return tp?pLabel(tp):'No.'+p.no;});

    var usedIdx=0;
    var courts=S.courts.map(function(c){
      if(c.mode==='unused') return{name:c.name,mode:'unused',policy:'normal',teams:[[],[]]};
      var teams=result[usedIdx]||[[],[]]; usedIdx++;
      return{name:c.name,mode:c.mode,policy:c.policy||'normal',
        teams:[
          (teams[0]||[]).filter(Boolean).map(function(p){var tp=findByNo(p.no);return tp?pLabel(tp):'No.'+p.no;}),
          (teams[1]||[]).filter(Boolean).map(function(p){var tp=findByNo(p.no);return tp?pLabel(tp):'No.'+p.no;})
        ]};
    });
    S.futureRounds.push({round:S.currentRound+r+2,waiters:waiters,courts:courts});
  }
}

// ■ ゲーム画面
// ============================================================

function renderGame() {
  var gc=document.getElementById('game-courts'); if(!gc) return;
  gc.innerHTML='';

  S.courts.forEach(function(court){
    var mode=court.mode,t1=court.teams[0]||[],t2=court.teams[1]||[];
    var card=document.createElement('div'); card.className='court-game-card';

    var hdr=document.createElement('div'); hdr.className='court-game-header';
    var nm=document.createElement('span'); nm.className='court-game-name'; nm.textContent=court.name;
    hdr.appendChild(nm);
    if(mode!=='unused'){
      var chip=document.createElement('span'); chip.className='court-type-chip';
      chip.textContent=policyLabel(court.policy||'normal'); // 【変更】コートのpolicyを表示
      hdr.appendChild(chip);
    }
    card.appendChild(hdr);

    if(mode==='unused'){
      var ph=document.createElement('div');
      ph.style.cssText='padding:24px;text-align:center;color:var(--t4);font-size:14px';
      ph.textContent='このコートは未使用です'; card.appendChild(ph);
    } else {
      var md=document.createElement('div'); md.className='match-display';
      var mt=document.createElement('div'); mt.className='match-teams';
      mt.appendChild(buildTeamCol('TEAM A',t1));
      var vc=document.createElement('div'); vc.className='vs-col';
      var vl=document.createElement('div'); vl.className='vs-label'; vl.textContent='VS';
      vc.appendChild(vl); mt.appendChild(vc);
      mt.appendChild(buildTeamCol('TEAM B',t2));
      md.appendChild(mt); card.appendChild(md);
    }
    gc.appendChild(card);
  });

  // 待機中
  var onCourtNos={};
  S.courts.forEach(function(c){
    ((c.teams[0]||[]).concat(c.teams[1]||[])).filter(Boolean).forEach(function(p){onCourtNos[p.no]=true;});
  });
  var waiting=todayParticipants.filter(function(p){return p.active&&!onCourtNos[p.no];});
  if(waiting.length>0){
    var rs=document.createElement('div'); rs.className='rest-section';
    var rh=document.createElement('div'); rh.className='rest-header';
    rh.textContent='待機中 '+waiting.length+'人'; rs.appendChild(rh);
    var rb=document.createElement('div'); rb.className='rest-players';
    waiting.forEach(function(p){
      var chip=document.createElement('div'); chip.className='rest-chip';
      chip.appendChild(makeBadge(p.no,'sm'));
      var info=document.createElement('div');
      var pnm=document.createElement('div'); pnm.className='rest-chip-name'; pnm.textContent=displayName(p);
      info.appendChild(pnm);
      var sub=document.createElement('div'); sub.className='rest-chip-sub';
      // 【追加】連続休み中は強調表示
      var cwc2=p.consecutiveWaitCount||0;
      var subTxt='待機 '+p.waitingCount+'回'+(p.waitingCount>0?' / 次回優先':'');
      if(cwc2>=2) subTxt+=' ⚠️'+cwc2+'連続';
      sub.textContent=subTxt;
      info.appendChild(sub); chip.appendChild(info); rb.appendChild(chip);
    });
    rs.appendChild(rb); gc.appendChild(rs);
  }
}

function buildTeamCol(label,players){
  var col=document.createElement('div'); col.className='team-col';
  var lbl=document.createElement('div'); lbl.className='team-label'; lbl.textContent=label;
  col.appendChild(lbl);
  var ps=players.filter(Boolean);
  if(!ps.length) ps=[null,null];
  ps.forEach(function(p){col.appendChild(makePlayerRowEl(p));});
  return col;
}

function makePlayerRowEl(p){
  var row=document.createElement('div'); row.className='player-row';
  if(!p){
    var ph=document.createElement('div');
    ph.style.cssText='width:32px;height:32px;border-radius:50%;border:1px dashed rgba(255,255,255,0.15);flex-shrink:0;';
    var pi=document.createElement('div'); pi.className='player-info';
    var pn=document.createElement('div'); pn.className='player-name'; pn.style.color='var(--t4)'; pn.textContent='未配置';
    pi.appendChild(pn); row.appendChild(ph); row.appendChild(pi); return row;
  }
  var sp=findByNo(p.no); row.appendChild(makeBadge(p.no,'sm'));
  var pi=document.createElement('div'); pi.className='player-info';
  var pn=document.createElement('div'); pn.className='player-name';
  pn.textContent=sp?displayName(sp):('No.'+p.no); pi.appendChild(pn);
  var sub=document.createElement('div'); sub.className='player-sub';
  var gL=sp&&sp.gender==='female'?'♀':(sp&&sp.gender==='male'?'♂':'');
  sub.textContent=(gL?gL+' ':'')+'待機 '+(sp?sp.waitingCount:0)+'回';
  pi.appendChild(sub); row.appendChild(pi); return row;
}

// ============================================================
// ■ 進行画面
// ============================================================

function renderSched() {
  var el=document.getElementById('sched-scroll'); if(!el) return;
  el.innerHTML='';
  var head=document.createElement('div'); head.className='timeline-head';
  head.innerHTML='<div class="timeline-head-title">進行状況</div><div class="timeline-head-sub">現在のゲームと次の予定を確認できます</div>';
  el.appendChild(head);

  var onCourtNos={};
  S.courts.forEach(function(c){
    ((c.teams[0]||[]).concat(c.teams[1]||[])).filter(Boolean).forEach(function(p){onCourtNos[p.no]=true;});
  });
  var curWaiters=todayParticipants.filter(function(p){return p.active&&!onCourtNos[p.no];}).map(pLabel);

  el.appendChild(buildScCard({type:'current',data:{
    round:S.currentRound+1, waiters:curWaiters,
    courts:S.courts.map(function(c){return{name:c.name,mode:c.mode,policy:c.policy,
      teams:(c.teams||[]).map(function(t){return(t||[]).filter(Boolean).map(pLabel);})};})
  }}));
  S.futureRounds.slice(0,3).forEach(function(r,idx){
    el.appendChild(buildScCard({type:idx===0?'next':'future',data:r}));
  });
}

function buildScCard(item) {
  var cur=item.type==='current',next=item.type==='next';
  var card=document.createElement('div');
  card.className='sc-card'+(cur?' cur':next?' next':'');
  var head=document.createElement('div'); head.className='sc-head';
  var rn=document.createElement('span'); rn.className='sc-round'; rn.textContent='第'+item.data.round+'ゲーム';
  var badge=document.createElement('span'); badge.className='sc-badge';
  badge.textContent=cur?'進行中':next?'次':'予定';
  head.appendChild(rn); head.appendChild(badge); card.appendChild(head);

  var body=document.createElement('div'); body.className='sc-body';
  (item.data.courts||[]).filter(function(c){return c.mode!=='unused';}).forEach(function(c){
    var blk=document.createElement('div'); blk.className='sc-court-block';
    var cnm=document.createElement('div'); cnm.className='sc-court-nm';
    // 【変更】コート名 + policyラベルを表示
    cnm.innerHTML='<span>'+escHtml(c.name)+'</span><span style="font-size:10px;color:var(--t2)">'+policyLabel(c.policy||'normal')+'</span>';
    blk.appendChild(cnm);

    var vsg=document.createElement('div'); vsg.className='sc-vs-grid';
    var mkTeam=function(names){
      var t=document.createElement('div'); t.className='sc-team';
      if(names&&names.length){
        names.forEach(function(n){var p=document.createElement('div');p.className='sc-player';p.textContent=n;t.appendChild(p);});
      } else {
        var ep=document.createElement('div');ep.className='sc-player emp';ep.textContent='—';t.appendChild(ep);
      }
      return t;
    };
    var vs=document.createElement('div'); vs.className='sc-vs-txt'; vs.textContent='VS';
    vsg.appendChild(mkTeam(c.teams[0])); vsg.appendChild(vs); vsg.appendChild(mkTeam(c.teams[1]));
    blk.appendChild(vsg); body.appendChild(blk);
  });

  if(item.data.waiters&&item.data.waiters.length){
    var rb=document.createElement('div'); rb.className='sc-rest';
    var rl=document.createElement('div'); rl.className='sc-rest-lbl'; rl.textContent='待機'; rb.appendChild(rl);
    var rn2=document.createElement('div'); rn2.className='sc-rest-names'; rn2.textContent=item.data.waiters.join(' / ');
    rb.appendChild(rn2); body.appendChild(rb);
  }
  card.appendChild(body); return card;
}

// ■ 履歴画面
// ============================================================

function renderHistory() {
  var el=document.getElementById('hist-scroll'); if(!el) return;
  el.innerHTML='';
  var intro=document.createElement('div'); intro.className='timeline-head';
  intro.innerHTML='<div class="timeline-head-title">履歴</div><div class="timeline-head-sub">終了したゲームの対戦記録（スコアなし）</div>';
  el.appendChild(intro);
  if(!S.rounds.length){
    var empty=document.createElement('div'); empty.className='timeline-head';
    empty.innerHTML='<div class="timeline-head-title">履歴はまだありません</div><div class="timeline-head-sub">ゲームが終了するとここに記録されます</div>';
    el.appendChild(empty); return;
  }
  S.rounds.slice().reverse().forEach(function(r){
    var card=document.createElement('div'); card.className='hcard';
    var head=document.createElement('div'); head.className='hhead'; head.textContent='第'+r.round+'ゲーム';
    card.appendChild(head);
    var body=document.createElement('div'); body.className='hbody';
    (r.courts||[]).filter(function(c){return c.mode!=='unused';}).forEach(function(c){
      var row=document.createElement('div'); row.className='hrow';
      var ct=document.createElement('div'); ct.className='hct';
      ct.textContent=c.name+' ('+policyLabel(c.policy||'normal')+')'; // policyも表示
      var pl=document.createElement('div'); pl.className='hpl';
      pl.textContent=(c.teams[0]||[]).join(' / ')+' vs '+(c.teams[1]||[]).join(' / ');
      row.appendChild(ct); row.appendChild(pl); body.appendChild(row);
    });
    if(r.waiters&&r.waiters.length){
      var wRow=document.createElement('div'); wRow.className='hrow';
      var wCt=document.createElement('div'); wCt.className='hct'; wCt.textContent='待機';
      var wPl=document.createElement('div'); wPl.className='hpl'; wPl.textContent=r.waiters.join(' / ');
      wRow.appendChild(wCt); wRow.appendChild(wPl); body.appendChild(wRow);
    }
    card.appendChild(body); el.appendChild(card);
  });
}

// ============================================================
// ■ トースト・ユーティリティ

var _toastTimer;
function showToast(msg, type) {
  var t=document.getElementById('toast'); t.textContent=msg;
  t.className='show'+(type?' '+type:'');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(function(){t.className='';},2400);
}

function escHtml(str){
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function init() {
  loadSavedParticipants();
  loadCourtConfig();
  loadSession();

  // セッションデータからコート設定を復元
  _playerCount=S.playerCount||todayParticipants.length||0;

  // コートGroupHistが未初期化の場合に初期化

  document.getElementById('player-count-disp').textContent=_playerCount;

  document.getElementById('game-badge').textContent='第'+(S.currentRound+1)+'ゲーム';

  renderAll();
  gotoScreen('setup');
}
