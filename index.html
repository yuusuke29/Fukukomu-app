<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-fukukomu.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PB Manager">
<meta name="theme-color" content="#1C1C1E">
<title>Pickleball Manager</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Oswald:wght@500;700&display=swap');

/* ═══════════════════════════════════
RESET & BASE
═══════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
body{
font-family:‘Noto Sans JP’,sans-serif;
background:#1C1C1E;color:#F5F5F0;
height:100dvh;overflow:hidden;font-size:15px;line-height:1.5;
}

/* ═══════════════════════════════════
DESIGN TOKENS
═══════════════════════════════════ */
:root{
/* Background layers */
–bg0:#1C1C1E;
–bg1:#2C2C2E;
–bg2:#3A3A3C;
–bg3:#48484A;

/* Brand */
–accent:#E8A87C;      /* warm amber */
–accent2:#6EC6A0;     /* sage green */
–accent3:#E87C7C;     /* coral red */
–accent-blue:#7C9EE8; /* soft blue */

/* Text */
–t1:#F5F5F0;
–t2:#AEAEB2;
–t3:#636366;

/* Lines */
–ln:rgba(255,255,255,0.10);
–ln2:rgba(255,255,255,0.06);

/* Shadows */
–sh:0 2px 12px rgba(0,0,0,0.4);
–sh2:0 4px 24px rgba(0,0,0,0.5);

/* Radii */
–r1:12px;–r2:16px;–r3:20px;
}

/* ═══════════════════════════════════
APP LAYOUT
═══════════════════════════════════ */
#app{display:flex;flex-direction:column;height:100dvh;background:var(–bg0)}

/* ── HEADER ── */
#header{
height:52px;display:flex;align-items:center;padding:0 16px;gap:8px;
background:var(–bg1);border-bottom:1px solid var(–ln);
flex-shrink:0;z-index:100;
}
.logo{
font-family:‘Oswald’,sans-serif;font-weight:700;font-size:18px;
color:var(–accent);letter-spacing:2px;margin-right:4px;white-space:nowrap;
}
.header-nav{display:flex;gap:4px;flex:1;overflow-x:auto}
.header-nav::-webkit-scrollbar{display:none}
.hnav-btn{
height:34px;padding:0 12px;border-radius:8px;border:none;
background:transparent;color:var(–t2);font-size:12px;font-weight:500;
cursor:pointer;white-space:nowrap;transition:all .18s;
font-family:‘Noto Sans JP’,sans-serif;
}
.hnav-btn.active{background:var(–accent);color:#1C1C1E;font-weight:700}
.hnav-btn:not(.active):hover{background:var(–bg2);color:var(–t1)}

/* timer chip in header */
.timer-chip{
display:flex;align-items:center;gap:6px;margin-left:auto;flex-shrink:0;
}
#h-timer{
font-family:‘Oswald’,sans-serif;font-weight:500;font-size:20px;
color:var(–accent);letter-spacing:2px;cursor:pointer;
font-variant-numeric:tabular-nums;min-width:64px;text-align:right;
}
#h-timer.warn{color:var(–accent3)}
#h-timer.done{color:var(–accent3);animation:tblink .4s infinite}
@keyframes tblink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── MAIN ── */
#main{flex:1;overflow:hidden;position:relative}
.screen{
position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden;
opacity:0;pointer-events:none;transition:opacity .25s;
}
.screen.active{opacity:1;pointer-events:all}
.scrollable{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.scrollable::-webkit-scrollbar{width:3px}
.scrollable::-webkit-scrollbar-thumb{background:var(–ln);border-radius:2px}

/* ── FOOTER ── */
#footer{
height:54px;display:flex;align-items:center;
background:var(–bg1);border-top:1px solid var(–ln);
flex-shrink:0;
}
.foot-btn{
flex:1;height:100%;border:none;background:transparent;
color:var(–t3);font-size:10px;font-weight:500;cursor:pointer;
display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
transition:color .18s;font-family:‘Noto Sans JP’,sans-serif;
}
.foot-btn .icon{font-size:20px;line-height:1}
.foot-btn.active{color:var(–accent)}
.foot-btn:not(.active):hover{color:var(–t2)}

/* ═══════════════════════════════════
COMPONENTS
═══════════════════════════════════ */

/* Section header */
.sec-title{
font-family:‘Oswald’,sans-serif;font-weight:500;font-size:13px;
letter-spacing:2px;text-transform:uppercase;color:var(–t3);
padding:16px 16px 8px;
}

/* Card */
.card{
background:var(–bg1);border-radius:var(–r2);border:1px solid var(–ln);
box-shadow:var(–sh);overflow:hidden;
}

/* Big action button */
.btn-action{
width:100%;height:52px;border:none;border-radius:var(–r1);
font-family:‘Noto Sans JP’,sans-serif;font-size:16px;font-weight:700;
cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
transition:all .18s;
}
.btn-action.primary{background:var(–accent);color:#1C1C1E}
.btn-action.primary:active{background:#d4916a}
.btn-action.secondary{background:var(–bg2);color:var(–t1);border:1px solid var(–ln)}
.btn-action.secondary:active{background:var(–bg3)}
.btn-action.green{background:var(–accent2);color:#1C1C1E}
.btn-action.green:active{background:#58b08a}
.btn-action.danger{background:var(–accent3);color:#fff}

/* Stepper */
.stepper{
display:flex;align-items:center;gap:0;
background:var(–bg2);border-radius:var(–r1);overflow:hidden;
border:1px solid var(–ln);width:fit-content;
}
.step-btn{
width:52px;height:52px;border:none;background:transparent;
color:var(–t1);font-size:26px;cursor:pointer;
display:flex;align-items:center;justify-content:center;
transition:background .15s;
}
.step-btn:active{background:var(–bg3)}
.step-val{
min-width:72px;height:52px;border-left:1px solid var(–ln);border-right:1px solid var(–ln);
background:var(–bg1);font-family:‘Oswald’,sans-serif;font-weight:500;font-size:28px;
color:var(–t1);text-align:center;display:flex;align-items:center;justify-content:center;
font-variant-numeric:tabular-nums;
}

/* Segment control */
.seg{display:flex;gap:6px}
.seg-btn{
flex:1;height:40px;border-radius:10px;border:2px solid var(–ln);
background:var(–bg2);color:var(–t3);font-size:13px;font-weight:700;
cursor:pointer;transition:all .18s;font-family:‘Noto Sans JP’,sans-serif;
}
/* ★ SELECTED STATE: solid fill, high contrast */
.seg-btn.on{
background:var(–accent);border-color:var(–accent);
color:#1C1C1E;
}
.seg-btn.on.green{background:var(–accent2);border-color:var(–accent2);color:#1C1C1E}
.seg-btn.on.blue{background:var(–accent-blue);border-color:var(–accent-blue);color:#1C1C1E}
.seg-btn.on.red{background:var(–accent3);border-color:var(–accent3);color:#fff}

/* Number badge */
.nbadge{
border-radius:50%;display:flex;align-items:center;justify-content:center;
font-family:‘Oswald’,sans-serif;font-weight:700;border:2px solid;flex-shrink:0;
}
.nbadge.lg{width:48px;height:48px;font-size:18px}
.nbadge.md{width:40px;height:40px;font-size:15px}
.nbadge.sm{width:32px;height:32px;font-size:12px}

/* Input */
.inp-field{
background:var(–bg2);border:1px solid var(–ln);color:var(–t1);
font-family:‘Noto Sans JP’,sans-serif;font-size:15px;
padding:10px 14px;border-radius:var(–r1);outline:none;width:100%;
-webkit-appearance:none;
}
.inp-field:focus{border-color:var(–accent)}
.inp-field::placeholder{color:var(–t3)}

/* Tag badge */
.tag{
display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;
font-size:11px;font-weight:700;
}
.tag.wait{background:rgba(232,168,124,0.2);color:var(–accent);border:1px solid rgba(232,168,124,0.4)}
.tag.win{background:rgba(110,198,160,0.2);color:var(–accent2);border:1px solid rgba(110,198,160,0.4)}
.tag.lose{background:rgba(232,124,124,0.2);color:var(–accent3);border:1px solid rgba(232,124,124,0.4)}

/* Toast */
#toast{
position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(80px);
background:var(–bg2);color:var(–t1);padding:12px 24px;border-radius:30px;
font-size:14px;font-weight:700;z-index:9999;transition:transform .3s;
box-shadow:var(–sh2);white-space:nowrap;pointer-events:none;border:1px solid var(–ln);
}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.ok{background:var(–accent2);color:#1C1C1E;border-color:transparent}
#toast.err{background:var(–accent3);color:#fff;border-color:transparent}
#toast.warn{background:var(–accent);color:#1C1C1E;border-color:transparent}

/* ═══════════════════════════════════
SCREEN: SETUP (TOP)
═══════════════════════════════════ */
#screen-setup .scrollable{padding:0 0 24px}

.setup-hero{
padding:24px 16px 20px;
background:linear-gradient(160deg,var(–bg1) 0%,var(–bg0) 100%);
border-bottom:1px solid var(–ln);
text-align:center;
}
.setup-hero h1{
font-family:‘Oswald’,sans-serif;font-weight:700;font-size:28px;
color:var(–t1);letter-spacing:1px;margin-bottom:4px;
}
.setup-hero p{font-size:13px;color:var(–t2)}

.setup-steps{padding:16px;display:flex;flex-direction:column;gap:12px}

.step-card{
background:var(–bg1);border-radius:var(–r2);border:1px solid var(–ln);
overflow:hidden;
}
.step-card-header{
display:flex;align-items:center;gap:12px;padding:14px 16px;
border-bottom:1px solid var(–ln2);cursor:pointer;
background:var(–bg1);transition:background .15s;
}
.step-card-header:active{background:var(–bg2)}
.step-num{
width:28px;height:28px;border-radius:50%;
background:var(–accent);color:#1C1C1E;
font-family:‘Oswald’,sans-serif;font-weight:700;font-size:14px;
display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.step-num.done{background:var(–accent2)}
.step-title{font-size:15px;font-weight:700;color:var(–t1)}
.step-summary{font-size:12px;color:var(–t2);margin-left:auto;white-space:nowrap}
.step-chevron{color:var(–t3);font-size:16px;flex-shrink:0;transition:transform .2s}
.step-chevron.open{transform:rotate(90deg)}

.step-body{display:none;padding:16px;background:var(–bg0)}
.step-body.open{display:block}

/* Setup — Participants */
.count-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:16px}

/* Setup — Courts */
.court-config-list{display:flex;flex-direction:column;gap:10px}
.court-config-row{
background:var(–bg1);border-radius:var(–r1);border:1px solid var(–ln);
overflow:hidden;
}
.court-config-top{
display:flex;align-items:center;gap:12px;padding:12px 14px;
border-bottom:1px solid var(–ln2);
}
.court-config-name-inp{
flex:1;background:transparent;border:none;color:var(–t1);
font-family:‘Noto Sans JP’,sans-serif;font-size:15px;font-weight:700;
outline:none;min-width:80px;
}
.court-config-name-inp::placeholder{color:var(–t3)}
.court-config-seg{padding:10px 14px}

/* Setup — Timer */
.timer-setup-row{display:flex;align-items:center;gap:16px}

/* ═══════════════════════════════════
SCREEN: GAME
═══════════════════════════════════ */
#screen-game .scrollable{padding:0 0 24px}

/* Timer bar */
.timer-bar-wrap{
padding:14px 16px 12px;
background:var(–bg1);border-bottom:1px solid var(–ln);flex-shrink:0;
}
.timer-bar-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
#game-timer-disp{
font-family:‘Oswald’,sans-serif;font-weight:700;font-size:36px;
color:var(–accent);letter-spacing:4px;font-variant-numeric:tabular-nums;cursor:pointer;
}
#game-timer-disp.warn{color:var(–accent3);animation:tblink .5s infinite}
#game-timer-disp.done{color:var(–accent3);animation:tblink .3s infinite}
.btn-start{
height:44px;padding:0 20px;border-radius:10px;border:none;
background:var(–accent2);color:#1C1C1E;font-size:15px;font-weight:700;
cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;
font-family:‘Noto Sans JP’,sans-serif;
}
.btn-start:active{background:#58b08a}
.btn-start.running{background:var(–accent3);color:#fff}
.btn-timer-reset{
width:40px;height:40px;border-radius:10px;border:1px solid var(–ln);
background:var(–bg2);color:var(–t2);font-size:18px;cursor:pointer;
display:flex;align-items:center;justify-content:center;
}

/* Progress bar */
.progress-track{
height:8px;background:var(–bg2);border-radius:4px;overflow:hidden;
}
.progress-fill{
height:100%;background:var(–accent2);border-radius:4px;
transition:width .5s linear,background .3s;
}
.progress-fill.warn{background:var(–accent)}
.progress-fill.done{background:var(–accent3)}

/* Game actions */
.game-actions{display:flex;gap:10px;padding:12px 16px;flex-shrink:0;background:var(–bg0)}

/* Court cards */
.game-courts{padding:0 16px;display:flex;flex-direction:column;gap:14px}

.court-game-card{
background:var(–bg1);border-radius:var(–r2);border:1px solid var(–ln);
box-shadow:var(–sh);overflow:hidden;
}
.court-game-header{
padding:12px 16px;background:var(–bg2);border-bottom:1px solid var(–ln);
display:flex;align-items:center;justify-content:space-between;
}
.court-game-name{
font-family:‘Oswald’,sans-serif;font-weight:700;font-size:16px;
color:var(–t1);letter-spacing:1px;
}
.court-game-mode{
font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;
background:var(–accent);color:#1C1C1E;
}

/* Match display */
.match-display{padding:14px 16px}
.match-teams{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:start}
.team-col{display:flex;flex-direction:column;gap:6px}
.team-label{
font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
padding-bottom:6px;border-bottom:1px solid var(–ln2);margin-bottom:2px;
}
.team-label.a{color:var(–accent-blue)}
.team-label.b{color:var(–accent3)}

.player-row{display:flex;align-items:center;gap:10px;padding:4px 0}
.player-info{flex:1;min-width:0}
.player-name{font-size:14px;font-weight:700;color:var(–t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-sub{font-size:11px;color:var(–t3);margin-top:1px}
.player-empty .player-name{color:var(–t3);font-weight:400;font-style:italic}

.vs-col{
display:flex;align-items:center;justify-content:center;padding-top:28px;
}
.vs-label{
font-family:‘Oswald’,sans-serif;font-weight:700;font-size:22px;
color:var(–accent);letter-spacing:2px;
}

/* Score */
.score-section{
padding:12px 16px;border-top:1px solid var(–ln2);
display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(–bg0);
}
.score-label{font-size:12px;font-weight:700;color:var(–t3);flex-shrink:0}
.score-inputs{display:flex;align-items:center;gap:8px}
.score-inp{
width:54px;height:46px;background:var(–bg2);border:1px solid var(–ln);
color:var(–t1);font-family:‘Oswald’,sans-serif;font-size:24px;font-weight:500;
text-align:center;border-radius:10px;outline:none;font-variant-numeric:tabular-nums;
}
.score-inp:focus{border-color:var(–accent)}
.score-sep{font-size:20px;color:var(–t3);font-weight:700}
.score-recorded{font-size:12px;font-weight:700;color:var(–accent2)}
.btn-score{
height:40px;padding:0 14px;border-radius:10px;border:none;
font-size:13px;font-weight:700;cursor:pointer;font-family:‘Noto Sans JP’,sans-serif;
}
.btn-score.record{background:var(–accent2);color:#1C1C1E}
.btn-score.overwrite{background:var(–bg2);color:var(–t2);border:1px solid var(–ln)}

/* Rest section */
.rest-section{
margin:0 16px 14px;
background:var(–bg1);border-radius:var(–r2);border:1px solid var(–ln);overflow:hidden;
}
.rest-header{
padding:10px 14px;background:var(–bg2);border-bottom:1px solid var(–ln);
font-family:‘Oswald’,sans-serif;font-weight:500;font-size:14px;letter-spacing:1px;
color:var(–t2);
}
.rest-players{padding:12px 14px;display:flex;flex-wrap:wrap;gap:10px}
.rest-player{display:flex;align-items:center;gap:8px}
.rest-player-info{display:flex;flex-direction:column}
.rest-player-name{font-size:13px;font-weight:700;color:var(–t1)}
.rest-player-sub{font-size:10px;color:var(–t3)}

/* ═══════════════════════════════════
SCREEN: PARTICIPANTS
═══════════════════════════════════ */
#screen-players .scrollable{padding:16px;display:flex;flex-direction:column;gap:12px}

.players-top{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}

.pcard{
background:var(–bg1);border:1px solid var(–ln);border-radius:var(–r1);
padding:14px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;
cursor:pointer;position:relative;text-align:center;transition:border-color .18s;
}
.pcard:active{background:var(–bg2)}
.pcard.inactive{opacity:.38}
.pcard:hover{border-color:var(–accent)}

.pcard-name{font-size:14px;font-weight:700;color:var(–t1)}
.pcard-nick{font-size:12px;color:var(–t2)}
.pcard-nick.empty{color:var(–t3);font-style:italic}
.pcard-stats{display:flex;gap:6px}

.p-exit-btn{
width:100%;height:32px;border-radius:8px;border:none;
font-size:12px;font-weight:700;cursor:pointer;font-family:‘Noto Sans JP’,sans-serif;
}
.p-exit-btn.exit{background:rgba(232,124,124,0.18);color:var(–accent3);border:1px solid rgba(232,124,124,0.35)}
.p-exit-btn.rejoin{background:rgba(110,198,160,0.18);color:var(–accent2);border:1px solid rgba(110,198,160,0.35)}

.nick-popover{
position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:200;
background:var(–bg2);border:1px solid var(–accent);border-radius:var(–r1);
padding:14px;box-shadow:var(–sh2);
}
.np-row{display:flex;gap:8px;margin-top:10px}
.np-save{flex:1;height:40px;background:var(–accent);border:none;border-radius:9px;color:#1C1C1E;font-size:14px;font-weight:700;cursor:pointer}
.np-cancel{height:40px;padding:0 12px;background:var(–bg3);border:1px solid var(–ln);border-radius:9px;color:var(–t2);font-size:13px;font-weight:600;cursor:pointer}

/* ═══════════════════════════════════
SCREEN: COURTS
═══════════════════════════════════ */
#screen-courts .scrollable{padding:16px;display:flex;flex-direction:column;gap:12px}

/* ═══════════════════════════════════
SCREEN: SCHEDULE & HISTORY
═══════════════════════════════════ */
#screen-schedule .scrollable,#screen-history .scrollable{
padding:0 16px 24px;display:flex;flex-direction:column;gap:12px;
}
#screen-schedule .scrollable{padding-top:12px}
#screen-history .scrollable{padding-top:12px}

.sc-card{
background:var(–bg1);border-radius:var(–r2);border:1px solid var(–ln);
overflow:hidden;flex-shrink:0;
}
.sc-card.cur{border-color:var(–accent);box-shadow:0 0 0 1px var(–accent)}
.sc-card.past{opacity:.55}
.sc-head{
padding:12px 16px;display:flex;align-items:center;justify-content:space-between;
background:var(–bg2);border-bottom:1px solid var(–ln2);
}
.sc-round{font-family:‘Oswald’,sans-serif;font-weight:700;font-size:16px;color:var(–t1);letter-spacing:1px}
.sc-badge{
font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;
}
.sc-card.past .sc-badge{background:var(–bg3);color:var(–t3)}
.sc-card.cur  .sc-badge{background:var(–accent);color:#1C1C1E;animation:fpulse 2s infinite}
.sc-card.future .sc-badge{background:var(–bg2);color:var(–accent-blue);border:1px solid rgba(124,158,232,.35)}
@keyframes fpulse{0%,100%{opacity:1}50%{opacity:.6}}
.sc-body{padding:12px 16px;display:flex;flex-direction:column;gap:10px}
.sc-court-block{background:var(–bg2);border-radius:var(–r1);overflow:hidden}
.sc-court-nm{
padding:7px 12px;font-size:10px;font-weight:700;letter-spacing:1px;
text-transform:uppercase;color:var(–t3);border-bottom:1px solid var(–ln2);
}
.sc-vs-grid{display:grid;grid-template-columns:1fr auto 1fr;padding:8px 12px;gap:8px;align-items:center;background:var(–bg1)}

.sc-player{font-size:12px;font-weight:700;color:var(–t1)}
.sc-player.emp{color:var(–t3);font-style:italic}

.sc-score-row{padding:5px 12px;background:var(–bg0);text-align:center;font-size:12px;font-weight:700;color:var(–accent2)}
.sc-rest{background:var(–bg2);border-radius:var(–r1);padding:8px 12px}

/* Bal toggle */

.sw-tr::after{content:’’;position:absolute;left:4px;top:50%;transform:translateY(-50%);width:16px;height:16px;background:var(–t3);border-radius:50%;transition:.25s}
.sw input:checked+.sw-tr{background:var(–accent);border-color:var(–accent)}
.sw input:checked+.sw-tr::after{transform:translateX(18px) translateY(-50%);background:#1C1C1E}

<script>
/* ════════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════════ */
var S = {
  players: [],
  courts: [
    {name:'手前コート', mode:'doubles', teams:[[],[]]},
    {name:'中央コート', mode:'doubles', teams:[[],[]]},
    {name:'奥コート',   mode:'doubles', teams:[[],[]]}
  ],
  scores: [],
  rounds: [],
  futureRounds: [],
  currentRound: 0,
  courtGroupHist: [],
  pairHist: {},
  oppHist: {},
  timerMin: 7,
  playerCount: 0,
  courtCount: 3
};
// Temp court config during setup
var tmpCourtConfig = [
  {name:'手前コート', mode:'doubles'},
  {name:'中央コート', mode:'doubles'},
  {name:'奥コート',   mode:'doubles'}
];

function initCourtHist() {
  S.courtGroupHist = S.courts.map(function(){ return {}; });
  S.scores = S.courts.map(function(){ return {team1:'', team2:''}; });
}
initCourtHist();

/* ════════════════════════════════════════════════════
   SCREEN NAVIGATION
════════════════════════════════════════════════════ */
var SCREENS = ['setup','game','players','courts','schedule','history'];
var HEADER_NAVS = ['setup','game','players','courts'];
var FOOTER_NAVS = ['schedule','history'];

function gotoScreen(name) {
  SCREENS.forEach(function(s){
    var el = document.getElementById('screen-'+s);
    if (el) el.classList.toggle('active', s===name);
  });
  HEADER_NAVS.forEach(function(n){
    var b = document.getElementById('hnav-'+n);
    if (b) b.classList.toggle('active', n===name);
  });
  FOOTER_NAVS.forEach(function(n){
    var b = document.getElementById('fnav-'+n);
    if (b) b.classList.toggle('active', n===name);
  });
  if (name === 'players')  renderPlayers();
  if (name === 'courts')   renderCourtConfig2();
  if (name === 'schedule') renderSched();
  if (name === 'history')  renderHistory();
  if (name === 'game')     renderGame();
}

/* ════════════════════════════════════════════════════
   SETUP STEPS
════════════════════════════════════════════════════ */
function toggleStep(n) {
  var body = document.getElementById('sbody-'+n);
  var chev = document.getElementById('schev-'+n);
  var isOpen = body.classList.contains('open');
  // close all
  [1,2,3].forEach(function(i){
    document.getElementById('sbody-'+i).classList.remove('open');
    document.getElementById('schev-'+i).classList.remove('open');
  });
  if (!isOpen) {
    body.classList.add('open');
    chev.classList.add('open');
  }
}

/* ── Player count ── */
var _playerCount = 0;
function adjPlayers(d) {
  _playerCount = Math.max(0, Math.min(30, _playerCount + d));
  document.getElementById('player-count-disp').textContent = _playerCount;
  if (document.getElementById('player-count-disp2'))
    document.getElementById('player-count-disp2').textContent = _playerCount;
}
function registerPlayers() {
  var count = _playerCount;
  if (count === 0) { showToast('人数を1以上で入力してください','err'); return; }
  var newP = [];
  for (var no=1; no<=count; no++) {
    var ex = S.players.find(function(p){ return p.no===no; });
    newP.push(ex || {no:no, nick:'', active:true, waitCount:0, lastWaited:false, wins:0, losses:0});
  }
  S.players = newP;
  S.playerCount = count;
  // Mark step done
  var snum = document.getElementById('snum-1');
  snum.textContent = '✓'; snum.classList.add('done');
  document.getElementById('ssum-1').textContent = count + '人';
  renderPlayers();
  showToast(count + '人を登録しました', 'ok');
}

/* ── Court count & config ── */
var _courtCount = 3;
var _defaultNames = ['手前コート','中央コート','奥コート','第4コート','第5コート'];
function adjCourts(d) {
  _courtCount = Math.max(1, Math.min(5, _courtCount + d));
  document.getElementById('court-count-disp').textContent = _courtCount;
  if (document.getElementById('court-count-disp2'))
    document.getElementById('court-count-disp2').textContent = _courtCount;
  // Extend tmpCourtConfig
  while (tmpCourtConfig.length < _courtCount) {
    var idx = tmpCourtConfig.length;
    tmpCourtConfig.push({name: _defaultNames[idx]||('第'+(idx+1)+'コート'), mode:'doubles'});
  }
  renderCourtConfig1();
  renderCourtConfig2();
}
function setMode(idx, mode, src) {
  tmpCourtConfig[idx].mode = mode;
  renderCourtConfig1();
  renderCourtConfig2();
}

function buildCourtConfigCard(idx, containerId) {
  var cfg = tmpCourtConfig[idx];
  var row = document.createElement('div'); row.className = 'court-config-row';
  var top = document.createElement('div'); top.className = 'court-config-top';
  var inp = document.createElement('input'); inp.className = 'court-config-name-inp';
  inp.type='text'; inp.value=cfg.name; inp.placeholder='コート名';
  inp.oninput = (function(i){ return function(){ tmpCourtConfig[i].name = this.value; }; })(idx);
  top.appendChild(inp); row.appendChild(top);

  var seg = document.createElement('div'); seg.className = 'court-config-seg';
  var segBtns = document.createElement('div'); segBtns.className = 'seg';
  [{k:'doubles',l:'ダブルス'},{k:'singles',l:'シングル'},{k:'unused',l:'未使用'}].forEach(function(m){
    var btn = document.createElement('button');
    btn.className = 'seg-btn' + (cfg.mode===m.k ? ' on' : '');
    btn.textContent = m.l;
    btn.onclick = (function(i,mk){ return function(){
      tmpCourtConfig[i].mode = mk;
      renderCourtConfig1(); renderCourtConfig2();
    }; })(idx, m.k);
    segBtns.appendChild(btn);
  });
  seg.appendChild(segBtns); row.appendChild(seg);
  return row;
}

function renderCourtConfig1() {
  var list = document.getElementById('court-config-list');
  if (!list) return;
  list.innerHTML = '';
  for (var i=0; i<_courtCount; i++) list.appendChild(buildCourtConfigCard(i,'court-config-list'));
}
function renderCourtConfig2() {
  var list = document.getElementById('court-config-list2');
  if (!list) return;
  list.innerHTML = '';
  for (var i=0; i<_courtCount; i++) list.appendChild(buildCourtConfigCard(i,'court-config-list2'));
  var disp2 = document.getElementById('court-count-disp2');
  if (disp2) disp2.textContent = _courtCount;
}
function saveCourts() {
  S.courts = tmpCourtConfig.slice(0,_courtCount).map(function(c){
    return {name:c.name, mode:c.mode, teams:[[],[]]};
  });
  initCourtHist();
  S.courtCount = _courtCount;
  var snum = document.getElementById('snum-2');
  snum.textContent = '✓'; snum.classList.add('done');
  document.getElementById('ssum-2').textContent = _courtCount + '面';
  showToast('コートを確定しました', 'ok');
}

/* ── Timer ── */
var _timerMin = 7;
function adjTimer(d) {
  _timerMin = Math.max(1, Math.min(60, _timerMin + d));
  document.getElementById('timer-setup-disp').textContent = _timerMin;
}
function saveTimer() {
  S.timerMin = _timerMin;
  tTotal = S.timerMin * 60; tSec = tTotal;
  renderTimerDisplays();
  var snum = document.getElementById('snum-3');
  snum.textContent = '✓'; snum.classList.add('done');
  document.getElementById('ssum-3').textContent = _timerMin + '分';
  showToast('タイマーを' + _timerMin + '分に設定しました', 'ok');
}

/* ════════════════════════════════════════════════════
   TIMER
════════════════════════════════════════════════════ */
var tSec=420, tTotal=420, tRun=false, tIv=null;

function toggleGameTimer() {
  if (tRun) {
    clearInterval(tIv); tRun=false;
    document.getElementById('btn-start').textContent='▶ ゲーム開始';
    document.getElementById('btn-start').classList.remove('running');
  } else {
    tRun=true; tIv=setInterval(tickTimer,1000);
    document.getElementById('btn-start').textContent='⏸ 一時停止';
    document.getElementById('btn-start').classList.add('running');
  }
}
function resetGameTimer() {
  clearInterval(tIv); tRun=false; tSec=tTotal;
  document.getElementById('btn-start').textContent='▶ ゲーム開始';
  document.getElementById('btn-start').classList.remove('running');
  renderTimerDisplays();
}
function tickTimer() {
  if (tSec<=0) {
    clearInterval(tIv); tRun=false;
    document.getElementById('btn-start').textContent='▶ ゲーム開始';
    document.getElementById('btn-start').classList.remove('running');
    playBeep(); showToast('⏰ タイム！','ok'); return;
  }
  tSec--; renderTimerDisplays();
}
function renderTimerDisplays() {
  var m=Math.floor(tSec/60), s=tSec%60;
  var txt=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
  var cls=tSec===0?'done':tSec<=30?'warn':'';
  var el1=document.getElementById('game-timer-disp');
  var el2=document.getElementById('h-timer');
  if(el1){el1.textContent=txt;el1.className=cls;}
  if(el2){el2.textContent=txt;el2.className=cls;}
  // Progress bar
  var pct = tTotal>0 ? (tSec/tTotal)*100 : 0;
  var pf=document.getElementById('progress-fill');
  if(pf){
    pf.style.width=pct+'%';
    pf.className='progress-fill'+(tSec<=0?' done':tSec<=tTotal*0.25?' warn':'');
  }
}
function playBeep() {
  try {
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    [660,880,1100,880,660,880].forEach(function(f,i){
      var o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.frequency.value=f;o.type='sine';
      var t=ctx.currentTime+i*.18;
      g.gain.setValueAtTime(.4,t);g.gain.exponentialRampToValueAtTime(.001,t+.15);
      o.start(t);o.stop(t+.15);
    });
  } catch(e){}
}

/* ════════════════════════════════════════════════════
   PLAYER HELPERS
════════════════════════════════════════════════════ */
function pColor(no) {
  var hs=[355,20,45,80,140,180,210,250,290,320,10,60,160,235,300,35,160,200];
  var h=hs[(no-1)%hs.length];
  return{bg:'hsla('+h+',55%,65%,0.22)',bd:'hsla('+h+',55%,60%,0.7)',tx:'hsl('+h+',70%,70%)'};
}
function pLabel(p) {
  if (!p) return '—';
  var sp=S.players.find(function(x){return x.no===p.no;});
  if (!sp) return 'No.'+p.no;
  return sp.nick?'No.'+sp.no+' '+sp.nick:'No.'+sp.no;
}
function makeBadge(no, size) {
  var col=pColor(no);
  var d=document.createElement('div');
  d.className='nbadge '+(size||'md');
  d.style.background=col.bg;d.style.borderColor=col.bd;d.style.color=col.tx;
  d.textContent=no;
  return d;
}

/* ════════════════════════════════════════════════════
   PLAYERS
════════════════════════════════════════════════════ */
function toggleActive(no) {
  var p=S.players.find(function(x){return x.no===no;});if(!p)return;
  p.active=!p.active;
  renderPlayers();
  showToast('No.'+p.no+(p.nick?' '+p.nick:'')+' を'+(p.active?'参加':'退場')+'しました');
  renderGame(); renderSched();
}
function renderPlayers() {
  var grid=document.getElementById('pgrid');if(!grid)return;
  grid.innerHTML='';
  var disp2=document.getElementById('player-count-disp2');
  if(disp2) disp2.textContent=_playerCount;
  S.players.slice().sort(function(a,b){return a.no-b.no;}).forEach(function(p){
    var col=pColor(p.no);
    var card=document.createElement('div');
    card.className='pcard'+(p.active?'':' inactive');
    card.onclick=function(e){openNickEdit(p.no,e);};

/* ════════════════════════════════════════════════════
   ASSIGNMENT
════════════════════════════════════════════════════ */
function getSlots(){return S.courts.map(function(c){return c.mode==='doubles'?4:c.mode==='singles'?2:0;});}
function waitPri(p){return-(p.waitCount*10+(p.lastWaited?8:0));}
function groupKey(arr){return arr.filter(Boolean).map(function(p){return p.no;}).sort(function(a,b){return a-b;}).join('-');}
function groupAvoid(arr,ci,pH,oH,cgH){
  var active=arr.filter(Boolean);if(active.length<2)return 0;
  var score=(cgH[ci]?cgH[ci][groupKey(active)]||0:0)*100;
  for(var i=0;i<active.length;i++)for(var j=i+1;j<active.length;j++){
    var k=[active[i].no,active[j].no].sort().join('-');
    score+=(pH[k]||0)*3+(oH[k]||0);
  }
  return score;
}
function bestPairing(four,pH){
  while(four.length<4)four.push(null);
  var a=four[0],b=four[1],c=four[2],d=four[3];
  var opts=[[[a,b],[c,d]],[[a,c],[b,d]],[[a,d],[b,c]]];
  var best=opts[0],bs=Infinity;
  opts.forEach(function(opt){
    var pc=function(x,y){if(!x||!y)return 0;return pH[[x.no,y.no].sort().join('-')]||0;};
    var s=pc(opt[0][0],opt[0][1])+pc(opt[1][0],opt[1][1]);
    if(s<bs){bs=s;best=opt;}
  });
  return best;
}
function getCombos(arr,k){
  if(k===0)return[[]];if(!arr.length)return[];
  if(arr.length>12)arr=arr.slice(0,12);
  var f=arr[0],r=arr.slice(1);
  return getCombos(r,k-1).map(function(c){return[f].concat(c);}).concat(getCombos(r,k));
}
function shuffleArr(arr){
  for(var i=arr.length-1;i>0;i--){var r=Math.floor(Math.random()*(i+1));var t=arr[i];arr[i]=arr[r];arr[r]=t;}
}

function doAssignCalc(pool,bal,pH,oH,cgH){
  var slots=getSlots();
  var total=slots.reduce(function(a,b){return a+b;},0);
  var sorted=pool.slice().sort(function(a,b){return waitPri(a)-waitPri(b);});
  if(bal){
    sorted.sort(function(a,b){
      var wd=waitPri(a)-waitPri(b);if(Math.abs(wd)>5)return wd;
      var ra=(a.wins+a.losses)?a.wins/(a.wins+a.losses):.5;
      var rb=(b.wins+b.losses)?b.wins/(b.wins+b.losses):.5;
      return rb-ra;
    });
  }
  var i=0;
  while(i<sorted.length){
    var pri=waitPri(sorted[i]),j=i;
    while(j<sorted.length&&waitPri(sorted[j])===pri)j++;
    var grp=sorted.slice(i,j);shuffleArr(grp);
    for(var k=i;k<j;k++)sorted[k]=grp[k-i];i=j;
  }
  var toPlay=sorted.slice(0,Math.min(total,sorted.length));
  var waiters=sorted.slice(toPlay.length);
  var rem=toPlay.slice();
  var courtAssignments=[];
  S.courts.forEach(function(court,ci){
    var s=slots[ci];
    if(s===0){courtAssignments.push([[],[]]);return;}
    if(rem.length<=s){
      var g=rem.splice(0,s);
      courtAssignments.push(court.mode==='doubles'?bestPairing(g,pH):[[g[0]||null],[g[1]||null]]);return;
    }
    var mustN=Math.max(1,Math.floor(s/2));
    var must=rem.slice(0,mustN),cands=rem.slice(mustN),need=s-mustN,chosen;
    if(cands.length<=need){chosen=must.concat(cands);}
    else{
      var combos=getCombos(cands,need),bst=combos[0],bss=Infinity;
      combos.forEach(function(combo){var g=must.concat(combo),sc=groupAvoid(g,ci,pH,oH,cgH);if(sc<bss){bss=sc;bst=combo;}});
      chosen=must.concat(bst);
    }
    chosen.forEach(function(p){var idx=rem.indexOf(p);if(idx!==-1)rem.splice(idx,1);});
    courtAssignments.push(court.mode==='doubles'?bestPairing(chosen,pH):[[chosen[0]||null],[chosen[1]||null]]);
  });
  return{courtAssignments:courtAssignments,waiters:waiters};
}

function doAutoAssign() {
  var active=S.players.filter(function(p){return p.active;});
  if(active.length<2){showToast('参加者が足りません（最低2人）','err');return;}

  // Check capacity
  var slots=getSlots();
  var total=slots.reduce(function(a,b){return a+b;},0);
  if(total===0){showToast('コートを設定してください','err');return;}
  if(active.length<total){
    showToast('参加者が不足しています（必要: '+total+'人、現在: '+active.length+'人）','err');return;
  }

  var bal=document.getElementById('bal-tog').checked;
  var res=doAssignCalc(active,bal,S.pairHist,S.oppHist,S.courtGroupHist);

  S.players.forEach(function(p){if(p.active)p.lastWaited=false;});
  res.waiters.forEach(function(w){
    var sp=S.players.find(function(x){return x.no===w.no;});
    if(sp){sp.waitCount++;sp.lastWaited=true;}
  });
  S.courts.forEach(function(c,ci){c.teams=res.courtAssignments[ci];});
  S.scores=S.courts.map(function(){return{team1:'',team2:''};});

  computeFuture();
  gotoScreen('game');
  showToast('自動配置完了！','ok');
}

function computeFuture(){
  S.futureRounds=[];
  var active=S.players.filter(function(p){return p.active;});
  var total=getSlots().reduce(function(a,b){return a+b;},0);
  if(total===0||active.length<2)return;
  var bal=document.getElementById('bal-tog').checked;
  var sp=active.map(function(p){return Object.assign({},p);});
  var sPH=Object.assign({},S.pairHist),sOH=Object.assign({},S.oppHist);
  var sCGH=S.courtGroupHist.map(function(h){return Object.assign({},h);});
  for(var r=0;r<4;r++){
    var res=doAssignCalc(sp,bal,sPH,sOH,sCGH);
    sp.forEach(function(p){p.lastWaited=false;});
    res.waiters.forEach(function(w){var x=sp.find(function(p){return p.no===w.no;});if(x){x.waitCount++;x.lastWaited=true;}});
    S.courts.forEach(function(court,ci){
      if(court.mode==='unused')return;
      var t1=(res.courtAssignments[ci][0]||[]).filter(Boolean);
      var t2=(res.courtAssignments[ci][1]||[]).filter(Boolean);
      var gk=groupKey(t1.concat(t2));
      sCGH[ci][gk]=(sCGH[ci][gk]||0)+1;
      [t1,t2].forEach(function(team){for(var i=0;i<team.length;i++)for(var j=i+1;j<team.length;j++){var k=[team[i].no,team[j].no].sort().join('-');sPH[k]=(sPH[k]||0)+1;}});
      t1.forEach(function(a){t2.forEach(function(b){var k=[a.no,b.no].sort().join('-');sOH[k]=(sOH[k]||0)+1;});});
    });
    var futOnCourt={};
    S.courts.forEach(function(court,ci){(res.courtAssignments[ci]||[[],[]]).forEach(function(team){(team||[]).filter(Boolean).forEach(function(p){futOnCourt[p.no]=true;});});});
    var futW=sp.filter(function(p){return!futOnCourt[p.no];}).map(function(p){var o=S.players.find(function(x){return x.no===p.no;});return o?pLabel(o):'No.'+p.no;});
    S.futureRounds.push({
      round:S.currentRound+1+r+1,waiters:futW,
      courts:S.courts.map(function(court,ci){
        return{name:court.name,mode:court.mode,
          teams:[(res.courtAssignments[ci][0]||[]).filter(Boolean).map(pLabel),(res.courtAssignments[ci][1]||[]).filter(Boolean).map(pLabel)]};
      })
    });
  }
}

/* ════════════════════════════════════════════════════
   NEXT ROUND
════════════════════════════════════════════════════ */
function nextRound(){
  var onCourt={};
  S.courts.forEach(function(c){c.teams.forEach(function(t){(t||[]).filter(Boolean).forEach(function(p){onCourt[p.no]=true;});});});
  var waiters=S.players.filter(function(p){return p.active&&!onCourt[p.no];}).map(pLabel);
  S.rounds.push({
    round:S.currentRound+1,waiters:waiters,
    courts:S.courts.map(function(c,ci){
      return{name:c.name,mode:c.mode,
        teams:c.teams.map(function(t){return(t||[]).filter(Boolean).map(pLabel);}),
        score:Object.assign({},S.scores[ci])};
    })
  });
  S.courts.forEach(function(court,ci){
    if(court.mode==='unused')return;
    var t1=(court.teams[0]||[]).filter(Boolean),t2=(court.teams[1]||[]).filter(Boolean);
    var gk=groupKey(t1.concat(t2));
    S.courtGroupHist[ci][gk]=(S.courtGroupHist[ci][gk]||0)+1;
    [t1,t2].forEach(function(team){for(var i=0;i<team.length;i++)for(var j=i+1;j<team.length;j++){var k=[team[i].no,team[j].no].sort().join('-');S.pairHist[k]=(S.pairHist[k]||0)+1;}});
    t1.forEach(function(a){t2.forEach(function(b){var k=[a.no,b.no].sort().join('-');S.oppHist[k]=(S.oppHist[k]||0)+1;});});
  });
  S.courts.forEach(function(court,ci){
    if(court.mode==='unused')return;
    var s1=parseInt(S.scores[ci].team1),s2=parseInt(S.scores[ci].team2);if(isNaN(s1)||isNaN(s2))return;
    var t1=(court.teams[0]||[]).filter(Boolean),t2=(court.teams[1]||[]).filter(Boolean),w1=s1>s2,w2=s2>s1;
    t1.forEach(function(p){var sp=S.players.find(function(x){return x.no===p.no;});if(sp){if(w1)sp.wins++;else if(w2)sp.losses++;}});
    t2.forEach(function(p){var sp=S.players.find(function(x){return x.no===p.no;});if(sp){if(w2)sp.wins++;else if(w1)sp.losses++;}});
  });
  S.currentRound++;
  document.getElementById('rnd-badge').textContent='第'+(S.currentRound+1)+'ゲーム';
  resetGameTimer();
  doAutoAssign();
  showToast('第'+S.currentRound+'ゲーム終了','ok');
}

function buildScoreHTML(ci){

}

      var vsLbl=document.createElement('div');vsLbl.className='vs-label';vsLbl.textContent='VS';vsCol.appendChild(vsLbl);

      // Team B col

      ss.innerHTML=buildScoreHTML(ci);card.appendChild(ss);

  });

  // Rest section
  var onCourt={};

  var waiting=S.players.filter(function(p){return p.active&&!onCourt[p.no];});

    var rb=document.createElement('div');rb.className='rest-players';
    waiting.forEach(function(p){
      var chip=document.createElement('div');chip.className='rest-player';
      chip.appendChild(makeBadge(p.no,'sm'));

      var pnm=document.createElement('div');pnm.className='rest-player-name';

      if(p.waitCount>0){var wt=document.createElement('div');wt.className='rest-player-sub';wt.textContent='待機'+p.waitCount+'回';info.appendChild(wt);}
      chip.appendChild(info);rb.appendChild(chip);

function renderSched(){
  var el=document.getElementById('sched-scroll');if(!el)return;el.innerHTML='';
  var items=[];
  var ps=Math.max(0,S.rounds.length-2);
  for(var i=ps;i<S.rounds.length;i++)items.push({type:'past',data:S.rounds[i]});
  var curOnCourt={};
  S.courts.forEach(function(c){c.teams.forEach(function(t){(t||[]).filter(Boolean).forEach(function(p){curOnCourt[p.no]=true;});});});
  var curW=S.players.filter(function(p){return p.active&&!curOnCourt[p.no];}).map(pLabel);
  items.push({type:'current',data:{round:S.currentRound+1,waiters:curW,courts:S.courts.map(function(c,ci){return{name:c.name,mode:c.mode,teams:c.teams.map(function(t){return(t||[]).filter(Boolean).map(pLabel);}),score:S.scores[ci]||{}};}) }});
  S.futureRounds.slice(0,4).forEach(function(r){items.push({type:'future',data:r});});
  items.forEach(function(item){el.appendChild(buildScCard(item));});
}
function buildScCard(item){
  var past=item.type==='past',cur=item.type==='current';
  var card=document.createElement('div');
  card.className='sc-card'+(past?' past':cur?' cur':' future');
  var head=document.createElement('div');head.className='sc-head';
  var rn=document.createElement('span');rn.className='sc-round';rn.textContent='第'+item.data.round+'ゲーム';
  var badge=document.createElement('span');badge.className='sc-badge';badge.textContent=past?'終了':cur?'進行中':'予定';
  head.appendChild(rn);head.appendChild(badge);card.appendChild(head);
  var body=document.createElement('div');body.className='sc-body';
  (item.data.courts||[]).filter(function(c){return c.mode!=='unused';}).forEach(function(c){
    var blk=document.createElement('div');blk.className='sc-court-block';
    var cnm=document.createElement('div');cnm.className='sc-court-nm';cnm.textContent=c.name;blk.appendChild(cnm);
    var vsg=document.createElement('div');vsg.className='sc-vs-grid';
    var ta=document.createElement('div');ta.className='sc-team';
    (c.teams[0]||[]).forEach(function(n){var p=document.createElement('div');p.className='sc-player';p.textContent=n;ta.appendChild(p);});
    if(!(c.teams[0]||[]).length){var ep=document.createElement('div');ep.className='sc-player emp';ep.textContent='—';ta.appendChild(ep);}
    var vs=document.createElement('div');vs.className='sc-vs-txt';vs.textContent='VS';
    var tb=document.createElement('div');tb.className='sc-team';
    (c.teams[1]||[]).forEach(function(n){var p=document.createElement('div');p.className='sc-player';p.textContent=n;tb.appendChild(p);});
    if(!(c.teams[1]||[]).length){var ep2=document.createElement('div');ep2.className='sc-player emp';ep2.textContent='—';tb.appendChild(ep2);}
    vsg.appendChild(ta);vsg.appendChild(vs);vsg.appendChild(tb);blk.appendChild(vsg);
    if(c.score&&c.score.team1!==''&&c.score.team2!==''){var sc=document.createElement('div');sc.className='sc-score-row';sc.textContent=c.score.team1+' – '+c.score.team2;blk.appendChild(sc);}
    body.appendChild(blk);
  });
  if(item.data.waiters&&item.data.waiters.length>0){
    var rb=document.createElement('div');rb.className='sc-rest';
    var rl=document.createElement('div');rl.className='sc-rest-lbl';rl.textContent='🪑 休憩';rb.appendChild(rl);
    var rn2=document.createElement('div');rn2.className='sc-rest-names';rn2.textContent=item.data.waiters.join(' / ');rb.appendChild(rn2);body.appendChild(rb);
  }
  card.appendChild(body);return card;
}

/* ════════════════════════════════════════════════════
   RENDER HISTORY
════════════════════════════════════════════════════ */
function renderHistory(){
  var el=document.getElementById('hist-scroll');if(!el)return;el.innerHTML='';
  if(!S.rounds.length){
    var e=document.createElement('div');e.style.cssText='color:var(--t3);text-align:center;padding:48px;font-size:14px';
    e.textContent='まだ履歴がありません';el.appendChild(e);return;
  }
  S.rounds.slice().reverse().forEach(function(r){
    var card=document.createElement('div');card.className='hcard';
    var head=document.createElement('div');head.className='hhead';head.textContent='第'+r.round+'ゲーム';card.appendChild(head);
    var body=document.createElement('div');body.className='hbody';
    r.courts.filter(function(c){return c.mode!=='unused';}).forEach(function(c){
      var row=document.createElement('div');row.className='hrow';
      var ct=document.createElement('span');ct.className='hct';ct.textContent=c.name.slice(0,3);
      var pl=document.createElement('span');pl.className='hpl';pl.textContent=(c.teams[0]||[]).join(' / ')+' vs '+(c.teams[1]||[]).join(' / ');
      var sc=document.createElement('span');sc.className='hsc';sc.textContent=(c.score&&c.score.team1!==''&&c.score.team2!=='')?c.score.team1+' – '+c.score.team2:'—';
      row.appendChild(ct);row.appendChild(pl);row.appendChild(sc);body.appendChild(row);
    });
    card.appendChild(body);el.appendChild(card);
  });
}

/* ════════════════════════════════════════════════════
   TOAST
════════════════════════════════════════════════════ */
var toastT;
function showToast(msg,type){
  var t=document.getElementById('toast');t.textContent=msg;t.className='show'+(type?' '+type:'');
  clearTimeout(toastT);toastT=setTimeout(function(){t.className='';},3000);
}

renderCourtConfig1();
renderTimerDisplays();
